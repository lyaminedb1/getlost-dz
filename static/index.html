        </div>
      </div>
      <div style={{maxWidth:1280,margin:'0 auto',padding:'24px 24px 60px'}}>
        {loading?<Spin/>:<>
          {tab==='bookings'&&<Tbl cols={['Voyageur','Email','Offre','Agence','Prix','Téléphone','Date','Statut','Action']}>
            {bookings.map(b=>(
              <tr key={b.id}>
                <td style={{...TD,fontWeight:700}}><div style={{display:'flex',alignItems:'center',gap:8}}><div style={{width:28,height:28,borderRadius:'50%',background:'linear-gradient(135deg,var(--teal),var(--teal2))',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:800,color:'#fff',flexShrink:0}}>{(b.traveler_name||'?')[0].toUpperCase()}</div>{b.traveler_name}</div></td>
                <td style={{...TD,color:'var(--muted)',fontSize:12}}>{b.traveler_email}</td>
                <td style={{...TD,fontWeight:600,maxWidth:150,fontSize:13}}>{b.offer_title}</td>
                <td style={{...TD,color:'var(--muted)',fontSize:13}}>{b.agency_name}</td>
                <td style={{...TD,color:'var(--teal2)',fontWeight:700,fontFamily:'Nunito'}}>{(b.price||0).toLocaleString()}</td>
                <td style={{...TD,fontSize:13}}>{b.phone||<span style={{color:'var(--muted)'}}>—</span>}</td>
                <td style={{...TD,color:'var(--muted)',fontSize:12}}>{fmtDate(b.created_at)}</td>
                <td style={TD}><Badge status={b.status}/></td>
                <td style={TD}><div style={{display:'flex',gap:5}}>
                  {b.status!=='confirmed'&&<button style={B.sm} onClick={async()=>{try{await api(`/bookings/${b.id}/status`,{method:'PATCH',body:{status:'confirmed'}});show('Confirmée!');load();}catch(e){show(e.message,'err');}}}>✅</button>}
                  {b.status!=='cancelled'&&<button style={B.danger} onClick={async()=>{try{await api(`/bookings/${b.id}/status`,{method:'PATCH',body:{status:'cancelled'}});show('Annulée');load();}catch(e){show(e.message,'err');}}}>✕</button>}
                </div></td>
              </tr>
            ))}
            {!bookings.length&&<tr><td colSpan={8} style={{...TD,textAlign:'center',color:'var(--muted)',padding:40}}>Aucune réservation.</td></tr>}
          </Tbl>}
          {tab==='offers'&&<Tbl cols={['Titre','Agence','Cat.','Prix','Statut','Actions']}>
            {offers.map(o=>(
              <tr key={o.id} style={{background:o.status==='pending'?'#FFFBEB':''}}>
                <td style={{...TD,fontWeight:700,color:'var(--navy)'}}>{o.title}</td>
                <td style={{...TD,color:'var(--muted)',fontSize:13}}>{o.agency_name||'—'}</td>
                <td style={{...TD,color:'var(--muted)',fontSize:13}}>{t.cats[o.category]||o.category}</td>
                <td style={{...TD,color:'var(--teal2)',fontWeight:700,fontFamily:'Nunito'}}>{(o.price||0).toLocaleString()}</td>
                <td style={TD}><Badge status={o.status}/></td>
                <td style={TD}><div style={{display:'flex',gap:6}}>
                  {o.status!=='approved'&&<button style={B.sm} onClick={()=>patch(`/offers/${o.id}/status`,{status:'approved'},'✅ Approuvé')}>{t.approve}</button>}
                  {o.status!=='rejected'&&<button style={B.danger} onClick={()=>patch(`/offers/${o.id}/status`,{status:'rejected'},'Refusé')}>{t.reject}</button>}
                </div></td>
              </tr>
            ))}
          </Tbl>}
          {tab==='agencies'&&<>
            {/* Create Agency Form */}
            <AdminCreateAgencyForm onCreated={load}/>
            {/* Agencies table */}
            <div style={{marginTop:24}}>
              <Tbl cols={['Agence','Plan','Email','Offres','Statut','Actions']}>
                {agencies.map(a=>(
                  <tr key={a.id}>
                    <td style={{...TD,fontWeight:700}}><span style={{marginRight:8,fontSize:18}}>{a.logo}</span>{a.name}</td>
                    <td style={TD}><span style={{padding:'3px 10px',borderRadius:20,fontSize:11,fontWeight:700,background:a.plan==='premium'?'#FEF3C7':'#F0F4F5',color:a.plan==='premium'?'#92400E':'var(--muted)'}}>{a.plan}</span></td>
                    <td style={{...TD,color:'var(--muted)',fontSize:13}}>{a.email}</td>
                    <td style={TD}>{a.offer_count||0}</td>
                    <td style={TD}><Badge status={a.status}/></td>
                    <td style={TD}><div style={{display:'flex',gap:6}}>
                      {a.status!=='approved'&&<button style={B.sm} onClick={()=>patch(`/agencies/${a.id}/status`,{status:'approved'},'Activée')}>{t.approve}</button>}
                      {a.status==='approved'&&<button style={B.danger} onClick={()=>patch(`/agencies/${a.id}/status`,{status:'suspended'},'Suspendue')}>{t.suspend}</button>}
                    </div></td>
                  </tr>
                ))}
              </Tbl>
            </div>
          </>}
          {tab==='users'&&<Tbl cols={['Nom','Email','Rôle','Inscrit le']}>
            {users.map(u=>(
              <tr key={u.id}>
                <td style={{...TD,fontWeight:700}}>{u.name}</td>
                <td style={{...TD,color:'var(--muted)',fontSize:13}}>{u.email}</td>
                <td style={TD}><span style={{padding:'3px 10px',borderRadius:20,fontSize:11,fontWeight:700,background:u.role==='admin'?'#D1FAE5':u.role==='agency'?'#EDE9FE':'#F0F4F5',color:u.role==='admin'?'#065F46':u.role==='agency'?'#5B21B6':'var(--muted)'}}>{u.role}</span></td>
                <td style={{...TD,color:'var(--muted)',fontSize:13}}>{(u.created_at||'').split('T')[0]}</td>
              </tr>
            ))}
          </Tbl>}
          {tab==='analytics'&&<AnalyticsDash/>}
          {tab==='reviews'&&<Tbl cols={['Utilisateur','Offre','Note','Titre','Statut','Actions']}>
            {reviews.map(r=>(
              <tr key={r.id} style={{background:r.status==='pending'?'#FFFBEB':''}}>
                <td style={{...TD,fontWeight:700}}>{r.user_name}</td>
                <td style={{...TD,color:'var(--muted)',fontSize:13,maxWidth:160}}>{r.offer_title}</td>
                <td style={TD}><Stars v={r.rating} size={13}/></td>
                <td style={{...TD,fontWeight:600}}>{r.title}</td>
                <td style={TD}><Badge status={r.status}/></td>
                <td style={TD}><div style={{display:'flex',gap:6}}>
                  {r.status!=='approved'&&<button style={B.sm} onClick={()=>patch(`/reviews/${r.id}/status`,{status:'approved'},'Approuvé')}>{t.approve}</button>}
                  {r.status!=='rejected'&&<button style={B.danger} onClick={()=>patch(`/reviews/${r.id}/status`,{status:'rejected'},'Refusé')}>{t.reject}</button>}
                </div></td>
              </tr>
            ))}
          </Tbl>}
        </>}
      </div>
    </div>
  );
}


/* ── AGENCY ANALYTICS PAGE ───────────────────────────────────────────────── */
function AgencyAnalyticsPage({t, openAuth}) {
  const {user} = useAuth();
  const {show} = useToast();
  const [days, setDays] = useState(30);
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(false);

  const load = useCallback(async () => {
    if (!user || user.role !== 'agency' || !user.agencyId) return;
    setLoading(true);
    try {
      const d = await api(`/agencies/${user.agencyId}/analytics?days=${days}`);
      setData(d);
    } catch(e) { show(e.message, 'err'); }
    setLoading(false);
  }, [user, days]);

  useEffect(() => { load(); }, [load]);

  if (!user || user.role !== 'agency') return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'#F8FAFC',paddingTop:68}}>
      <Card style={{padding:'48px 40px',textAlign:'center',maxWidth:380}}>
        <div style={{fontSize:48,marginBottom:16}}>📊</div>
        <div style={{fontFamily:'Nunito',fontWeight:900,fontSize:20,color:'var(--navy)',marginBottom:8}}>Espace Agence uniquement</div>
        <button style={{...B.pri,width:'100%',marginTop:16}} onClick={()=>openAuth('login')}>{t.navLogin}</button>
      </Card>
    </div>
  );

  const { daily=[], top_offers=[], funnel={offer_views:0,booking_started:0,booking_done:0} } = data || {};

  // Compute stats
  const totalViews = funnel.offer_views || 0;
  const totalBookingsDone = funnel.booking_done || 0;
  const convRate = totalViews > 0 ? ((totalBookingsDone / totalViews) * 100).toFixed(1) : '0.0';
  const peakDay = daily.length > 0 ? daily.reduce((a,b) => (b.sessions||0) > (a.sessions||0) ? b : a, daily[0]) : null;
  const totalSessions = daily.reduce((s,d) => s + (d.sessions||0), 0);

  // Mini sparkline path for line chart
  function sparkPath(arr, key, W=180, H=48) {
    if (!arr || arr.length < 2) return '';
    const max = Math.max(...arr.map(d=>d[key]||0), 1);
    return arr.map((d,i) => {
      const x = (i/(arr.length-1)) * W;
      const y = H - ((d[key]||0)/max) * H;
      return `${i===0?'M':'L'}${x},${y}`;
    }).join(' ');
  }

  // Color palette
  const C = {
    teal: '#0DB9A8', navy: '#0B2340', accent: '#FF6B6B',
    blue: '#3B82F6', amber: '#F59E0B', green: '#10B981',
    purple: '#8B5CF6', bg: '#F0FDF9', card: '#fff',
    muted: '#64748B', border: '#E2E8F0'
  };

  const KPICard = ({icon, label, value, sub, color, spark}) => (
    <div style={{
      background: C.card, borderRadius: 20,
      padding: '24px 28px', boxShadow: '0 2px 20px rgba(11,35,64,.07)',
      border: `1px solid ${C.border}`, position: 'relative', overflow: 'hidden',
      transition: 'transform .2s, box-shadow .2s',
    }}
    onMouseEnter={e=>{e.currentTarget.style.transform='translateY(-3px)';e.currentTarget.style.boxShadow='0 8px 32px rgba(11,35,64,.12)';}}
    onMouseLeave={e=>{e.currentTarget.style.transform='';e.currentTarget.style.boxShadow='0 2px 20px rgba(11,35,64,.07)';}}>
      <div style={{position:'absolute',top:0,right:0,width:80,height:80,borderRadius:'0 20px 0 80px',background:`${color}15`}}/>
      <div style={{fontSize:28,marginBottom:12}}>{icon}</div>
      <div style={{fontFamily:'Nunito',fontWeight:900,fontSize:34,color:color,lineHeight:1,marginBottom:4}}>{value}</div>
      <div style={{fontWeight:700,fontSize:13,color:C.navy,marginBottom:2}}>{label}</div>
      {sub && <div style={{fontSize:11,color:C.muted,fontWeight:500}}>{sub}</div>}
      {spark && daily.length>1 && (
        <svg viewBox={`0 0 180 48`} style={{width:'100%',height:40,marginTop:12,opacity:.6}}>
          <path d={sparkPath(daily, spark)} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
          <path d={sparkPath(daily, spark)+'L180,48L0,48Z'} fill={`${color}20`}/>
        </svg>
      )}
    </div>
  );

  const maxSessions = Math.max(...daily.map(d=>d.sessions||0), 1);
  const maxEvents = Math.max(...daily.map(d=>d.events||0), 1);
  const maxOfferViews = Math.max(...top_offers.map(o=>o.views||0), 1);

  return (
    <div style={{background:'#F0FDF9',minHeight:'100vh',paddingTop:68}}>
      {/* Header */}
      <div style={{background:`linear-gradient(135deg, ${C.navy} 0%, #1a3a5c 50%, #0a4a3a 100%)`,padding:'40px 32px 48px',position:'relative',overflow:'hidden'}}>
        {/* Decorative circles */}
        <div style={{position:'absolute',top:-60,right:-60,width:240,height:240,borderRadius:'50%',background:'rgba(13,185,168,.12)',pointerEvents:'none'}}/>
        <div style={{position:'absolute',bottom:-40,left:-40,width:180,height:180,borderRadius:'50%',background:'rgba(13,185,168,.08)',pointerEvents:'none'}}/>
        <div style={{maxWidth:1200,margin:'0 auto',position:'relative'}}>
          <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',flexWrap:'wrap',gap:16}}>
            <div>
              <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:8}}>
                <div style={{width:44,height:44,borderRadius:14,background:'rgba(13,185,168,.25)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:22}}>📊</div>
                <div>
                  <div style={{fontFamily:'Nunito',fontWeight:900,fontSize:26,color:'#fff',lineHeight:1}}>Analytics</div>
                  <div style={{color:'rgba(255,255,255,.55)',fontSize:12,fontWeight:500,marginTop:2}}>{user.name} · Agence</div>
                </div>
              </div>
              <p style={{color:'rgba(255,255,255,.65)',fontSize:13,margin:'8px 0 0',fontWeight:400,maxWidth:480}}>
                Suivez les performances de vos offres en temps réel.
              </p>
            </div>
            {/* Period selector */}
            <div style={{display:'flex',gap:6,background:'rgba(255,255,255,.08)',borderRadius:50,padding:'5px'}}>
              {[[7,'7j'],[30,'30j'],[90,'90j']].map(([d,l])=>(
                <button key={d} onClick={()=>setDays(d)} style={{
                  padding:'7px 18px',borderRadius:50,fontSize:12,fontWeight:700,cursor:'pointer',border:'none',
                  background:days===d?C.teal:'transparent',
                  color:days===d?'#fff':'rgba(255,255,255,.6)',
                  transition:'all .2s'
                }}>{l}</button>
              ))}
            </div>
          </div>
        </div>
      </div>

      <div style={{maxWidth:1200,margin:'0 auto',padding:'32px 24px 80px'}}>
        {loading ? (
          <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:300,gap:12}}>
            <div style={{width:36,height:36,borderRadius:'50%',border:`3px solid ${C.teal}`,borderTopColor:'transparent',animation:'spin 1s linear infinite'}}/>
            <span style={{color:C.muted,fontWeight:600}}>Chargement des données…</span>
          </div>
        ) : (
          <>
            {/* KPI Row */}
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(220px,1fr))',gap:16,marginBottom:28}}>
              <KPICard icon="👁" label="Vues des offres" value={totalViews.toLocaleString()}
                sub={`${days} derniers jours`} color={C.teal} spark="sessions"/>
              <KPICard icon="👥" label="Sessions uniques" value={totalSessions.toLocaleString()}
                sub={peakDay?`Pic: ${peakDay.day?.slice(5)||'—'}`:'Aucune session'} color={C.blue}/>
              <KPICard icon="🎫" label="Réservations" value={totalBookingsDone}
                sub="Voyages confirmés" color={C.green}/>
              <KPICard icon="📈" label="Taux conversion" value={`${convRate}%`}
                sub="Vues → Réservations" color={convRate>5?C.green:convRate>2?C.amber:C.accent}/>
            </div>

            {/* Main grid */}
            <div style={{display:'grid',gridTemplateColumns:'2fr 1fr',gap:20,marginBottom:20}}>

              {/* Traffic chart */}
              <div style={{background:C.card,borderRadius:20,padding:'28px',boxShadow:'0 2px 20px rgba(11,35,64,.07)',border:`1px solid ${C.border}`}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:24}}>
                  <div>
                    <div style={{fontFamily:'Nunito',fontWeight:800,fontSize:16,color:C.navy}}>📈 Trafic quotidien</div>
                    <div style={{fontSize:11,color:C.muted,marginTop:2}}>Sessions et événements sur la période</div>
                  </div>
                  <div style={{display:'flex',gap:16,fontSize:11}}>
                    <span style={{display:'flex',alignItems:'center',gap:5,color:C.muted,fontWeight:600}}>
                      <span style={{width:20,height:3,borderRadius:3,background:C.teal,display:'inline-block'}}/>Sessions
                    </span>
                    <span style={{display:'flex',alignItems:'center',gap:5,color:C.muted,fontWeight:600}}>
                      <span style={{width:20,height:3,borderRadius:3,background:`${C.blue}80`,display:'inline-block'}}/>Événements
                    </span>
                  </div>
                </div>
                {daily.length < 2 ? (
                  <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:160,gap:8}}>
                    <div style={{fontSize:36}}>📭</div>
                    <div style={{color:C.muted,fontWeight:600,fontSize:13}}>Les données apparaîtront dès les premières visites</div>
                  </div>
                ) : (
                  <div style={{overflowX:'auto'}}>
                    <svg viewBox="0 0 640 160" style={{width:'100%',minWidth:300,height:160}}>
                      {/* Grid lines */}
                      {[0,.25,.5,.75,1].map(f=>(
                        <line key={f} x1="40" y1={20+f*120} x2="630" y2={20+f*120}
                          stroke={C.border} strokeWidth="1" strokeDasharray={f===0?'0':'4,4'}/>
                      ))}
                      {/* Sessions area */}
                      <path d={(() => {
                        const pts = daily.map((d,i)=>{
                          const x=40+(i/(daily.length-1))*590;
                          const y=20+((1-(d.sessions||0)/maxSessions)*120);
                          return `${i===0?'M':'L'}${x},${y}`;
                        }).join(' ');
                        return pts+`L${40+590},140L40,140Z`;
                      })()} fill={`${C.teal}18`}/>
                      <path d={daily.map((d,i)=>{
                        const x=40+(i/(daily.length-1))*590;
                        const y=20+((1-(d.sessions||0)/maxSessions)*120);
                        return `${i===0?'M':'L'}${x},${y}`;
                      }).join(' ')} fill="none" stroke={C.teal} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
                      {/* Events line */}
                      <path d={daily.map((d,i)=>{
                        const x=40+(i/(daily.length-1))*590;
                        const y=20+((1-(d.events||0)/maxEvents)*120);
                        return `${i===0?'M':'L'}${x},${y}`;
                      }).join(' ')} fill="none" stroke={`${C.blue}80`} strokeWidth="1.5" strokeDasharray="6,3" strokeLinecap="round"/>
                      {/* Dots + x-axis labels */}
                      {daily.map((d,i)=>{
                        const x=40+(i/(daily.length-1))*590;
                        const y=20+((1-(d.sessions||0)/maxSessions)*120);
                        const showLabel = i===0||i===daily.length-1||i%Math.ceil(daily.length/6)===0;
                        return (
                          <g key={i}>
                            <circle cx={x} cy={y} r="4" fill={C.teal} opacity=".9"/>
                            {showLabel&&<text x={x} y="155" textAnchor="middle" fontSize="9" fill={C.muted}>{(d.day||'').slice(5)}</text>}
                          </g>
                        );
                      })}
                      {/* Y axis labels */}
                      <text x="35" y="24" textAnchor="end" fontSize="9" fill={C.muted}>{maxSessions}</text>
                      <text x="35" y="140" textAnchor="end" fontSize="9" fill={C.muted}>0</text>
                    </svg>
                  </div>
                )}
              </div>

              {/* Funnel */}
              <div style={{background:C.card,borderRadius:20,padding:'28px',boxShadow:'0 2px 20px rgba(11,35,64,.07)',border:`1px solid ${C.border}`}}>
                <div style={{fontFamily:'Nunito',fontWeight:800,fontSize:16,color:C.navy,marginBottom:6}}>🔽 Funnel</div>
                <div style={{fontSize:11,color:C.muted,marginBottom:24}}>Taux de conversion étape par étape</div>
                {[
                  {label:'Vues',val:funnel.offer_views,color:C.teal,icon:'👁'},
                  {label:'Démarrées',val:funnel.booking_started,color:C.blue,icon:'🖱'},
                  {label:'Confirmées',val:funnel.booking_done,color:C.green,icon:'✅'},
                ].map((s,i,arr)=>{
                  const prev = i>0?arr[i-1].val:null;
                  const pct = (funnel.offer_views||1)>0 ? Math.round((s.val/(funnel.offer_views||1))*100) : 0;
                  const step = prev&&prev>0 ? Math.round((s.val/prev)*100) : null;
                  return (
                    <div key={i} style={{marginBottom:i<2?20:0}}>
                      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
                        <span style={{fontSize:13,fontWeight:700,color:C.navy}}>{s.icon} {s.label}</span>
                        <div style={{textAlign:'right'}}>
                          <span style={{fontSize:16,fontWeight:900,color:s.color,fontFamily:'Nunito'}}>{s.val}</span>
                          {step!==null&&<div style={{fontSize:10,color:C.muted,fontWeight:600}}>{step}% du précédent</div>}
                        </div>
                      </div>
                      <div style={{background:'#F1F5F9',borderRadius:8,height:10,overflow:'hidden'}}>
                        <div style={{height:'100%',borderRadius:8,background:`linear-gradient(90deg,${s.color},${s.color}cc)`,width:`${pct}%`,transition:'width .8s cubic-bezier(.4,0,.2,1)'}}/>
                      </div>
                      {i<2&&<div style={{display:'flex',justifyContent:'center',marginTop:8}}>
                        <div style={{width:1,height:12,background:C.border}}/>
                      </div>}
                    </div>
                  );
                })}
                <div style={{marginTop:24,padding:'14px 16px',background:`${C.teal}12`,borderRadius:12,border:`1px solid ${C.teal}30`}}>
                  <div style={{fontSize:11,color:C.muted,fontWeight:600,marginBottom:2}}>Taux global</div>
                  <div style={{fontFamily:'Nunito',fontWeight:900,fontSize:22,color:C.teal}}>{convRate}%</div>
                  <div style={{fontSize:10,color:C.muted}}>vues → réservations confirmées</div>
                </div>
              </div>
            </div>

            {/* Top Offers */}
            <div style={{background:C.card,borderRadius:20,padding:'28px',boxShadow:'0 2px 20px rgba(11,35,64,.07)',border:`1px solid ${C.border}`,marginBottom:20}}>
              <div style={{fontFamily:'Nunito',fontWeight:800,fontSize:16,color:C.navy,marginBottom:6}}>🏆 Performance des offres</div>
              <div style={{fontSize:11,color:C.muted,marginBottom:24}}>Classement par nombre de vues sur la période</div>
              {top_offers.length === 0 ? (
                <div style={{textAlign:'center',padding:'40px 0',color:C.muted}}>
                  <div style={{fontSize:36,marginBottom:8}}>📭</div>
                  <div style={{fontWeight:600,fontSize:13}}>Aucune donnée pour l'instant</div>
                </div>
              ) : (
                <div style={{display:'flex',flexDirection:'column',gap:12}}>
                  {top_offers.map((o,i)=>{
                    const conv = o.views>0?Math.round((o.bookings_done/o.views)*100):0;
                    const w = Math.round((o.views/maxOfferViews)*100);
                    const medals = ['🥇','🥈','🥉'];
                    return (
                      <div key={o.id} style={{display:'grid',gridTemplateColumns:'28px 1fr 80px 80px 80px',gap:12,alignItems:'center'}}>
                        <div style={{fontFamily:'Nunito',fontWeight:900,fontSize:16,textAlign:'center'}}>
                          {i<3 ? medals[i] : <span style={{color:C.muted,fontSize:12}}>#{i+1}</span>}
                        </div>
                        <div>
                          <div style={{fontWeight:700,fontSize:13,color:C.navy,marginBottom:4,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',maxWidth:260}}>{o.title}</div>

                  })}

            {totalViews === 0 && (
              <div style={{background:`linear-gradient(135deg,${C.teal}10,${C.blue}10)`,borderRadius:20,padding:'32px',border:`1px dashed ${C.teal}50`,textAlign:'center'}}>
                <div style={{fontSize:48,marginBottom:12}}>🚀</div>
                <div style={{fontFamily:'Nunito',fontWeight:900,fontSize:18,color:C.navy,marginBottom:8}}>Les données arrivent !</div>
                <p style={{color:C.muted,fontSize:13,maxWidth:400,margin:'0 auto',lineHeight:1.7}}>
                  Les statistiques s'afficheront dès que des visiteurs consulteront vos offres. Partagez vos offres sur Instagram pour accélérer !
                </p>
              </div>
            )}
          </>
        )}
      </div>
    </div>
  );
}

/* ── APP ──────────────────────────────────────────────────────────────────── */
/* ── REVIEW MODAL ─────────────────────────────────────────────────────────── */
function ReviewModal({bookingId,onClose,t,onDone}){
  const {show}=useToast();
  const [bk,setBk]=useState(null);
  const [already,setAlready]=useState(false);
  const [loading,setLoading]=useState(true);
  const [submitting,setSubmitting]=useState(false);
  const [rating,setRating]=useState(0);
  const [hover,setHover]=useState(0);
  const [title,setTitle]=useState('');
  const [comment,setComment]=useState('');
  const [photo,setPhoto]=useState('');
  const [done,setDone]=useState(false);

  useEffect(()=>{
    api(`/bookings/${bookingId}/review-check`).then(d=>{
      setBk(d.booking);setAlready(d.already_reviewed);setLoading(false);
    }).catch(()=>{setLoading(false);});
  },[bookingId]);

  const handlePhoto=e=>{
    const file=e.target.files[0];
    if(!file)return;
    if(file.size>2*1024*1024){show('Photo max 2MB','err');return;}
    const r=new FileReader();
    r.onload=ev=>setPhoto(ev.target.result);
    r.readAsDataURL(file);
  };

  const submit=async()=>{
    if(!rating){show('Choisissez une note','err');return;}
    if(!title.trim()){show('Titre requis','err');return;}
    setSubmitting(true);
    try{
      await api(`/offers/${bk.offer_id}/reviews`,{method:'POST',body:{
        rating,title:title.trim(),comment:comment.trim(),photo,booking_id:parseInt(bookingId)
      }});
      setDone(true);
      if(onDone)onDone();
    }catch(e){show(e.message,'err');}
    setSubmitting(false);
  };

  const OL={position:'fixed',inset:0,background:'rgba(11,35,64,.55)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center',padding:16};
  const BOX={background:'#fff',borderRadius:24,padding:'32px 28px',width:'100%',maxWidth:480,maxHeight:'90vh',overflowY:'auto',position:'relative'};

  return(
    <div style={OL} onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={BOX}>
        <button onClick={onClose} style={{position:'absolute',top:16,right:18,background:'none',border:'none',fontSize:22,cursor:'pointer',color:'var(--muted)'}}>✕</button>
        {loading?<Spin/>:already?(
          <div style={{textAlign:'center',padding:'20px 0'}}>
            <div style={{fontSize:48,marginBottom:12}}>✅</div>
            <h3 style={{color:'var(--navy)'}}>Vous avez déjà laissé un avis</h3>
            <button style={{...B.pri,marginTop:16}} onClick={onClose}>Fermer</button>
          </div>
        ):done?(
          <div style={{textAlign:'center',padding:'20px 0'}}>
            <div style={{fontSize:48,marginBottom:12}}>🎉</div>
            <h3 style={{color:'var(--navy)'}}>Merci pour votre avis !</h3>
            <p style={{color:'var(--muted)'}}>Votre expérience aidera d&apos;autres voyageurs.</p>
            <button style={{...B.pri,marginTop:16}} onClick={onClose}>Fermer</button>
          </div>
        ):(
          <>
            <div style={{textAlign:'center',marginBottom:20}}>
              <div style={{fontSize:36,marginBottom:6}}>⭐</div>
              <h3 style={{color:'var(--navy)',margin:0}}>Laissez votre avis</h3>
              {bk&&<p style={{color:'var(--muted)',fontSize:13,marginTop:4}}>{bk.offer_title||'Votre voyage'}</p>}
            </div>
            {/* Stars */}
            <div style={{display:'flex',justifyContent:'center',gap:8,marginBottom:20}}>
              {[1,2,3,4,5].map(s=>(
                <span key={s} onClick={()=>setRating(s)} onMouseEnter={()=>setHover(s)} onMouseLeave={()=>setHover(0)}
                  style={{fontSize:36,cursor:'pointer',color:(hover||rating)>=s?'#F59E0B':'#E2EBF0',transition:'color .15s'}}>★</span>
              ))}
            </div>
            <input value={title} onChange={e=>setTitle(e.target.value)} placeholder="Titre de votre avis *"
              style={{width:'100%',padding:'10px 14px',borderRadius:12,border:'1.5px solid #E2EBF0',fontSize:14,marginBottom:10,boxSizing:'border-box'}}/>
            <textarea value={comment} onChange={e=>setComment(e.target.value)} placeholder="Décrivez votre expérience…" rows={4}
              style={{width:'100%',padding:'10px 14px',borderRadius:12,border:'1.5px solid #E2EBF0',fontSize:14,marginBottom:10,resize:'vertical',boxSizing:'border-box'}}/>
            {/* Photo upload */}
            <label style={{display:'block',marginBottom:16}}>
              <div style={{border:'1.5px dashed #0DB9A8',borderRadius:12,padding:'10px 14px',fontSize:13,color:'var(--teal2)',cursor:'pointer',textAlign:'center'}}>
                {photo?'✅ Photo ajoutée — cliquer pour changer':'📷 Ajouter une photo (optionnel)'}
              </div>
              <input type="file" accept="image/*" style={{display:'none'}} onChange={handlePhoto}/>
            </label>
            {photo&&<img src={photo} style={{width:'100%',borderRadius:12,marginBottom:12,maxHeight:160,objectFit:'cover'}} alt="preview"/>}
            <button style={{...B.pri,width:'100%',padding:'13px'}} onClick={submit} disabled={submitting}>
              {submitting?'Publication…':'Publier mon avis ⭐'}
            </button>
          </>
        )}
      </div>
    </div>
  );
}

/* ── AGENCY REVIEW REPLY ──────────────────────────────────────────────────── */
function ReviewCard({r,isAgency=false,onReply}){
  const [replyMode,setReplyMode]=useState(false);
  const [replyText,setReplyText]=useState(r.agency_reply||'');
  const [saving,setSaving]=useState(false);
  const {show}=useToast();

  const saveReply=async()=>{
    setSaving(true);
    try{await api(`/reviews/${r.id}/reply`,{method:'PATCH',body:{reply:replyText}});
      show('Réponse publiée !');setReplyMode(false);if(onReply)onReply();}
    catch(e){show(e.message,'err');}
    setSaving(false);
  };

  return(
    <div style={{background:'#F8FAFC',borderRadius:14,padding:'16px 18px',marginBottom:12}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:6}}>
        <div>
          <div style={{display:'flex',gap:2,marginBottom:4}}>
            {[1,2,3,4,5].map(s=><span key={s} style={{color:r.rating>=s?'#F59E0B':'#E2EBF0',fontSize:15}}>★</span>)}
          </div>
          <div style={{fontWeight:700,fontSize:14,color:'var(--navy)'}}>{r.title}</div>
        </div>
        <div style={{textAlign:'right'}}>
          <div style={{fontSize:11,color:'var(--muted)'}}>{r.user_name||'Voyageur'}</div>
          <div style={{fontSize:11,color:'var(--muted)'}}>{r.created_at?new Date(r.created_at).toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric'}):''}</div>
        </div>
      </div>
      {r.comment&&<p style={{fontSize:13,color:'#374151',margin:'4px 0 8px'}}>{r.comment}</p>}
      {r.photo&&<img src={r.photo} style={{width:'100%',maxHeight:180,objectFit:'cover',borderRadius:10,marginBottom:8}} alt=""/>}
      {r.agency_reply&&!replyMode&&(
        <div style={{background:'#EFF6FF',borderRadius:10,padding:'10px 14px',marginTop:8,borderLeft:'3px solid #0DB9A8'}}>
          <div style={{fontSize:11,fontWeight:700,color:'var(--teal2)',marginBottom:4}}>Réponse de l&apos;agence</div>
          <p style={{fontSize:13,color:'#374151',margin:0}}>{r.agency_reply}</p>
        </div>
      )}
      {isAgency&&!replyMode&&(
        <button onClick={()=>setReplyMode(true)} style={{...B.ghost,fontSize:12,padding:'5px 12px',marginTop:8}}>
          {r.agency_reply?'Modifier la réponse':'Répondre'}
        </button>
      )}
      {isAgency&&replyMode&&(
        <div style={{marginTop:8}}>
          <textarea value={replyText} onChange={e=>setReplyText(e.target.value)} rows={3}
            placeholder="Votre réponse publique…"
            style={{width:'100%',padding:'8px 12px',borderRadius:10,border:'1.5px solid #E2EBF0',fontSize:13,resize:'vertical',boxSizing:'border-box',marginBottom:6}}/>
          <div style={{display:'flex',gap:8}}>
            <button style={{...B.pri,fontSize:12,padding:'6px 14px'}} onClick={saveReply} disabled={saving}>{saving?'…':'Publier'}</button>
            <button style={{...B.ghost,fontSize:12,padding:'6px 14px'}} onClick={()=>setReplyMode(false)}>Annuler</button>
          </div>
        </div>
      )}
    </div>
  );
}

function App(){
  const [lang,setLang]=useState(localStorage.getItem('glz_lang')||'fr');
  const [page,setPage]=useState('home');
  const [filterCat,setFilterCat]=useState('all');
  const [authModal,setAuthModal]=useState(null);
  const [selOffer,setSelOffer]=useState(null);
  const [forgotModal,setForgotModal]=useState(false);
  const [resetToken,setResetToken]=useState(null);
  const [reviewBookingId,setReviewBookingId]=useState(null);
  const t=TR[lang];

  useEffect(()=>{track('page_view',{metadata:{page}});},[page]);
  useEffect(()=>{
    const params=new URLSearchParams(window.location.search);
    const tok=params.get('reset_token');
    const rbid=params.get('review_booking');
    if(tok){setResetToken(tok);window.history.replaceState({},'',window.location.pathname);}
    if(rbid){setReviewBookingId(rbid);window.history.replaceState({},'',window.location.pathname);}
    const handler=()=>setForgotModal(true);
    document.addEventListener('openForgot',handler);
    return()=>document.removeEventListener('openForgot',handler);
  },[]);

  return(
    <div style={{direction:lang==='ar'?'rtl':'ltr'}}>
      <Navbar page={page} setPage={setPage} lang={lang} setLang={setLang} openAuth={setAuthModal} t={t}/>
      {page==='home'&&<HomePage t={t} setPage={setPage} setFilterCat={setFilterCat} onOpen={setSelOffer}/>}
      {page==='trips'&&<TripsPage t={t} filterCat={filterCat} setFilterCat={setFilterCat} onOpen={setSelOffer}/>}
      {page==='about'&&<AboutPage t={t}/>}
      {page==='dash'&&<DashPage t={t} openAuth={setAuthModal} setReviewBookingId={setReviewBookingId}/>}
      {page==='analytics'&&<AgencyAnalyticsPage t={t} openAuth={setAuthModal}/>}
      {page==='admin'&&<AdminPage t={t} openAuth={setAuthModal}/>}
      <Footer t={t} setPage={setPage}/>
      {authModal&&<AuthModal mode={authModal} onClose={()=>setAuthModal(null)} t={t}/>}
      {selOffer&&<OfferModal offer={selOffer} onClose={()=>setSelOffer(null)} t={t} lang={lang}/>}
      {forgotModal&&<ForgotPasswordModal onClose={()=>setForgotModal(false)} t={t} openAuth={setAuthModal}/>}
      {resetToken&&<ResetPasswordModal token={resetToken} onClose={()=>setResetToken(null)} t={t} openAuth={setAuthModal}/>}
      {reviewBookingId&&<ReviewModal bookingId={reviewBookingId} onClose={()=>setReviewBookingId(null)} t={t}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <AuthProvider><ToastProvider><App/></ToastProvider></AuthProvider>
);
</script>
</body>
