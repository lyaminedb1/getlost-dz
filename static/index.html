/* \u2500\u2500 API \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
async function api(path,opts={}){
  const tok=localStorage.getItem('glz_tok');
  const res=await fetch('/api'+path,{
    headers:{'Content-Type':'application/json',...(tok?{Authorization:`Bearer ${tok}`}:{})},
    method:opts.method||'GET',
    body:opts.body?JSON.stringify(opts.body):undefined
  });
  const data=await res.json();
  if(!res.ok)throw new Error(data.error||'Erreur');
  return data;
}

/* \u2500\u2500 AUTH CONTEXT \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
const AuthCtx=createContext(null);
function AuthProvider({children}){
  const [user,setUser]=useState(null);
  useEffect(()=>{const s=localStorage.getItem('glz_user');if(s)try{setUser(JSON.parse(s))}catch{}},[]);
  const login=async(email,password)=>{
    const d=await api('/auth/login',{method:'POST',body:{email,password}});
    localStorage.setItem('glz_tok',d.token);localStorage.setItem('glz_user',JSON.stringify(d.user));
    setUser(d.user);return d.user;
  };
  const register=async(body)=>{
    const d=await api('/auth/register',{method:'POST',body});
    localStorage.setItem('glz_tok',d.token);localStorage.setItem('glz_user',JSON.stringify(d.user));
    setUser(d.user);return d.user;
  };
  const logout=()=>{localStorage.removeItem('glz_tok');localStorage.removeItem('glz_user');setUser(null);};
  return <AuthCtx.Provider value={{user,login,register,logout}}>{children}</AuthCtx.Provider>;
}
const useAuth=()=>useContext(AuthCtx);

/* \u2500\u2500 TOAST \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
const ToastCtx=createContext(null);
function ToastProvider({children}){
  const [toasts,setToasts]=useState([]);
  const show=(msg,type='ok')=>{
    const id=Date.now()+Math.random();
    setToasts(p=>[...p,{id,msg,type}]);
    setTimeout(()=>setToasts(p=>p.filter(t=>t.id!==id)),4000);
  };
  const colors={ok:{bg:'#10B981',text:'#fff'},err:{bg:'#EF4444',text:'#fff'},warn:{bg:'#F59E0B',text:'#fff'}};
  return(
    <ToastCtx.Provider value={{show}}>
      {children}
      <div style={{position:'fixed',top:76,right:18,zIndex:9999,display:'flex',flexDirection:'column',gap:8}}>
        {toasts.map(t=>{const c=colors[t.type]||colors.ok;return(
          <div key={t.id} className="toast-in" style={{padding:'12px 20px',borderRadius:12,fontSize:14,fontWeight:600,maxWidth:340,background:c.bg,color:c.text,boxShadow:'0 8px 24px rgba(0,0,0,.15)'}}>
            {t.type==='ok'?'\u2705':t.type==='err'?'\u274c':'\u26a0\ufe0f'} {t.msg}
          </div>
        );})}
      </div>
    </ToastCtx.Provider>
  );
}
const useToast=()=>useContext(ToastCtx);

const Stars=({v=0,size=14,interactive=false,onRate})=>{
  const [h,setH]=useState(0);
  return <span style={{display:'inline-flex',gap:2}}>{[1,2,3,4,5].map(i=>(
    <span key={i} style={{fontSize:size,cursor:interactive?'pointer':'default',color:i<=(h||v)?'#F59E0B':'#DDE5E8',lineHeight:1}}
      onClick={()=>interactive&&onRate?.(i)} onMouseEnter={()=>interactive&&setH(i)} onMouseLeave={()=>interactive&&setH(0)}>\u2605</span>
  ))}</span>;
};

const Badge=({status})=>{
  const m={approved:{bg:'#D1FAE5',c:'#065F46'},pending:{bg:'#FEF3C7',c:'#92400E'},rejected:{bg:'#FEE2E2',c:'#991B1B'},suspended:{bg:'#FEE2E2',c:'#991B1B'}};
  const s=m[status]||m.pending;
  return <span style={{padding:'3px 11px',borderRadius:20,fontSize:11,fontWeight:700,background:s.bg,color:s.c,letterSpacing:.3}}>{status}</span>;
};

/* \u2500\u2500 NAVBAR \u2014 with hamburger mobile menu \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
function Navbar({page,setPage,lang,setLang,openAuth,t}){
  const {user,logout}=useAuth();
  const {show}=useToast();
  const [scroll,setScroll]=useState(false);
  const [menuOpen,setMenuOpen]=useState(false);
  useEffect(()=>{const h=()=>setScroll(window.scrollY>30);window.addEventListener('scroll',h);return()=>window.removeEventListener('scroll',h);},[]);
  const nl=(pg)=>({padding:'8px 16px',borderRadius:8,fontSize:13,fontWeight:600,cursor:'pointer',border:'none',background:page===pg?'var(--teal3)':'transparent',color:page===pg?'var(--teal2)':'var(--navy)',transition:'all .18s'});
  const navTo=(pg)=>{setPage(pg);setMenuOpen(false);};
  return(
    <nav style={{position:'fixed',top:0,left:0,right:0,zIndex:300,background:'rgba(255,255,255,.97)',backdropFilter:'blur(20px)',borderBottom:scroll?'1px solid #E8F0F2':'1px solid transparent',boxShadow:scroll?'var(--shadow)':'none',transition:'all .3s'}}>
      <div style={{maxWidth:1280,margin:'0 auto',padding:'0 20px',height:68,display:'flex',alignItems:'center',justifyContent:'space-between',direction:lang==='ar'?'rtl':'ltr'}}>
        {/* LOGO */}
        <div style={{cursor:'pointer',display:'flex',alignItems:'center'}} onClick={()=>navTo('home')}>
          <img src="/logo-1.png" alt="Get Lost DZ" style={{height:44,width:'auto',objectFit:'contain'}}
            onError={e=>{e.target.style.display='none';e.target.nextSibling.style.display='flex';}}/>
          <div style={{display:'none',alignItems:'center',gap:8}}>
            <div style={{fontFamily:'Nunito',fontWeight:900,fontSize:18,color:'var(--teal2)'}}>Get Lost DZ</div>
          </div>
        </div>
        {/* NAV LINKS \u2014 desktop only */}
        <div className="nav-links" style={{display:'flex',gap:4,alignItems:'center'}}>
          <button style={nl('home')} onClick={()=>navTo('home')}>{t.navHome}</button>
          <button style={nl('trips')} onClick={()=>navTo('trips')}>{t.navTrips}</button>
          <button style={nl('about')} onClick={()=>navTo('about')}>{t.navAbout}</button>
          {user&&<button style={nl('dash')} onClick={()=>navTo('dash')}>{t.navDash}</button>}
          {user?.role==='admin'&&<button style={nl('admin')} onClick={()=>navTo('admin')}>{t.navAdmin}</button>}
        </div>
        {/* RIGHT \u2014 desktop only */}
        <div className="nav-right-desktop" style={{display:'flex',gap:8,alignItems:'center'}}>
          <div style={{display:'flex',gap:2,background:'#F0F4F5',borderRadius:8,padding:3}}>
            {['fr','en','ar'].map(l=>(
              <button key={l} style={{padding:'4px 10px',borderRadius:6,fontSize:11,fontWeight:700,border:'none',cursor:'pointer',background:lang===l?'var(--teal)':'transparent',color:lang===l?'#fff':'var(--muted)',transition:'all .18s'}} onClick={()=>setLang(l)}>{l.toUpperCase()}</button>
            ))}
          </div>
          {user?(
            <>
              <div style={{display:'flex',alignItems:'center',gap:8,background:'var(--teal3)',borderRadius:50,padding:'5px 14px 5px 5px',cursor:'pointer'}} onClick={()=>navTo('dash')}>
                <div style={{width:28,height:28,borderRadius:'50%',background:'linear-gradient(135deg,var(--teal),var(--teal2))',display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,fontWeight:800,color:'#fff'}}>{user.name[0].toUpperCase()}</div>
                <span style={{fontSize:13,fontWeight:700,color:'var(--teal2)'}}>{user.name.split(' ')[0]}</span>
              </div>
              <button style={{...B.ghost,padding:'8px 16px',fontSize:13}} onClick={()=>{logout();setPage('home');show('\u00c0 bient\u00f4t !')}}>{t.navLogout}</button>
            </>
          ):(
            <>
              <button style={{...B.ghost,padding:'8px 18px',fontSize:13}} onClick={()=>openAuth('login')}>{t.navLogin}</button>
              <button style={{...B.pri,padding:'8px 20px',fontSize:13}} onClick={()=>openAuth('register')}>{t.navReg}</button>
            </>
          )}
        </div>
        {/* HAMBURGER \u2014 mobile only */}
        <button className="hamburger-btn" onClick={()=>setMenuOpen(o=>!o)}
          style={{display:'none',alignItems:'center',justifyContent:'center',width:40,height:40,borderRadius:10,border:'1.5px solid #E2EBF0',background:'#fff',cursor:'pointer',fontSize:20,color:'var(--navy)',flexShrink:0}}>
          {menuOpen?'\u2715':'\u2630'}
        </button>
      </div>
      {/* MOBILE DROPDOWN MENU */}
      {menuOpen&&(
        <div className="mobile-menu-open" style={{flexDirection:'column',background:'rgba(255,255,255,.98)',backdropFilter:'blur(20px)',borderTop:'1px solid #E8F0F2',padding:'10px 16px 18px',gap:4,boxShadow:'0 12px 32px rgba(11,35,64,.1)'}}>
          {[
            ['home',t.navHome,'\ud83c\udfe0'],
            ['trips',t.navTrips,'\u2708\ufe0f'],
            ['about',t.navAbout,'\u2139\ufe0f'],
            ...(user?[['dash',t.navDash,'\ud83d\udc64']]:[]),
            ...(user?.role==='admin'?[['admin',t.navAdmin,'\ud83d\udee1\ufe0f']]:[])
          ].map(([pg,label,ico])=>(
            <button key={pg} onClick={()=>navTo(pg)}
              style={{padding:'11px 14px',borderRadius:10,fontSize:14,fontWeight:600,border:'none',textAlign:'left',cursor:'pointer',background:page===pg?'var(--teal3)':'transparent',color:page===pg?'var(--teal2)':'var(--navy)',transition:'all .15s',width:'100%'}}>
              {ico} {label}
            </button>
          ))}
          <div style={{height:1,background:'#E8F0F2',margin:'6px 0'}}/>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:8}}>
            <div style={{display:'flex',gap:3,background:'#F0F4F5',borderRadius:8,padding:3}}>
              {['fr','en','ar'].map(l=>(
                <button key={l} style={{padding:'5px 10px',borderRadius:6,fontSize:11,fontWeight:700,border:'none',cursor:'pointer',background:lang===l?'var(--teal)':'transparent',color:lang===l?'#fff':'var(--muted)',transition:'all .18s'}} onClick={()=>setLang(l)}>{l.toUpperCase()}</button>
              ))}
            </div>
            {user?(
              <button style={{...B.ghost,padding:'8px 14px',fontSize:13}} onClick={()=>{logout();setPage('home');setMenuOpen(false);show('\u00c0 bient\u00f4t !')}}>{t.navLogout}</button>
            ):(
              <div style={{display:'flex',gap:6}}>
                <button style={{...B.ghost,padding:'7px 14px',fontSize:12}} onClick={()=>{openAuth('login');setMenuOpen(false);}}>{t.navLogin}</button>
                <button style={{...B.pri,padding:'7px 14px',fontSize:12}} onClick={()=>{openAuth('register');setMenuOpen(false);}}>{t.navReg}</button>
              </div>
            )}
          </div>
        </div>
      )}
    </nav>
  );
}

/* \u2500\u2500 OFFER CARD \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
function OfferCard({offer,t,onOpen}){
  const [hov,setHov]=useState(false);
  const avg=offer.avg_rating;
  return(
    <div onClick={()=>onOpen(offer)}
      onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
      style={{background:'#fff',borderRadius:20,overflow:'hidden',border:'1px solid #EEF3F5',cursor:'pointer',transition:'all .25s',boxShadow:hov?'0 20px 50px rgba(13,185,168,.18)':'var(--shadow)',transform:hov?'translateY(-5px)':'none'}}>
      <div style={{position:'relative'}}>
        <img src={offer.image_url||'https://images.unsplash.com/photo-1469854523086-cc02fe5d8800?w=500&q=80'} alt={offer.title}
          onError={e=>e.target.src='https://images.unsplash.com/photo-1469854523086-cc02fe5d8800?w=500&q=80'}
          style={{width:'100%',height:200,objectFit:'cover',display:'block',transition:'transform .3s',...(hov?{transform:'scale(1.03)'}:{})}}/>
        <div style={{position:'absolute',top:12,left:12,background:'rgba(255,255,255,.95)',backdropFilter:'blur(4px)',borderRadius:20,padding:'4px 12px',fontSize:11,fontWeight:700,color:'var(--teal2)'}}>
          {t.catIco[offer.category]} {t.cats[offer.category]||offer.category}
        </div>
        {avg&&<div style={{position:'absolute',bottom:12,right:12,background:'rgba(255,255,255,.95)',borderRadius:20,padding:'4px 10px',display:'flex',alignItems:'center',gap:4}}>
          <span style={{color:'#F59E0B',fontSize:13}}>\u2605</span>
          <span style={{fontSize:12,fontWeight:800,color:'var(--navy)'}}>{avg}</span>
        </div>}
      </div>
      <div style={{padding:'16px 20px 20px'}}>
        <div style={{fontFamily:'Nunito',fontWeight:800,fontSize:16,color:'var(--navy)',marginBottom:6,lineHeight:1.3}}>{offer.title}</div>
        <div style={{display:'flex',gap:14,color:'var(--muted)',fontSize:12,fontWeight:500,marginBottom:14,flexWrap:'wrap'}}>
          <span>\ud83d\udccd {offer.region}</span>
          <span>\u23f1 {offer.duration}{t.days}</span>
          <span>\ud83d\udcac {offer.review_count||0} {t.revs}</span>
        </div>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div>
            <div style={{fontSize:10,color:'var(--muted)',fontWeight:600,textTransform:'uppercase',letterSpacing:.8,marginBottom:1}}>{t.from}</div>
            <div style={{fontFamily:'Nunito',fontWeight:900,fontSize:20,color:'var(--teal2)',lineHeight:1}}>
              {(offer.price||0).toLocaleString()} <span style={{fontSize:11,color:'var(--muted)',fontWeight:500}}>DZD{t.per}</span>
            </div>
          </div>
          <button style={{...B.pri,padding:'9px 18px',fontSize:12}} onClick={e=>{e.stopPropagation();onOpen(offer);}}>{t.details}</button>
        </div>
      </div>
    </div>
  );
}

/* \u2500\u2500 OFFER MODAL \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
function OfferModal({offer,onClose,t,lang}){
  const {user}=useAuth();
  const {show}=useToast();
  const [reviews,setReviews]=useState([]);
  const [rf,setRf]=useState({rating:0,title:'',comment:''});
  const [booking,setBooking]=useState(false);
  const [submitting,setSubmitting]=useState(false);
  const rtl=lang==='ar';
  useEffect(()=>{if(offer)api(`/offers/${offer.id}/reviews`).then(setReviews).catch(()=>{});},[offer?.id]);
  if(!offer)return null;
  const avg=reviews.length?(reviews.reduce((s,r)=>s+r.rating,0)/reviews.length).toFixed(1):(offer.avg_rating||null);
  const SL=({children})=><div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:1.5,color:'var(--teal2)',marginBottom:10}}>{children}</div>;
  const [phone,setPhone]=useState('');
  const handleBook=async()=>{
    if(!user){onClose();show('Connectez-vous pour r\u00e9server','warn');return;}
    if(!phone.trim()){show('Num\u00e9ro de t\u00e9l\u00e9phone requis','err');return;}
    const digits=(phone.match(/\\d/g)||[]).length;
    if(digits<8){show('Num\u00e9ro invalide (min. 8 chiffres)','err');return;}
    setBooking(true);
    try{await api('/bookings',{method:'POST',body:{offerId:offer.id,phone:phone.trim()}});show(t.bookMsg);setPhone('');}
    catch(e){show(e.message,'err');}
    setBooking(false);
  };
  const handleReview=async()=>{
    if(!user){show('Connectez-vous pour laisser un avis','warn');return;}
    if(!rf.rating||!rf.title.trim()){show('Note et titre requis','err');return;}
    setSubmitting(true);
    try{await api(`/offers/${offer.id}/reviews`,{method:'POST',body:rf});show('Avis soumis, il sera publi\u00e9 apr\u00e8s mod\u00e9ration.');setRf({rating:0,title:'',comment:''});}
    catch(e){show(e.message,'err');}
    setSubmitting(false);
  };
  return(
    <div style={{position:'fixed',inset:0,background:'rgba(11,35,64,.6)',backdropFilter:'blur(8px)',zIndex:500,display:'flex',alignItems:'center',justifyContent:'center',padding:16}} onClick={onClose}>
      <div style={{background:'#fff',borderRadius:24,overflow:'hidden',maxWidth:660,width:'100%',maxHeight:'92vh',overflowY:'auto',direction:rtl?'rtl':'ltr'}} className="fade" onClick={e=>e.stopPropagation()}>
        <div style={{position:'relative'}}>
          <img src={offer.image_url||'https://images.unsplash.com/photo-1469854523086-cc02fe5d8800?w=700&q=80'} alt={offer.title}
            onError={e=>e.target.src='https://images.unsplash.com/photo-1469854523086-cc02fe5d8800?w=700&q=80'}
            style={{width:'100%',height:240,objectFit:'cover',display:'block'}}/>
          <button onClick={onClose} style={{position:'absolute',top:14,right:14,background:'rgba(255,255,255,.95)',border:'none',borderRadius:'50%',width:36,height:36,fontSize:18,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 2px 12px rgba(0,0,0,.15)'}}>\u00d7</button>
          <div style={{position:'absolute',bottom:14,left:14,background:'rgba(255,255,255,.95)',borderRadius:20,padding:'4px 14px',fontSize:11,fontWeight:700,color:'var(--teal2)'}}>{t.catIco[offer.category]} {t.cats[offer.category]}</div>
        </div>
        <div style={{padding:'24px 28px 30px'}}>
          <div style={{fontFamily:'Nunito',fontWeight:900,fontSize:22,color:'var(--navy)',marginBottom:8}}>{offer.title}</div>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:16}}>
            <Stars v={parseFloat(avg)||0} size={16}/>
            {avg&&<span style={{fontWeight:800,color:'#F59E0B'}}>{avg}</span>}
            <span style={{color:'var(--muted)',fontSize:13}}>({reviews.length} {t.revs})</span>
          </div>
          <div style={{display:'flex',flexWrap:'wrap',gap:8,marginBottom:18}}>
            {[['\ud83d\udccd',offer.region],['\u23f1',`${offer.duration} ${t.days}`],['\ud83d\udcb0',`${(offer.price||0).toLocaleString()} DZD${t.per}`],offer.agency_name&&['\ud83c\udfe2',offer.agency_name]].filter(Boolean).filter(([,v])=>v).map(([i,v])=>(
              <span key={v} style={{padding:'6px 14px',background:'#F7FAFA',borderRadius:20,fontSize:13,fontWeight:500,color:'var(--text)'}}>{i} {v}</span>
            ))}
          </div>
          {offer.description&&<p style={{color:'var(--muted)',lineHeight:1.8,marginBottom:20,fontSize:14}}>{offer.description}</p>}
          {offer.itinerary?.length>0&&<div style={{marginBottom:18}}>
            <SL>{t.itin}</SL>
            {offer.itinerary.map((s,i)=><div key={i} style={{display:'flex',gap:12,marginBottom:7,fontSize:14}}>
              <span style={{width:22,height:22,borderRadius:'50%',background:'var(--teal3)',color:'var(--teal2)',display:'inline-flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:800,flexShrink:0,marginTop:1}}>{i+1}</span>
              <span style={{color:'var(--text)'}}>{s}</span>
            </div>)}
          </div>}
          {offer.includes?.length>0&&<div style={{marginBottom:18}}>
            <SL>{t.incl}</SL>
            <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
              {offer.includes.map((x,i)=><span key={i} style={{padding:'6px 14px',background:'var(--teal3)',borderRadius:20,fontSize:12,fontWeight:600,color:'var(--teal2)'}}>\u2713 {x}</span>)}
            </div>
          </div>}
          {offer.available_dates?.length>0&&<div style={{marginBottom:22}}>
            <SL>{t.dates}</SL>
            <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
              {offer.available_dates.map((d,i)=><span key={i} style={{padding:'6px 14px',background:'#F7FAFA',borderRadius:20,fontSize:12,border:'1px solid #E2EBF0'}}>\ud83d\udcc5 {d}</span>)}
            </div>
          </div>}
          {/* Reviews */}
          <div style={{borderTop:'2px solid #F0F4F5',paddingTop:20,marginBottom:16}}>
            <SL>\ud83d\udcac {t.revTitle}</SL>
            {reviews.length===0?<p style={{color:'var(--muted)',fontSize:14}}>{t.noRevs}</p>
            :reviews.map(r=>(
              <div key={r.id} style={{background:'#FAFCFC',borderRadius:14,padding:'14px 16px',marginBottom:10,border:'1px solid #EEF3F5'}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                  <div style={{display:'flex',alignItems:'center',gap:8}}>
                    <div style={{width:28,height:28,borderRadius:'50%',background:'linear-gradient(135deg,var(--teal),var(--teal2))',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:800,color:'#fff'}}>{r.user_name?.[0]?.toUpperCase()}</div>
                    <span style={{fontWeight:700,fontSize:14,color:'var(--navy)'}}>{r.user_name}</span>
                    <Stars v={r.rating} size={12}/>
                  </div>
                  <span style={{fontSize:11,color:'var(--muted)'}}>{(r.created_at||'').split('T')[0]}</span>
                </div>
                <div style={{fontWeight:600,fontSize:14,marginBottom:3,color:'var(--navy)'}}>{r.title}</div>
                {r.comment&&<div style={{color:'var(--muted)',fontSize:13}}>{r.comment}</div>}
              </div>
            ))}
          </div>
          {user?.role==='traveler'&&<div style={{background:'var(--teal3)',borderRadius:16,padding:20,marginBottom:20}}>
            <SL>\u270f\ufe0f {t.leaveRev}</SL>
            <div style={{marginBottom:12}}>
              <div style={{fontSize:12,color:'var(--muted)',marginBottom:6,fontWeight:600}}>{t.yourRating}</div>
              <Stars v={rf.rating} size={28} interactive onRate={v=>setRf(p=>({...p,rating:v}))}/>
            </div>
            <input style={INP} placeholder={t.revTitle+'\u2026'} value={rf.title} onChange={e=>setRf(p=>({...p,title:e.target.value}))}/>
            <textarea style={TA(70)} placeholder={t.revPlaceholder} value={rf.comment} onChange={e=>setRf(p=>({...p,comment:e.target.value}))}/>
            <button style={B.pri} onClick={handleReview} disabled={submitting}>{submitting?'\u2026':t.submitRev}</button>
          </div>}
          {/* Book CTA */}
          <div style={{background:'linear-gradient(135deg,var(--navy),var(--navy2))',borderRadius:16,padding:'20px 24px'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
              <div>
                <div style={{fontSize:11,color:'rgba(255,255,255,.6)',textTransform:'uppercase',letterSpacing:1,marginBottom:2}}>{t.from}</div>
                <div style={{fontFamily:'Nunito',fontWeight:900,fontSize:26,color:'var(--teal)',lineHeight:1}}>
                  {(offer.price||0).toLocaleString()} <span style={{fontSize:12,color:'rgba(255,255,255,.5)',fontWeight:400}}>DZD{t.per}</span>
                </div>
              </div>
            </div>
            <div style={{display:'flex',gap:10,alignItems:'center'}}>
              <input
                style={{flex:1,background:'rgba(255,255,255,.12)',border:'1.5px solid rgba(255,255,255,.25)',borderRadius:10,padding:'11px 14px',fontSize:14,color:'#fff'}}
                placeholder={'\ud83d\udcde '+t.phoneLbl+' \u2014 ex: 0770 123 456'}
                value={phone}
                onChange={e=>setPhone(e.target.value)}
                onKeyDown={e=>e.key==='Enter'&&handleBook()}
              />
              <button style={{...B.white,fontSize:13,padding:'11px 20px',flexShrink:0}} onClick={handleBook} disabled={booking}>{booking?'\u2026':t.book}</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

/* \u2500\u2500 AUTH MODAL \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
function AuthModal({mode,onClose,t}){
  const {login,register}=useAuth();
  const {show}=useToast();
  const [isLogin,setIsLogin]=useState(mode==='login');
  const [role,setRole]=useState('traveler');
  const [f,setF]=useState({email:'',password:'',name:'',agencyName:'',description:''});
  const [loading,setLoading]=useState(false);
  useEffect(()=>setIsLogin(mode==='login'),[mode]);
  const submit=async()=>{
    if(!f.email||!f.password){show('Email et mot de passe requis','err');return;}
    setLoading(true);
    try{
      if(isLogin){const u=await login(f.email,f.password);show(`Bienvenue, ${u.name}!`);}
      else{if(!f.name){show('Nom requis','err');setLoading(false);return;}await register({...f,role});show('Compte cr\u00e9\u00e9 !');}
      onClose();
    }catch(e){show(e.message,'err');}
    setLoading(false);
  };
  return(
    <div style={{position:'fixed',inset:0,background:'rgba(11,35,64,.6)',backdropFilter:'blur(8px)',zIndex:500,display:'flex',alignItems:'center',justifyContent:'center',padding:16}} onClick={onClose}>
      <div style={{background:'#fff',borderRadius:24,padding:'32px 28px',maxWidth:420,width:'100%',boxShadow:'0 24px 60px rgba(11,35,64,.2)'}} className="fade" onClick={e=>e.stopPropagation()}>
        <div style={{textAlign:'center',marginBottom:24}}>
          <img src="/logo-1.png" alt="Get Lost DZ" style={{height:52,marginBottom:14}}
            onError={e=>e.target.style.display='none'}/>
          <div style={{fontFamily:'Nunito',fontWeight:900,fontSize:20,color:'var(--navy)'}}>{isLogin?t.loginTitle:t.regTitle}</div>
        </div>
        {!isLogin&&(
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:16}}>
            {['traveler','agency'].map(r=>(
              <button key={r} style={{padding:'11px 0',borderRadius:12,fontWeight:700,fontSize:13,border:`2px solid ${role===r?'var(--teal)':'#E2EBF0'}`,background:role===r?'var(--teal3)':'#fff',color:role===r?'var(--teal2)':'var(--muted)',cursor:'pointer',transition:'all .18s'}}
                onClick={()=>setRole(r)}>{r==='traveler'?`\ud83e\uddf3 ${t.roleT}`:`\ud83c\udfe2 ${t.roleA}`}</button>
            ))}
          </div>
        )}
        <input style={INP} type="email" placeholder={t.emailLbl} value={f.email} onChange={e=>setF(p=>({...p,email:e.target.value}))}/>
        <input style={INP} type="password" placeholder={t.passLbl} value={f.password} onChange={e=>setF(p=>({...p,password:e.target.value}))} onKeyDown={e=>e.key==='Enter'&&submit()}/>
        {!isLogin&&<>
          <input style={INP} placeholder={role==='agency'?t.agNameLbl:t.nameLbl} value={f.name} onChange={e=>setF(p=>({...p,name:e.target.value}))}/>
          {role==='agency'&&<textarea style={TA(66)} placeholder={t.descLbl} value={f.description} onChange={e=>setF(p=>({...p,description:e.target.value}))}/>}
        </>}
        <button style={{...B.pri,width:'100%',padding:13,fontSize:15}} onClick={submit} disabled={loading}>{loading?'\u2026':isLogin?t.loginTitle:t.regTitle}</button>
        <div style={{textAlign:'center',marginTop:14,fontSize:13,color:'var(--muted)'}}>
          {isLogin?<>{t.noAcc} <span style={{color:'var(--teal2)',cursor:'pointer',fontWeight:700}} onClick={()=>setIsLogin(false)}>{t.regTitle}</span></>
          :<>{t.hasAcc} <span style={{color:'var(--teal2)',cursor:'pointer',fontWeight:700}} onClick={()=>setIsLogin(true)}>{t.loginTitle}</span></>}
        </div>
        <div style={{marginTop:16,padding:'10px 14px',background:'#F7FAFA',borderRadius:10,fontSize:11,color:'var(--muted)',lineHeight:1.6}}>{t.demo}</div>
      </div>
    </div>
  );
}

/* \u2500\u2500 HOME PAGE \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */

          <div className="fade">

              {t.heroTag}

            <div style={{fontFamily:'Nunito',fontWeight:900,fontSize:'clamp(36px,5vw,62px)',lineHeight:1.1,color:'var(--navy)',marginBottom:20}}>

            <p style={{fontSize:16,color:'var(--muted)',lineHeight:1.8,marginBottom:32,maxWidth:440}}>{t.heroSub}</p>
            <div className="hero-btns" style={{display:'flex',gap:12,flexWrap:'wrap'}}>
              <button style={{...B.pri,fontSize:15,padding:'14px 32px'}} onClick={()=>setPage('trips')}>{t.heroCta}</button>
              <button style={{...B.out,fontSize:15,padding:'13px 32px'}} onClick={()=>setPage('about')}>{t.heroCta2}</button>
            </div>
            {/* Stats */}
            <div className="hero-stats" style={{display:'flex',gap:32,marginTop:44,flexWrap:'wrap'}}>
              {['100K+','1000+','5+','99%'].map((n,i)=>(
                <div key={i}>
                  <div className="stat-num" style={{fontFamily:'Nunito',fontWeight:900,fontSize:26,color:'var(--teal2)',lineHeight:1}}>{n}</div>
                  <div style={{fontSize:11,color:'var(--muted)',fontWeight:600,textTransform:'uppercase',letterSpacing:.8,marginTop:2}}>{t.stats[i]}</div>
                </div>
              ))}
            </div>
          </div>
          {/* RIGHT \u2014 Logo hero image */}
          <div className="hero-right fade" style={{display:'flex',justifyContent:'center',alignItems:'center'}}>
            <div style={{position:'relative'}}>
              <div style={{width:420,height:420,borderRadius:'50%',background:'linear-gradient(135deg,var(--teal3),var(--teal4))',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 20px 60px rgba(13,185,168,.2)',animation:'float 5s ease-in-out infinite'}}>
                <img src="/logo-1.png" alt="Get Lost DZ" style={{width:'75%',height:'75%',objectFit:'contain'}}/>
              </div>
              {/* Floating badges */}
              {[{top:-10,right:20,ico:'\u2708\ufe0f',txt:'International'},{bottom:30,left:-20,ico:'\ud83c\udfd4\ufe0f',txt:'Aventures'},{top:'45%',right:-30,ico:'\u2b50',txt:'4.9/5'}].map((b,i)=>(
                <div key={i} style={{position:'absolute',top:b.top,bottom:b.bottom,left:b.left,right:b.right,background:'#fff',borderRadius:14,padding:'10px 16px',boxShadow:'0 8px 24px rgba(11,35,64,.12)',display:'flex',alignItems:'center',gap:8,whiteSpace:'nowrap'}}>
                  <span style={{fontSize:18}}>{b.ico}</span>
                  <span style={{fontWeight:700,fontSize:13,color:'var(--navy)'}}>{b.txt}</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>

      {/* CATEGORIES */}
      <div style={{background:'#fff',padding:'80px 24px'}}>
        <div style={{maxWidth:1280,margin:'0 auto'}}>
          <SectionTitle center sub="Trouvez le voyage parfait selon vos envies">{t.catTitle}</SectionTitle>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(240px,1fr))',gap:20}}>
            {categories.map(({k,bg})=>(
              <div key={k} onClick={()=>{setFilterCat(k);setPage('trips');}}
                style={{position:'relative',borderRadius:20,overflow:'hidden',cursor:'pointer',height:180,transition:'transform .25s'}}
                onMouseEnter={e=>e.currentTarget.style.transform='translateY(-4px) scale(1.01)'}
                onMouseLeave={e=>e.currentTarget.style.transform='none'}>
                <img src={bg} alt={k} style={{width:'100%',height:'100%',objectFit:'cover'}}/>
                <div style={{position:'absolute',inset:0,background:'linear-gradient(to top,rgba(11,35,64,.75) 0%,rgba(11,35,64,.2) 60%,transparent 100%)'}}/>
                <div style={{position:'absolute',bottom:0,left:0,right:0,padding:'16px 20px'}}>
                  <div style={{fontSize:24,marginBottom:4}}>{t.catIco[k]}</div>
                  <div style={{fontFamily:'Nunito',fontWeight:800,fontSize:16,color:'#fff'}}>{t.cats[k]}</div>
                  <div style={{fontSize:12,color:'rgba(255,255,255,.7)',fontWeight:500}}>{t.catDesc[k]}</div>
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* FEATURED */}
      <div style={{background:'var(--offwhite)',padding:'80px 24px'}}>
        <div style={{maxWidth:1280,margin:'0 auto'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:40,flexWrap:'wrap',gap:16}}>
            <SectionTitle sub="Nos voyages les mieux not\u00e9s par la communaut\u00e9">{t.featTitle}</SectionTitle>
            <button style={{...B.out,marginTop:8}} onClick={()=>setPage('trips')}>{t.seeAll} \u2192</button>
          </div>
          {feat.length===0?<Spin/>:(
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(300px,1fr))',gap:24}}>
              {feat.map(o=><OfferCard key={o.id} offer={o} t={t} onOpen={onOpen}/>)}
            </div>
          )}
        </div>
      </div>

      {/* TRUST BAND */}
      <div style={{background:'linear-gradient(135deg,var(--navy),var(--navy2))',padding:'72px 24px'}}>
        <div style={{maxWidth:1100,margin:'0 auto',textAlign:'center'}}>
          <img src="/logo-1.png" alt="Get Lost DZ" style={{height:80,marginBottom:20,filter:'brightness(0) invert(1) sepia(1) saturate(3) hue-rotate(140deg)'}}
            onError={e=>e.target.style.display='none'}/>
          <div style={{fontFamily:'Nunito',fontWeight:900,fontSize:28,color:'#fff',marginBottom:12}}>Pourquoi choisir Get Lost DZ ?</div>
          <p style={{color:'rgba(255,255,255,.65)',maxWidth:540,margin:'0 auto 32px',lineHeight:1.8}}>Chaque offre est valid\u00e9e par notre \u00e9quipe. Qualit\u00e9, s\u00e9curit\u00e9 et authenticit\u00e9 garanties.</p>
          <div style={{display:'flex',gap:14,justifyContent:'center',flexWrap:'wrap'}}>
            {['\u2705 Offres valid\u00e9es','\u2b50 Avis v\u00e9rifi\u00e9s','\ud83e\udd1d Agences certifi\u00e9es','\ud83c\udf0d 100K communaut\u00e9'].map(x=>(
              <div key={x} style={{background:'rgba(255,255,255,.08)',border:'1px solid rgba(255,255,255,.15)',borderRadius:50,padding:'10px 20px',fontSize:13,fontWeight:600,color:'rgba(255,255,255,.9)'}}>{x}</div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

/* \u2500\u2500 TRIPS PAGE \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
function TripsPage({t,filterCat,setFilterCat,onOpen}){
  const [offers,setOffers]=useState([]);
  const [loading,setLoading]=useState(true);
  const [search,setSearch]=useState('');
  const [sort,setSort]=useState('rating');
  const [debSearch,setDebSearch]=useState('');
  useEffect(()=>{const tm=setTimeout(()=>setDebSearch(search),400);return()=>clearTimeout(tm);},[search]);
  useEffect(()=>{
    setLoading(true);
    const p=new URLSearchParams({sort});
    if(filterCat&&filterCat!=='all')p.set('category',filterCat);
    if(debSearch)p.set('search',debSearch);
    api(`/offers?${p}`).then(d=>{setOffers(d);setLoading(false);}).catch(()=>setLoading(false));
  },[filterCat,sort,debSearch]);
  return(
    <div style={{background:'var(--offwhite)',minHeight:'100vh',paddingTop:68}}>
      {/* Header band */}
      <div style={{background:'linear-gradient(135deg,var(--teal3),var(--teal4))',padding:'48px 24px 36px'}}>
        <div style={{maxWidth:1280,margin:'0 auto'}}>
          <div style={{fontFamily:'Nunito',fontWeight:900,fontSize:'clamp(24px,4vw,38px)',color:'var(--navy)',marginBottom:6}}>Nos Voyages</div>
          <p style={{color:'var(--muted)',fontSize:15}}>D\u00e9couvrez toutes nos offres \u2014 Alg\u00e9rie, Afrique, Asie et plus.</p>
          {/* Search + Sort */}
          <div style={{display:'flex',gap:10,marginTop:24,flexWrap:'wrap'}}>
            <div style={{position:'relative',flex:1,minWidth:240}}>
              <span style={{position:'absolute',left:14,top:'50%',transform:'translateY(-50%)',fontSize:16}}>\ud83d\udd0d</span>
              <input style={{...INP,paddingLeft:42,marginBottom:0,borderRadius:50,boxShadow:'var(--shadow)'}} placeholder={t.srchPh} value={search} onChange={e=>setSearch(e.target.value)}/>
            </div>
            <select style={{...INP,width:'auto',marginBottom:0,borderRadius:50,paddingLeft:16,background:'#fff',cursor:'pointer',boxShadow:'var(--shadow)'}} value={sort} onChange={e=>setSort(e.target.value)}>
              {t.sorts.map(([v,l])=><option key={v} value={v}>{l}</option>)}
            </select>
          </div>
        </div>
      </div>
      <div style={{maxWidth:1280,margin:'0 auto',padding:'28px 24px 60px'}}>
        {/* Category filters \u2014 FIX 2: horizontal scroll on mobile */}
        <div className="cat-filters" style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:28}}>
          {['all','intl','national','hike','visa'].map(c=>(
            <button key={c} style={{padding:'8px 20px',borderRadius:50,cursor:'pointer',fontSize:13,fontWeight:700,border:'none',background:filterCat===c?'var(--teal)':'#fff',color:filterCat===c?'#fff':'var(--text)',boxShadow:filterCat===c?'0 4px 14px rgba(13,185,168,.3)':'var(--shadow)',transition:'all .2s'}}
              onClick={()=>setFilterCat(c)}>{t.catIco[c]||'\ud83c\udf0d'} {t.cats[c]||c}</button>
          ))}
        </div>
        {loading?<Spin/>:offers.length===0
          ?<div style={{textAlign:'center',padding:'60px 0',color:'var(--muted)'}}>
            <div style={{fontSize:48,marginBottom:12}}>\ud83d\udd0d</div>
            <div style={{fontFamily:'Nunito',fontWeight:700,fontSize:18,marginBottom:6}}>Aucune offre trouv\u00e9e</div>
            <div style={{fontSize:14}}>Essayez une autre recherche</div>
          </div>
          :<div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(300px,1fr))',gap:24}}>
            {offers.map(o=><OfferCard key={o.id} offer={o} t={t} onOpen={onOpen}/>)}
          </div>
        }
      </div>
    </div>
  );
}

/* \u2500\u2500 DASHBOARD \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
function DashPage({t,openAuth}){
  const {user}=useAuth();
  const {show}=useToast();
  const [tab,setTab]=useState('stats');
  const [offers,setOffers]=useState([]);
  const [bookings,setBookings]=useState([]);
  const [loading,setLoading]=useState(false);
  const [editTarget,setEditTarget]=useState(null);
  const EF={title:'',category:'national',price:'',duration:'',region:'',description:'',imageUrl:'',itinerary:'',includes:'',dates:''};
  const [form,setForm]=useState(EF);
  const load=useCallback(async()=>{
    if(!user)return;setLoading(true);
    try{
      if(user.role==='agency'&&user.agencyId){setOffers(await api(`/agencies/${user.agencyId}/offers`));setBookings(await api(`/agencies/${user.agencyId}/bookings`));}
      else if(user.role==='traveler'){setBookings(await api('/bookings/my'));}
    }catch(e){show(e.message,'err');}
    setLoading(false);
  },[user]);
  useEffect(()=>{load();},[load]);
  if(!user)return(
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'var(--offwhite)',paddingTop:68}}>
      <Card style={{padding:'48px 40px',textAlign:'center',maxWidth:380}}>
        <div style={{fontSize:48,marginBottom:16}}>\ud83d\udd10</div>
        <div style={{fontFamily:'Nunito',fontWeight:900,fontSize:20,color:'var(--navy)',marginBottom:8}}>Acc\u00e8s r\u00e9serv\u00e9</div>
        <p style={{color:'var(--muted)',marginBottom:24,fontSize:14}}>Connectez-vous pour acc\u00e9der \u00e0 votre espace personnel.</p>
        <button style={{...B.pri,width:'100%'}} onClick={()=>openAuth('login')}>{t.navLogin}</button>
      </Card>
    </div>
  );
  const submitOffer=async()=>{
    if(!form.title||!form.price||!form.region){show('Titre, prix et r\u00e9gion requis','err');return;}
    try{
      const body={title:form.title,category:form.category,price:parseInt(form.price),duration:parseInt(form.duration)||1,region:form.region,description:form.description,imageUrl:form.imageUrl,
        itinerary:form.itinerary.split('\
').filter(Boolean),includes:form.includes.split('\
').filter(Boolean),dates:form.dates.split('\
').filter(Boolean)};
      if(editTarget){await api(`/offers/${editTarget.id}`,{method:'PUT',body});show('Offre mise \u00e0 jour!');}
      else{await api('/offers',{method:'POST',body});show('Offre soumise pour validation!');}
      setForm(EF);setEditTarget(null);setTab('offers');load();
    }catch(e){show(e.message,'err');}
  };
  const delOffer=async(id)=>{
    if(!window.confirm(t.confirmDel))return;
    try{await api(`/offers/${id}`,{method:'DELETE'});show('Offre supprim\u00e9e');load();}
    catch(e){show(e.message,'err');}
  };
  const startEdit=(o)=>{setEditTarget(o);setForm({title:o.title,category:o.category,price:String(o.price),duration:String(o.duration),region:o.region,description:o.description||'',imageUrl:o.image_url||'',itinerary:(o.itinerary||[]).join('\
'),includes:(o.includes||[]).join('\
'),dates:(o.available_dates||[]).join('\
')});setTab('add');};
  const TB=(a)=>({padding:'10px 18px',cursor:'pointer',fontSize:13,fontWeight:700,border:'none',borderBottom:a?'2px solid var(--teal)':'2px solid transparent',color:a?'var(--teal2)':'var(--muted)',background:'none',marginBottom:-1,transition:'all .18s'});
  const FI=({label,fk,type='text'})=><div><label style={{fontSize:12,fontWeight:600,color:'var(--muted)',display:'block',marginBottom:5,textTransform:'uppercase',letterSpacing:.8}}>{label}</label><input style={INP} type={type} value={form[fk]} onChange={e=>setForm(p=>({...p,[fk]:e.target.value}))}/></div>;
  const FTA=({label,fk,h=88})=><div><label style={{fontSize:12,fontWeight:600,color:'var(--muted)',display:'block',marginBottom:5,textTransform:'uppercase',letterSpacing:.8}}>{label}</label><textarea style={TA(h)} value={form[fk]} onChange={e=>setForm(p=>({...p,[fk]:e.target.value}))}/></div>;
  const SC=(ico,lbl,val,c='var(--teal2)')=>(
    <Card style={{padding:'20px 24px'}}>
      <div style={{fontSize:28,marginBottom:10}}>{ico}</div>
      <div style={{fontFamily:'Nunito',fontWeight:900,fontSize:30,color:c,lineHeight:1}}>{val}</div>
      <div style={{color:'var(--muted)',fontSize:12,fontWeight:600,marginTop:4,textTransform:'uppercase',letterSpacing:.8}}>{lbl}</div>
    </Card>
  );

  /* FIX 4: Short date formatter */
  const fmtDate=(d)=>d?new Date(d).toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric'}):'';

  return(
    <div style={{background:'var(--offwhite)',minHeight:'100vh',paddingTop:68}}>
      <div style={{background:'linear-gradient(135deg,var(--teal3),var(--teal4))',padding:'40px 24px 0'}}>
        <div style={{maxWidth:1280,margin:'0 auto'}}>
          <div style={{display:'flex',alignItems:'center',gap:16,marginBottom:24}}>
            <div style={{width:56,height:56,borderRadius:'50%',background:'linear-gradient(135deg,var(--teal),var(--teal2))',display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,fontWeight:900,color:'#fff'}}>{user.name[0]}</div>
            <div>
              <div style={{fontFamily:'Nunito',fontWeight:900,fontSize:22,color:'var(--navy)'}}>{t.dashWelcome}, {user.name} \ud83d\udc4b</div>
              <div style={{color:'var(--muted)',fontSize:13}}>{user.role==='agency'?'Compte Agence':user.role==='admin'?'Administrateur':'Compte Voyageur'}</div>
            </div>
          </div>
          {user.role==='agency'&&(
            <div style={{display:'flex',borderBottom:'2px solid rgba(0,0,0,.08)',gap:4}}>
              {[['stats',t.stats2],['bookings',t.myBook],['offers',t.myOffers],['add',editTarget?t.save:t.addOffer]].map(([tk,lbl])=>(
                <button key={tk} style={TB(tab===tk)} onClick={()=>{if(tk!=='add'){setEditTarget(null);setForm(EF);}setTab(tk);}}>{lbl}</button>
              ))}
            </div>
          )}
        </div>
      </div>
      <div style={{maxWidth:1280,margin:'0 auto',padding:'28px 24px 60px'}}>
        {user.role==='agency'&&<>
          {tab==='stats'&&!loading&&(
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(160px,1fr))',gap:16}}>
              {SC('\ud83d\udce6',t.totOff,offers.length)}
              {SC('\u2705',t.approved,offers.filter(o=>o.status==='approved').length)}
              {SC('\u23f3',t.pending,offers.filter(o=>o.status==='pending').length,'#D97706')}
              {SC('\ud83d\udc41',t.views,offers.reduce((s,o)=>s+(o.views||0),0))}
            </div>
          )}
          {tab==='bookings'&&(loading?<Spin/>:(
            <Card>
              <table style={{width:'100%',borderCollapse:'collapse'}}>
                <thead><tr>{['Voyageur','Email','Offre','Prix','T\u00e9l\u00e9phone','Date','Statut','Action'].map(h=><th key={h} style={TH}>{h}</th>)}</tr></thead>
                <tbody>
                  {bookings.map(b=>(
                    <tr key={b.id} style={{transition:'background .15s'}} onMouseEnter={e=>e.currentTarget.style.background='#FAFCFC'} onMouseLeave={e=>e.currentTarget.style.background=''}>
                      <td style={{...TD,fontWeight:700,color:'var(--navy)'}}><div style={{display:'flex',alignItems:'center',gap:8}}><div style={{width:30,height:30,borderRadius:'50%',background:'linear-gradient(135deg,var(--teal),var(--teal2))',display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,fontWeight:800,color:'#fff',flexShrink:0}}>{(b.traveler_name||'?')[0].toUpperCase()}</div>{b.traveler_name}</div></td>
                      <td style={{...TD,color:'var(--muted)',fontSize:12}}>{b.traveler_email}</td>
                      <td style={{...TD,fontWeight:600,maxWidth:160}}>{b.offer_title}</td>
                      <td style={{...TD,color:'var(--teal2)',fontWeight:700,fontFamily:'Nunito'}}>{(b.price||0).toLocaleString()} DZD</td>
                      <td style={{...TD,fontSize:13}}>{b.phone||<span style={{color:'var(--muted)'}}>\u2014</span>}</td>
                      <td style={{...TD,color:'var(--muted)',fontSize:12}}>{fmtDate(b.created_at)}</td>
                      <td style={TD}><Badge status={b.status}/></td>
                      <td style={TD}><div style={{display:'flex',gap:5}}>
                        {b.status!=='confirmed'&&<button style={B.sm} onClick={async()=>{try{await api(`/bookings/${b.id}/status`,{method:'PATCH',body:{status:'confirmed'}});show('\u2705 R\u00e9servation confirm\u00e9e!');load();}catch(e){show(e.message,'err');}}}>\u2705 Confirmer</button>}
                        {b.status!=='cancelled'&&<button style={B.danger} onClick={async()=>{try{await api(`/bookings/${b.id}/status`,{method:'PATCH',body:{status:'cancelled'}});show('Annul\u00e9e');load();}catch(e){show(e.message,'err');}}}>\u2715 Annuler</button>}
                      </div></td>
                    </tr>
                  ))}
                  {!bookings.length&&<tr><td colSpan={7} style={{...TD,textAlign:'center',color:'var(--muted)',padding:40}}>Aucune r\u00e9servation re\u00e7ue pour l&apos;instant.</td></tr>}
                </tbody>
              </table>
            </Card>
          ))}
          {tab==='offers'&&(loading?<Spin/>:(
            <Card>
              <table style={{width:'100%',borderCollapse:'collapse'}}>
                <thead><tr>{['Titre','Cat.','Prix','Dur\u00e9e','Note','Statut','Actions'].map(h=><th key={h} style={TH}>{h}</th>)}</tr></thead>
                <tbody>
                  {offers.map(o=>(
                    <tr key={o.id} style={{transition:'background .15s'}} onMouseEnter={e=>e.currentTarget.style.background='#FAFCFC'} onMouseLeave={e=>e.currentTarget.style.background=''}>
                      <td style={{...TD,fontWeight:700,color:'var(--navy)'}}>{o.title}</td>
                      <td style={{...TD,color:'var(--muted)'}}>{t.cats[o.category]||o.category}</td>
                      <td style={{...TD,fontWeight:700,color:'var(--teal2)',fontFamily:'Nunito'}}>{(o.price||0).toLocaleString()}</td>
                      <td style={{...TD,color:'var(--muted)'}}>{o.duration}j</td>
                      <td style={TD}>{o.avg_rating?<><Stars v={parseFloat(o.avg_rating)} size={12}/> <span style={{color:'#F59E0B',fontSize:12,fontWeight:700}}>{o.avg_rating}</span></>:'\u2014'}</td>
                      <td style={TD}><Badge status={o.status}/></td>
                      <td style={TD}><div style={{display:'flex',gap:6}}><button style={B.sm} onClick={()=>startEdit(o)}>\u270f\ufe0f</button><button style={B.danger} onClick={()=>delOffer(o.id)}>\ud83d\uddd1\ufe0f</button></div></td>
                    </tr>
                  ))}
                  {!offers.length&&<tr><td colSpan={7} style={{...TD,textAlign:'center',color:'var(--muted)',padding:40}}>Aucune offre. Cr\u00e9ez votre premi\u00e8re offre!</td></tr>}
                </tbody>
              </table>
            </Card>
          ))}
          {tab==='add'&&(
            <Card style={{padding:28}}>
              {editTarget&&<div style={{marginBottom:18,padding:'11px 16px',background:'#FEF3C7',border:'1px solid #F59E0B',borderRadius:10,color:'#92400E',fontSize:13,fontWeight:600}}>\u270f\ufe0f Modification : {editTarget.title}</div>}
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:4}}>
                <FI label={t.fTitle} fk="title"/>
                <div><label style={{fontSize:12,fontWeight:600,color:'var(--muted)',display:'block',marginBottom:5,textTransform:'uppercase',letterSpacing:.8}}>{t.fCat}</label>
                  <select style={{...INP,background:'#fff'}} value={form.category} onChange={e=>setForm(p=>({...p,category:e.target.value}))}>
                    {['intl','national','hike','visa'].map(c=><option key={c} value={c}>{t.cats[c]}</option>)}
                  </select>
                </div>
                <FI label={t.fPrice} fk="price" type="number"/>
                <FI label={t.fDur} fk="duration" type="number"/>
                <FI label={t.fRegion} fk="region"/>
                <FI label={t.fImg} fk="imageUrl"/>
              </div>
              <FTA label={t.fDesc} fk="description" h={72}/>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:12}}>
                <FTA label={t.fItin} fk="itinerary" h={90}/>
                <FTA label={t.fIncl} fk="includes" h={90}/>
                <FTA label={t.fDates} fk="dates" h={90}/>
              </div>
              <div style={{display:'flex',gap:10,marginTop:8}}>
                <button style={B.pri} onClick={submitOffer}>{editTarget?t.save:t.submit}</button>
                {editTarget&&<button style={B.ghost} onClick={()=>{setEditTarget(null);setForm(EF);setTab('offers');}}>{t.cancel}</button>}
              </div>
            </Card>
          )}
        </>}
        {user.role==='traveler'&&(loading?<Spin/>:bookings.length===0
          ?<div style={{textAlign:'center',padding:'60px 0'}}>
            <div style={{fontSize:48,marginBottom:12}}>\ud83c\udfab</div>
            <div style={{fontFamily:'Nunito',fontWeight:700,fontSize:18,color:'var(--navy)',marginBottom:6}}>{t.myBook}</div>
            <p style={{color:'var(--muted)',fontSize:14}}>{t.noBook}</p>
          </div>
          :<div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(260px,1fr))',gap:16}}>
            {bookings.map(b=>(
              <Card key={b.id} style={{overflow:'hidden'}}>
                {b.image_url&&<img src={b.image_url} alt={b.offer_title} style={{width:'100%',height:120,objectFit:'cover'}}/>}
                <div style={{padding:'16px 18px'}}>
                  <div style={{fontFamily:'Nunito',fontWeight:800,fontSize:15,color:'var(--navy)',marginBottom:6}}>{b.offer_title}</div>
                  <div style={{color:'var(--teal2)',fontWeight:700,fontFamily:'Nunito',fontSize:18,marginBottom:8}}>{(b.price||0).toLocaleString()} DZD</div>
                  {/* FIX 4: short date format */}
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                    <Badge status={b.status}/>
                    <span style={{fontSize:11,color:'var(--muted)'}}>{b.created_at?new Date(b.created_at).toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric'}):''}</span>
                  </div>
                </div>
              </Card>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

/* \u2500\u2500 ADMIN \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
function AdminPage({t,openAuth}){
  const {user}=useAuth();
  const {show}=useToast();
  const [tab,setTab]=useState('offers');
  const [data,setData]=useState({offers:[],agencies:[],users:[],reviews:[],bookings:[],stats:null});
  const [loading,setLoading]=useState(false);
  const load=useCallback(async()=>{
    if(!user||user.role!=='admin')return;setLoading(true);
    try{
      const [stats,offers,agencies,users,reviews,bookings]=await Promise.all([api('/admin/stats'),api('/admin/offers'),api('/agencies'),api('/admin/users'),api('/admin/reviews'),api('/admin/bookings')]);
      setData({stats,offers,agencies,users,reviews,bookings});
    }catch(e){show(e.message,'err');}
    setLoading(false);
  },[user]);
  useEffect(()=>{load();},[load]);
  if(!user||user.role!=='admin')return(
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'var(--offwhite)',paddingTop:68}}>
      <Card style={{padding:'48px 40px',textAlign:'center',maxWidth:380}}>
        <div style={{fontSize:48,marginBottom:16}}>\ud83d\udee1\ufe0f</div>
        <div style={{fontFamily:'Nunito',fontWeight:900,fontSize:20,color:'var(--navy)',marginBottom:8}}>Admin uniquement</div>
        <button style={{...B.pri,width:'100%',marginTop:16}} onClick={()=>openAuth('login')}>{t.navLogin}</button>
      </Card>
    </div>
  );
  const patch=async(url,body,msg)=>{try{await api(url,{method:'PATCH',body});show(msg);load();}catch(e){show(e.message,'err');}};
  const {stats,offers,agencies,users,reviews,bookings=[]}=data;
  const pendO=offers.filter(o=>o.status==='pending').length;
  const pendR=reviews.filter(r=>r.status==='pending').length;
  const TB=(a)=>({padding:'10px 18px',cursor:'pointer',fontSize:13,fontWeight:700,border:'none',borderBottom:a?'2px solid var(--teal)':'2px solid transparent',color:a?'var(--teal2)':'var(--muted)',background:'none',marginBottom:-1,transition:'all .18s'});
  const Tbl=({children,cols})=>(
    <Card><table style={{width:'100%',borderCollapse:'collapse'}}>
      <thead><tr>{cols.map(c=><th key={c} style={TH}>{c}</th>)}</tr></thead>
      <tbody>{children}</tbody>
    </table></Card>
  );
  /* FIX 4: date formatter */
  const fmtDate=(d)=>d?new Date(d).toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric'}):'';
  return(
    <div style={{background:'var(--offwhite)',minHeight:'100vh',paddingTop:68}}>
      <div style={{background:'linear-gradient(135deg,var(--teal3),var(--teal4))',padding:'40px 24px 0'}}>
        <div style={{maxWidth:1280,margin:'0 auto'}}>
          <div style={{fontFamily:'Nunito',fontWeight:900,fontSize:28,color:'var(--navy)',marginBottom:20}}>\ud83d\udee1\ufe0f {t.adminTitle}</div>
          {stats&&<div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(140px,1fr))',gap:12,marginBottom:24}}>
            {[['\ud83d\udce6','Offres',stats.total_offers,'var(--teal2)'],['\u23f3','En attente',stats.pending_offers,'#D97706'],['\u2705','Valid\u00e9es',stats.approved_offers,'#059669'],['\ud83c\udfe2','Agences',stats.total_agencies,'var(--teal2)'],['\ud83d\udc64','Voyageurs',stats.total_travelers,'var(--teal2)'],['\ud83d\udcac','Avis',stats.total_reviews,'var(--teal2)'],['\ud83d\udd14','Avis pend.',stats.pending_reviews,'#D97706'],['\ud83c\udfab','R\u00e9servations',stats.total_bookings,'var(--teal2)']].map(([ico,lbl,val,c])=>(
              <div key={lbl} style={{background:'rgba(255,255,255,.8)',borderRadius:12,padding:'14px 16px',backdropFilter:'blur(4px)'}}>
                <div style={{fontSize:20,marginBottom:6}}>{ico}</div>
                <div style={{fontFamily:'Nunito',fontWeight:900,fontSize:24,color:c,lineHeight:1}}>{val}</div>
                <div style={{color:'var(--muted)',fontSize:11,fontWeight:600,marginTop:2}}>{lbl}</div>
              </div>
            ))}
          </div>}
          <div style={{display:'flex',gap:4,borderBottom:'2px solid rgba(0,0,0,.08)'}}>
            {[['offers',t.aOffers,pendO],['bookings','R\u00e9servations',0],['agencies',t.aAgencies,0],['users',t.aUsers,0],['reviews',t.aRevs,pendR]].map(([tk,lbl,badge])=>(
              <button key={tk} style={TB(tab===tk)} onClick={()=>setTab(tk)}>
                {lbl}{badge>0&&<span style={{marginLeft:6,padding:'1px 7px',background:'#F59E0B',color:'#fff',borderRadius:10,fontSize:10,fontWeight:800}}>{badge}</span>}
              </button>
            ))}
          </div>
        </div>
      </div>
      <div style={{maxWidth:1280,margin:'0 auto',padding:'24px 24px 60px'}}>
        {loading?<Spin/>:<>
          {tab==='bookings'&&<Tbl cols={['Voyageur','Email','Offre','Agence','Prix','T\u00e9l\u00e9phone','Date','Statut','Action']}>
            {bookings.map(b=>(
              <tr key={b.id}>
                <td style={{...TD,fontWeight:700}}><div style={{display:'flex',alignItems:'center',gap:8}}><div style={{width:28,height:28,borderRadius:'50%',background:'linear-gradient(135deg,var(--teal),var(--teal2))',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:800,color:'#fff',flexShrink:0}}>{(b.traveler_name||'?')[0].toUpperCase()}</div>{b.traveler_name}</div></td>
                <td style={{...TD,color:'var(--muted)',fontSize:12}}>{b.traveler_email}</td>
                <td style={{...TD,fontWeight:600,maxWidth:150,fontSize:13}}>{b.offer_title}</td>
                <td style={{...TD,color:'var(--muted)',fontSize:13}}>{b.agency_name}</td>
                <td style={{...TD,color:'var(--teal2)',fontWeight:700,fontFamily:'Nunito'}}>{(b.price||0).toLocaleString()}</td>
                <td style={{...TD,fontSize:13}}>{b.phone||<span style={{color:'var(--muted)'}}>\u2014</span>}</td>
                <td style={{...TD,color:'var(--muted)',fontSize:12}}>{fmtDate(b.created_at)}</td>
                <td style={TD}><Badge status={b.status}/></td>
                <td style={TD}><div style={{display:'flex',gap:5}}>
                  {b.status!=='confirmed'&&<button style={B.sm} onClick={async()=>{try{await api(`/bookings/${b.id}/status`,{method:'PATCH',body:{status:'confirmed'}});show('Confirm\u00e9e!');load();}catch(e){show(e.message,'err');}}}>\u2705</button>}
                  {b.status!=='cancelled'&&<button style={B.danger} onClick={async()=>{try{await api(`/bookings/${b.id}/status`,{method:'PATCH',body:{status:'cancelled'}});show('Annul\u00e9e');load();}catch(e){show(e.message,'err');}}}>\u2715</button>}
                </div></td>
              </tr>
            ))}
            {!bookings.length&&<tr><td colSpan={8} style={{...TD,textAlign:'center',color:'var(--muted)',padding:40}}>Aucune r\u00e9servation.</td></tr>}
          </Tbl>}
          {tab==='offers'&&<Tbl cols={['Titre','Agence','Cat.','Prix','Statut','Actions']}>
            {offers.map(o=>(
              <tr key={o.id} style={{background:o.status==='pending'?'#FFFBEB':''}}>
                <td style={{...TD,fontWeight:700,color:'var(--navy)'}}>{o.title}</td>
                <td style={{...TD,color:'var(--muted)',fontSize:13}}>{o.agency_name||'\u2014'}</td>
                <td style={{...TD,color:'var(--muted)',fontSize:13}}>{t.cats[o.category]||o.category}</td>
                <td style={{...TD,color:'var(--teal2)',fontWeight:700,fontFamily:'Nunito'}}>{(o.price||0).toLocaleString()}</td>
                <td style={TD}><Badge status={o.status}/></td>
                <td style={TD}><div style={{display:'flex',gap:6}}>
                  {o.status!=='approved'&&<button style={B.sm} onClick={()=>patch(`/offers/${o.id}/status`,{status:'approved'},'\u2705 Approuv\u00e9')}>{t.approve}</button>}
                  {o.status!=='rejected'&&<button style={B.danger} onClick={()=>patch(`/offers/${o.id}/status`,{status:'rejected'},'Refus\u00e9')}>{t.reject}</button>}
                </div></td>
              </tr>
            ))}
          </Tbl>}
          {tab==='agencies'&&<Tbl cols={['Agence','Plan','Email','Offres','Statut','Actions']}>
            {agencies.map(a=>(
              <tr key={a.id}>
                <td style={{...TD,fontWeight:700}}><span style={{marginRight:8,fontSize:18}}>{a.logo}</span>{a.name}</td>
                <td style={TD}><span style={{padding:'3px 10px',borderRadius:20,fontSize:11,fontWeight:700,background:a.plan==='premium'?'#FEF3C7':'#F0F4F5',color:a.plan==='premium'?'#92400E':'var(--muted)'}}>{a.plan}</span></td>
                <td style={{...TD,color:'var(--muted)',fontSize:13}}>{a.email}</td>
                <td style={TD}>{a.offer_count||0}</td>
                <td style={TD}><Badge status={a.status}/></td>
                <td style={TD}><div style={{display:'flex',gap:6}}>
                  {a.status!=='approved'&&<button style={B.sm} onClick={()=>patch(`/agencies/${a.id}/status`,{status:'approved'},'Activ\u00e9e')}>{t.approve}</button>}
                  {a.status==='approved'&&<button style={B.danger} onClick={()=>patch(`/agencies/${a.id}/status`,{status:'suspended'},'Suspendue')}>{t.suspend}</button>}
                </div></td>
              </tr>
            ))}
          </Tbl>}
          {tab==='users'&&<Tbl cols={['Nom','Email','R\u00f4le','Inscrit le']}>
            {users.map(u=>(
              <tr key={u.id}>
                <td style={{...TD,fontWeight:700}}>{u.name}</td>
                <td style={{...TD,color:'var(--muted)',fontSize:13}}>{u.email}</td>
                <td style={TD}><span style={{padding:'3px 10px',borderRadius:20,fontSize:11,fontWeight:700,background:u.role==='admin'?'#D1FAE5':u.role==='agency'?'#EDE9FE':'#F0F4F5',color:u.role==='admin'?'#065F46':u.role==='agency'?'#5B21B6':'var(--muted)'}}>{u.role}</span></td>
                <td style={{...TD,color:'var(--muted)',fontSize:13}}>{(u.created_at||'').split('T')[0]}</td>
              </tr>
            ))}
          </Tbl>}
          {tab==='reviews'&&<Tbl cols={['Utilisateur','Offre','Note','Titre','Statut','Actions']}>
            {reviews.map(r=>(
              <tr key={r.id} style={{background:r.status==='pending'?'#FFFBEB':''}}>
                <td style={{...TD,fontWeight:700}}>{r.user_name}</td>
                <td style={{...TD,color:'var(--muted)',fontSize:13,maxWidth:160}}>{r.offer_title}</td>
                <td style={TD}><Stars v={r.rating} size={13}/></td>
                <td style={{...TD,fontWeight:600}}>{r.title}</td>
                <td style={TD}><Badge status={r.status}/></td>
                <td style={TD}><div style={{display:'flex',gap:6}}>
                  {r.status!=='approved'&&<button style={B.sm} onClick={()=>patch(`/reviews/${r.id}/status`,{status:'approved'},'Approuv\u00e9')}>{t.approve}</button>}
                  {r.status!=='rejected'&&<button style={B.danger} onClick={()=>patch(`/reviews/${r.id}/status`,{status:'rejected'},'Refus\u00e9')}>{t.reject}</button>}
                </div></td>
              </tr>
            ))}
          </Tbl>}
        </>}
      </div>
    </div>
  );
}

  );
}

/* \u2500\u2500 APP \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
function App(){
  const [lang,setLang]=useState('fr');
  const [page,setPage]=useState('home');
  const [filterCat,setFilterCat]=useState('all');
  const [authModal,setAuthModal]=useState(null);
  const [selOffer,setSelOffer]=useState(null);
  const t=TR[lang];
  return(
    <div style={{direction:lang==='ar'?'rtl':'ltr'}}>
      <Navbar page={page} setPage={setPage} lang={lang} setLang={setLang} openAuth={setAuthModal} t={t}/>
      {page==='home'&&<HomePage t={t} setPage={setPage} setFilterCat={setFilterCat} onOpen={setSelOffer}/>}
      {page==='trips'&&<TripsPage t={t} filterCat={filterCat} setFilterCat={setFilterCat} onOpen={setSelOffer}/>}
      {page==='about'&&<AboutPage t={t}/>}
      {page==='dash'&&<DashPage t={t} openAuth={setAuthModal}/>}
      {page==='admin'&&<AdminPage t={t} openAuth={setAuthModal}/>}
      <Footer t={t} setPage={setPage}/>
      {authModal&&<AuthModal mode={authModal} onClose={()=>setAuthModal(null)} t={t}/>}
      {selOffer&&<OfferModal offer={selOffer} onClose={()=>setSelOffer(null)} t={t} lang={lang}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <AuthProvider><ToastProvider><App/></ToastProvider></AuthProvider>
);
</script>
</body>
</html>
