const {useState,useEffect,useCallback,useRef,createContext,useContext}=React;

/* ── API ──────────────────────────────────────────────────────────────────── */
async function api(path,opts={}){
  const tok=localStorage.getItem('glz_tok');
  const res=await fetch('/api'+path,{
    headers:{'Content-Type':'application/json',...(tok?{Authorization:`Bearer ${tok}`}:{})},
    method:opts.method||'GET',
    body:opts.body?JSON.stringify(opts.body):undefined
  });
  const data=await res.json();
  if(!res.ok)throw new Error(data.error||'Erreur');
  return data;
}

/* ── ANALYTICS TRACKER ──────────────────────────────────────────────────── */
// Generate or retrieve session ID (resets on tab close)
const _sid = sessionStorage.getItem('glz_sid') || (()=>{const id=Math.random().toString(36).slice(2)+Date.now().toString(36);sessionStorage.setItem('glz_sid',id);return id;})();

function track(type, extra={}){
  try{
    const user = JSON.parse(localStorage.getItem('glz_user')||'null');
    fetch('/api/events',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        type, session_id:_sid,
        user_id: user?.id||null,
        lang: localStorage.getItem('glz_lang')||'fr',
        ...extra
      })
    }).catch(()=>{});
  }catch(e){}
}

/* ── AUTH CONTEXT ─────────────────────────────────────────────────────────── */
const AuthCtx=createContext(null);
function AuthProvider({children}){
  const [user,setUser]=useState(null);
  useEffect(()=>{const s=localStorage.getItem('glz_user');if(s)try{setUser(JSON.parse(s))}catch{}},[]);
  const login=async(email,password)=>{
    const d=await api('/auth/login',{method:'POST',body:{email,password}});
    localStorage.setItem('glz_tok',d.token);localStorage.setItem('glz_user',JSON.stringify(d.user));
    setUser(d.user);return d.user;
  };
  const register=async(body)=>{
    const d=await api('/auth/register',{method:'POST',body});
    localStorage.setItem('glz_tok',d.token);localStorage.setItem('glz_user',JSON.stringify(d.user));
    setUser(d.user);return d.user;
  };
  const updateUser=(u)=>{const merged={...user,...u};localStorage.setItem('glz_user',JSON.stringify(merged));setUser(merged);};
  const logout=()=>{localStorage.removeItem('glz_tok');localStorage.removeItem('glz_user');setUser(null);};
  return <AuthCtx.Provider value={{user,login,register,logout,updateUser}}>{children}</AuthCtx.Provider>;
}
const useAuth=()=>useContext(AuthCtx);

/* ── TOAST ────────────────────────────────────────────────────────────────── */
const ToastCtx=createContext(null);
function ToastProvider({children}){
  const [toasts,setToasts]=useState([]);
  const show=(msg,type='ok')=>{
    const id=Date.now()+Math.random();
    setToasts(p=>[...p,{id,msg,type}]);
    setTimeout(()=>setToasts(p=>p.filter(t=>t.id!==id)),4000);
  };
  const colors={ok:{bg:'#10B981',text:'#fff'},err:{bg:'#EF4444',text:'#fff'},warn:{bg:'#F59E0B',text:'#fff'}};
  return(
    <ToastCtx.Provider value={{show}}>
      {children}
      <div style={{position:'fixed',top:76,right:18,zIndex:9999,display:'flex',flexDirection:'column',gap:8}}>
        {toasts.map(t=>{const c=colors[t.type]||colors.ok;return(
          <div key={t.id} className="toast-in" style={{padding:'12px 20px',borderRadius:12,fontSize:14,fontWeight:600,maxWidth:340,background:c.bg,color:c.text,boxShadow:'0 8px 24px rgba(0,0,0,.15)'}}>
            {t.type==='ok'?'✅':t.type==='err'?'❌':'⚠️'} {t.msg}
          </div>
        );})}
      </div>
    </ToastCtx.Provider>
  );
}
const useToast=()=>useContext(ToastCtx);

const TH={textAlign:'left',padding:'11px 16px',fontSize:11,fontWeight:700,color:'var(--muted)',textTransform:'uppercase',letterSpacing:1.2,borderBottom:'2px solid #F0F4F5',background:'#FAFCFC'};
const TD={padding:'13px 16px',borderBottom:'1px solid #F0F4F5',fontSize:14,color:'var(--text)'};

/* ── HELPERS ──────────────────────────────────────────────────────────────── */
const Stars=({v=0,size=14,interactive=false,onRate})=>{
  const [h,setH]=useState(0);
  return <span style={{display:'inline-flex',gap:2}}>{[1,2,3,4,5].map(i=>(
    <span key={i} style={{fontSize:size,cursor:interactive?'pointer':'default',color:i<=(h||v)?'#F59E0B':'#DDE5E8',lineHeight:1}}
      onClick={()=>interactive&&onRate?.(i)} onMouseEnter={()=>interactive&&setH(i)} onMouseLeave={()=>interactive&&setH(0)}>★</span>
  ))}</span>;
};

const BOOKING_STATUSES=[
  {v:'pending',     label:'En attente',      bg:'#FEF3C7',c:'#92400E'},
  {v:'contacted',   label:'Contacté',        bg:'#DBEAFE',c:'#1E40AF'},
  {v:'didnt_answer',label:'Pas de réponse',  bg:'#FEE2E2',c:'#991B1B'},
  {v:'pre_reserved',label:'Pré-réservé',     bg:'#EDE9FE',c:'#5B21B6'},
  {v:'confirmed',   label:'Confirmé ✅',     bg:'#D1FAE5',c:'#065F46'},
  {v:'completed',   label:'Voyage terminé 🎉',bg:'#A7F3D0',c:'#065F46'},
  {v:'cancelled',   label:'Annulé',          bg:'#F3F4F6',c:'#6B7280'},
];
const BSTATUS_MAP=Object.fromEntries(BOOKING_STATUSES.map(s=>[s.v,s]));

const Badge=({status})=>{
  const m={approved:{bg:'#D1FAE5',c:'#065F46'},pending:{bg:'#FEF3C7',c:'#92400E'},
    rejected:{bg:'#FEE2E2',c:'#991B1B'},suspended:{bg:'#FEE2E2',c:'#991B1B'},
    contacted:{bg:'#DBEAFE',c:'#1E40AF'},didnt_answer:{bg:'#FEE2E2',c:'#991B1B'},
    pre_reserved:{bg:'#EDE9FE',c:'#5B21B6'},confirmed:{bg:'#D1FAE5',c:'#065F46'},
    completed:{bg:'#A7F3D0',c:'#065F46'},cancelled:{bg:'#F3F4F6',c:'#6B7280'}};
  const bs=BSTATUS_MAP[status];
  const label=bs?bs.label:status;
  const s=m[status]||m.pending;
  return <span style={{padding:'3px 11px',borderRadius:20,fontSize:11,fontWeight:700,background:s.bg,color:s.c,letterSpacing:.3,whiteSpace:'nowrap'}}>{label}</span>;
};

const Spin=()=>(
  <div style={{display:'flex',justifyContent:'center',padding:'60px 0'}}>
    <div style={{width:36,height:36,border:'3px solid #E2EBF0',borderTopColor:'var(--teal)',borderRadius:'50%',animation:'spin 1s linear infinite'}}/>
  </div>
);

const Card=({children,style={}})=>(
  <div style={{background:'#fff',borderRadius:20,boxShadow:'var(--shadow)',border:'1px solid #EEF3F5',...style}}>{children}</div>
);

const SectionTitle=({children,sub,center=false})=>(
  <div style={{textAlign:center?'center':'left',marginBottom:40}}>
    <div style={{fontFamily:'Nunito',fontWeight:900,fontSize:'clamp(22px,3.5vw,32px)',color:'var(--navy)',lineHeight:1.2,marginBottom:8}}>{children}</div>
    {sub&&<p style={{color:'var(--muted)',fontSize:15,maxWidth:480,margin:center?'0 auto':0}}>{sub}</p>}
    <div style={{width:50,height:4,background:'linear-gradient(90deg,var(--teal),var(--teal2))',borderRadius:2,marginTop:12,...(center?{margin:'12px auto 0'}:{})}}/>

);

/* ── NAVBAR — with hamburger mobile menu ──────────────────────────────────── */

  const navTo=(pg)=>{setPage(pg);setMenuOpen(false);};

    <nav style={{position:'fixed',top:0,left:0,right:0,zIndex:300,background:'rgba(255,255,255,.97)',backdropFilter:'blur(20px)',borderBottom:scroll?'1px solid #E8F0F2':'1px solid transparent',boxShadow:scroll?'var(--shadow)':'none',transition:'all .3s'}}>

            ))}

          {user?(

                <div style={{width:28,height:28,borderRadius:'50%',background:'linear-gradient(135deg,var(--teal),var(--teal2))',display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,fontWeight:800,color:'#fff',overflow:'hidden',flexShrink:0}}>
                  {user.avatar?<img src={user.avatar} alt="" style={{width:'100%',height:'100%',objectFit:'cover'}}/>:user.name[0].toUpperCase()}
                </div>
                <span style={{fontSize:13,fontWeight:700,color:'var(--teal2)'}}>{user.name.split(' ')[0]}</span>

              {ico} {label}

          ))}
          <div style={{height:1,background:'#E8F0F2',margin:'6px 0'}}/>

                <button key={l} style={{padding:'5px 10px',borderRadius:6,fontSize:11,fontWeight:700,border:'none',cursor:'pointer',background:lang===l?'var(--teal)':'transparent',color:lang===l?'#fff':'var(--muted)',transition:'all .18s'}} onClick={()=>setLang(l)}>{l.toUpperCase()}</button>
              ))}

            {user?(
              <button style={{...B.ghost,padding:'8px 14px',fontSize:13}} onClick={()=>{logout();setPage('home');setMenuOpen(false);show('À bientôt !')}}>{t.navLogout}</button>
            ):(
              <div style={{display:'flex',gap:6}}>
                <button style={{...B.ghost,padding:'7px 14px',fontSize:12}} onClick={()=>{openAuth('login');setMenuOpen(false);}}>{t.navLogin}</button>

/* ── OFFER CARD ───────────────────────────────────────────────────────────── */
function OfferCard({offer,t,onOpen}){
  const [hov,setHov]=useState(false);
  const avg=offer.avg_rating;
  return(
    <div onClick={()=>{track('offer_click',{offer_id:offer.id});onOpen(offer);}}
      onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
      style={{background:'#fff',borderRadius:20,overflow:'hidden',border:'1px solid #EEF3F5',cursor:'pointer',transition:'all .25s',boxShadow:hov?'0 20px 50px rgba(13,185,168,.18)':'var(--shadow)',transform:hov?'translateY(-5px)':'none'}}>
      <div style={{position:'relative'}}>
        <img src={offer.image_url||'https://images.unsplash.com/photo-1469854523086-cc02fe5d8800?w=500&q=80'} alt={offer.title}
          onError={e=>e.target.src='https://images.unsplash.com/photo-1469854523086-cc02fe5d8800?w=500&q=80'}
          style={{width:'100%',height:200,objectFit:'cover',display:'block',transition:'transform .3s',...(hov?{transform:'scale(1.03)'}:{})}}/>
        <div style={{position:'absolute',top:12,left:12,background:'rgba(255,255,255,.95)',backdropFilter:'blur(4px)',borderRadius:20,padding:'4px 12px',fontSize:11,fontWeight:700,color:'var(--teal2)'}}>
          {t.catIco[offer.category]} {t.cats[offer.category]||offer.category}
        </div>
        {avg&&<div style={{position:'absolute',bottom:12,right:12,background:'rgba(255,255,255,.95)',borderRadius:20,padding:'4px 10px',display:'flex',alignItems:'center',gap:4}}>
          <span style={{color:'#F59E0B',fontSize:13}}>★</span>
          <span style={{fontSize:12,fontWeight:800,color:'var(--navy)'}}>{avg}</span>
        </div>}
      </div>
      <div style={{padding:'16px 20px 20px'}}>
        <div style={{fontFamily:'Nunito',fontWeight:800,fontSize:16,color:'var(--navy)',marginBottom:6,lineHeight:1.3}}>{offer.title}</div>
        <div style={{display:'flex',gap:14,color:'var(--muted)',fontSize:12,fontWeight:500,marginBottom:14,flexWrap:'wrap'}}>
          <span>📍 {offer.region}</span>
          <span>⏱ {offer.duration}{t.days}</span>
          <span>💬 {offer.review_count||0} {t.revs}</span>
        </div>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div>
            <div style={{fontSize:10,color:'var(--muted)',fontWeight:600,textTransform:'uppercase',letterSpacing:.8,marginBottom:1}}>{t.from}</div>
            <div style={{fontFamily:'Nunito',fontWeight:900,fontSize:20,color:'var(--teal2)',lineHeight:1}}>
              {(offer.price||0).toLocaleString()} <span style={{fontSize:11,color:'var(--muted)',fontWeight:500}}>DZD{t.per}</span>
            </div>
          </div>
          <button style={{...B.pri,padding:'9px 18px',fontSize:12}} onClick={e=>{e.stopPropagation();onOpen(offer);}}>{t.details}</button>
        </div>
      </div>
    </div>
  );
}

/* ── OFFER MODAL ──────────────────────────────────────────────────────────── */
function OfferModal({offer,onClose,t,lang}){
  const {user}=useAuth();
  const {show}=useToast();
  const [reviews,setReviews]=useState([]);
  const [rf,setRf]=useState({rating:0,title:'',comment:''});
  const [booking,setBooking]=useState(false);
  const [submitting,setSubmitting]=useState(false);
  const rtl=lang==='ar';
  useEffect(()=>{if(offer){api(`/offers/${offer.id}/reviews`).then(setReviews).catch(()=>{});track('offer_view',{offer_id:offer.id});}},[offer?.id]);
  if(!offer)return null;
  const avg=reviews.length?(reviews.reduce((s,r)=>s+r.rating,0)/reviews.length).toFixed(1):(offer.avg_rating||null);
  const SL=({children})=><div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:1.5,color:'var(--teal2)',marginBottom:10}}>{children}</div>;
  const [phone,setPhone]=useState('');
  const handleBook=async()=>{track('booking_started',{offer_id:offer.id});
    if(!user){onClose();show('Connectez-vous pour réserver','warn');return;}
    if(!phone.trim()){show('Numéro de téléphone requis','err');return;}
    const digits=(phone.match(/\d/g)||[]).length;
    if(digits<8){show('Numéro invalide (min. 8 chiffres)','err');return;}
    setBooking(true);
    try{await api('/bookings',{method:'POST',body:{offerId:offer.id,phone:phone.trim()}});track('booking_done',{offer_id:offer.id});show(t.bookMsg);setPhone('');}
    catch(e){show(e.message,'err');}
    setBooking(false);
  };
  const handleReview=async()=>{
    if(!user){show('Connectez-vous pour laisser un avis','warn');return;}
    if(!rf.rating||!rf.title.trim()){show('Note et titre requis','err');return;}
    setSubmitting(true);
    try{await api(`/offers/${offer.id}/reviews`,{method:'POST',body:rf});show('Avis soumis, il sera publié après modération.');setRf({rating:0,title:'',comment:''});}
    catch(e){show(e.message,'err');}
    setSubmitting(false);
  };
  return(
    <div style={{position:'fixed',inset:0,background:'rgba(11,35,64,.6)',backdropFilter:'blur(8px)',zIndex:500,display:'flex',alignItems:'center',justifyContent:'center',padding:16}} onClick={onClose}>
      <div style={{background:'#fff',borderRadius:24,overflow:'hidden',maxWidth:660,width:'100%',maxHeight:'92vh',overflowY:'auto',direction:rtl?'rtl':'ltr'}} className="fade" onClick={e=>e.stopPropagation()}>
        <div style={{position:'relative'}}>
          <img src={offer.image_url||'https://images.unsplash.com/photo-1469854523086-cc02fe5d8800?w=700&q=80'} alt={offer.title}
            onError={e=>e.target.src='https://images.unsplash.com/photo-1469854523086-cc02fe5d8800?w=700&q=80'}
            style={{width:'100%',height:240,objectFit:'cover',display:'block'}}/>
          <button onClick={onClose} style={{position:'absolute',top:14,right:14,background:'rgba(255,255,255,.95)',border:'none',borderRadius:'50%',width:36,height:36,fontSize:18,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 2px 12px rgba(0,0,0,.15)'}}>×</button>
          <div style={{position:'absolute',bottom:14,left:14,background:'rgba(255,255,255,.95)',borderRadius:20,padding:'4px 14px',fontSize:11,fontWeight:700,color:'var(--teal2)'}}>{t.catIco[offer.category]} {t.cats[offer.category]}</div>
        </div>
        <div style={{padding:'24px 28px 30px'}}>
          <div style={{fontFamily:'Nunito',fontWeight:900,fontSize:22,color:'var(--navy)',marginBottom:8}}>{offer.title}</div>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:16}}>
            <Stars v={parseFloat(avg)||0} size={16}/>
            {avg&&<span style={{fontWeight:800,color:'#F59E0B'}}>{avg}</span>}
            <span style={{color:'var(--muted)',fontSize:13}}>({reviews.length} {t.revs})</span>
          </div>
          <div style={{display:'flex',flexWrap:'wrap',gap:8,marginBottom:18}}>
            {[['📍',offer.region],['⏱',`${offer.duration} ${t.days}`],['💰',`${(offer.price||0).toLocaleString()} DZD${t.per}`],offer.agency_name&&['🏢',offer.agency_name]].filter(Boolean).filter(([,v])=>v).map(([i,v])=>(
              <span key={v} style={{padding:'6px 14px',background:'#F7FAFA',borderRadius:20,fontSize:13,fontWeight:500,color:'var(--text)'}}>{i} {v}</span>
            ))}
          </div>
          {offer.description&&<p style={{color:'var(--muted)',lineHeight:1.8,marginBottom:20,fontSize:14}}>{offer.description}</p>}
          {offer.itinerary?.length>0&&<div style={{marginBottom:18}}>
            <SL>{t.itin}</SL>
            {offer.itinerary.map((s,i)=><div key={i} style={{display:'flex',gap:12,marginBottom:7,fontSize:14}}>
              <span style={{width:22,height:22,borderRadius:'50%',background:'var(--teal3)',color:'var(--teal2)',display:'inline-flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:800,flexShrink:0,marginTop:1}}>{i+1}</span>
              <span style={{color:'var(--text)'}}>{s}</span>
            </div>)}
          </div>}
          {offer.includes?.length>0&&<div style={{marginBottom:18}}>
            <SL>{t.incl}</SL>
            <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
              {offer.includes.map((x,i)=><span key={i} style={{padding:'6px 14px',background:'var(--teal3)',borderRadius:20,fontSize:12,fontWeight:600,color:'var(--teal2)'}}>✓ {x}</span>)}
            </div>
          </div>}
          {offer.available_dates?.length>0&&<div style={{marginBottom:22}}>
            <SL>{t.dates}</SL>
            <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
              {offer.available_dates.map((d,i)=><span key={i} style={{padding:'6px 14px',background:'#F7FAFA',borderRadius:20,fontSize:12,border:'1px solid #E2EBF0'}}>📅 {d}</span>)}
            </div>
          </div>}
          {/* Reviews */}
          <div style={{borderTop:'2px solid #F0F4F5',paddingTop:20,marginBottom:16}}>
            <SL>💬 {t.revTitle}</SL>
            {reviews.length===0?<p style={{color:'var(--muted)',fontSize:14}}>{t.noRevs}</p>
            :reviews.map(r=><ReviewCard key={r.id} r={r} isAgency={false}/>)}
          </div>
          {user?.role==='traveler'&&<div style={{background:'var(--teal3)',borderRadius:16,padding:'14px 18px',marginBottom:20,display:'flex',alignItems:'center',gap:10,fontSize:13,color:'var(--teal2)'}}>
            <span style={{fontSize:20}}>💡</span>
            <span>Vous pourrez laisser un avis après confirmation de votre réservation.</span>
          </div>}
          {/* Book CTA */}
          <div style={{background:'linear-gradient(135deg,var(--navy),var(--navy2))',borderRadius:16,padding:'20px 24px'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
              <div>
                <div style={{fontSize:11,color:'rgba(255,255,255,.6)',textTransform:'uppercase',letterSpacing:1,marginBottom:2}}>{t.from}</div>
                <div style={{fontFamily:'Nunito',fontWeight:900,fontSize:26,color:'var(--teal)',lineHeight:1}}>
                  {(offer.price||0).toLocaleString()} <span style={{fontSize:12,color:'rgba(255,255,255,.5)',fontWeight:400}}>DZD{t.per}</span>
                </div>
              </div>
            </div>
            <div style={{display:'flex',gap:10,alignItems:'center'}}>
              <input
                style={{flex:1,background:'rgba(255,255,255,.12)',border:'1.5px solid rgba(255,255,255,.25)',borderRadius:10,padding:'11px 14px',fontSize:14,color:'#fff'}}
                placeholder={'📞 '+t.phoneLbl+' — ex: 0770 123 456'}
                value={phone}
                onChange={e=>setPhone(e.target.value)}
                onKeyDown={e=>e.key==='Enter'&&handleBook()}
              />
              <button style={{...B.white,fontSize:13,padding:'11px 20px',flexShrink:0}} onClick={handleBook} disabled={booking}>{booking?'…':t.book}</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── AUTH MODAL ───────────────────────────────────────────────────────────── */
function AuthModal({mode,onClose,t}){
  const {login,register}=useAuth();
  const {show}=useToast();
  const [isLogin,setIsLogin]=useState(mode==='login');
  const EF={email:'',password:'',confirmPassword:'',name:'',familyName:'',phone:'',birthDate:'',gender:'',city:''};
  const [f,setF]=useState(EF);
  const [loading,setLoading]=useState(false);
  useEffect(()=>{setIsLogin(mode==='login');setF(EF);},[mode]);

  const LBL=({children})=><label style={{fontSize:11,fontWeight:700,color:'var(--muted)',textTransform:'uppercase',letterSpacing:.7,display:'block',marginBottom:4}}>{children}</label>;
  const FI=({label,fk,type='text',ph='',required=false})=>(
    <div>

    if(!f.email||!f.password){show('Email et mot de passe requis','err');return;}
    if(!isLogin){
      if(!f.name||!f.familyName){show('Prénom et nom de famille requis','err');return;}

      if(f.password!==f.confirmPassword){show('Les mots de passe ne correspondent pas','err');return;}

      if(isLogin){const u=await login(f.email,f.password);show(`Bienvenue, ${u.name}!`);}

            <button style={{...B.pri,width:'100%',padding:13,fontSize:15,marginTop:4}} onClick={submit} disabled={loading}>{loading?'…':t.loginTitle}</button>

          <>

            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:4}}>
              <FI label="Prénom" fk="name" ph="Ahmed" required/>
              <FI label="Nom de famille" fk="familyName" ph="Benali" required/>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:4}}>

            <div style={{background:'var(--teal3)',borderRadius:12,padding:'12px 16px',marginBottom:16,marginTop:8,fontSize:12,fontWeight:700,color:'var(--teal2)'}}>

            <div>
              <LBL>Téléphone<span style={{color:'var(--teal2)'}}>*</span></LBL>
              <input style={INP} type="tel" placeholder="📞 0770 123 456" value={f.phone} onChange={e=>setF(p=>({...p,phone:e.target.value}))}/>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
              <div>
                <LBL>Mot de passe<span style={{color:'var(--teal2)'}}>*</span></LBL>
                <input style={INP} type="password" placeholder="Min. 6 caractères" value={f.password} onChange={e=>setF(p=>({...p,password:e.target.value}))}/>

    <div style={{position:'fixed',inset:0,background:'rgba(11,35,64,.6)',backdropFilter:'blur(8px)',zIndex:500,display:'flex',alignItems:'center',justifyContent:'center',padding:16}} onClick={onClose}>

/* ── RESET PASSWORD MODAL ─────────────────────────────────────────────────── */
function ResetPasswordModal({token,onClose,t,openAuth}){
  const {show}=useToast();
  const [pass,setPass]=useState('');
  const [confirm,setConfirm]=useState('');
  const [loading,setLoading]=useState(false);
  const [done,setDone]=useState(false);
  const [invalid,setInvalid]=useState(false);
  useEffect(()=>{
    api('/auth/verify-reset-token',{method:'POST',body:{token}}).then(d=>{
      if(!d.valid)setInvalid(true);
    }).catch(()=>setInvalid(true));
  },[token]);
  const submit=async()=>{
    if(!pass||!confirm){show('Les deux champs sont requis','err');return;}
    if(pass!==confirm){show(t.resetMismatch,'err');return;}
    if(pass.length<6){show('Minimum 6 caractères','err');return;}
    setLoading(true);
    try{
      await api('/auth/reset-password',{method:'POST',body:{token,password:pass}});
      setDone(true);
    }catch(e){show(e.message,'err');}
    setLoading(false);
  };
  return(
    <div style={{position:'fixed',inset:0,background:'rgba(11,35,64,.6)',backdropFilter:'blur(8px)',zIndex:500,display:'flex',alignItems:'center',justifyContent:'center',padding:16}}>
      <div style={{background:'#fff',borderRadius:24,padding:'32px 28px',maxWidth:400,width:'100%',boxShadow:'0 24px 60px rgba(11,35,64,.2)'}} className="fade">
        {invalid?(
          <div style={{textAlign:'center'}}>
            <div style={{fontSize:40,marginBottom:12}}>❌</div>
            <div style={{fontFamily:'Nunito',fontWeight:900,fontSize:18,color:'var(--navy)',marginBottom:8}}>{t.resetInvalid}</div>
            <button style={{...B.pri,marginTop:16}} onClick={()=>{onClose();openAuth('login');}}>{t.backToLogin}</button>
          </div>
        ):done?(
          <div style={{textAlign:'center'}}>
            <div style={{fontSize:40,marginBottom:12}}>✅</div>
            <div style={{fontFamily:'Nunito',fontWeight:900,fontSize:18,color:'var(--navy)',marginBottom:8}}>{t.resetDone}</div>
            <button style={{...B.pri,marginTop:16}} onClick={()=>{onClose();openAuth('login');}}>{t.navLogin}</button>
          </div>
        ):(
          <>
            <div style={{textAlign:'center',marginBottom:24}}>
              <div style={{fontSize:40,marginBottom:10}}>🔐</div>
              <div style={{fontFamily:'Nunito',fontWeight:900,fontSize:20,color:'var(--navy)',marginBottom:6}}>{t.resetTitle}</div>
              <p style={{color:'var(--muted)',fontSize:13}}>{t.resetSub}</p>
            </div>
            <input style={INP} type="password" placeholder={t.resetNewPass} value={pass} onChange={e=>setPass(e.target.value)}/>
            <input style={INP} type="password" placeholder={t.resetConfirm} value={confirm} onChange={e=>setConfirm(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()}/>
            <button style={{...B.pri,width:'100%',padding:13,fontSize:15}} onClick={submit} disabled={loading}>{loading?'…':t.resetSave}</button>
          </>
        )}
      </div>
    </div>
  );
}

        {/* Category filters — FIX 2: horizontal scroll on mobile */}
        <div className="cat-filters" style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:28}}>
          {['all','intl','national','hike','visa'].map(c=>(
            <button key={c} style={{padding:'8px 20px',borderRadius:50,cursor:'pointer',fontSize:13,fontWeight:700,border:'none',background:filterCat===c?'var(--teal)':'#fff',color:filterCat===c?'#fff':'var(--text)',boxShadow:filterCat===c?'0 4px 14px rgba(13,185,168,.3)':'var(--shadow)',transition:'all .2s'}}
              onClick={()=>{setFilterCat(c);if(c!=='all')track('filter_used',{filter_cat:c});}}>{t.catIco[c]||'🌍'} {t.cats[c]||c}</button>
          ))}
        </div>
        {loading?<Spin/>:offers.length===0
          ?<div style={{textAlign:'center',padding:'60px 0',color:'var(--muted)'}}>
            <div style={{fontSize:48,marginBottom:12}}>🔍</div>
            <div style={{fontFamily:'Nunito',fontWeight:700,fontSize:18,marginBottom:6}}>Aucune offre trouvée</div>
            <div style={{fontSize:14}}>Essayez une autre recherche</div>
          </div>
          :<div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(300px,1fr))',gap:24}}>
            {offers.map(o=><OfferCard key={o.id} offer={o} t={t} onOpen={onOpen}/>)}
          </div>
        }
      </div>
    </div>
  );
}

/* ── PROFILE TAB ──────────────────────────────────────────────────────────── */
function ProfileTab({t}){
  const {user,updateUser}=useAuth();
  const {show}=useToast();
  const [pf,setPf]=useState({name:user?.name||'',familyName:user?.family_name||'',birthDate:user?.birth_date||'',gender:user?.gender||'',city:user?.city||'',email:user?.email||'',phone:user?.phone||'',password:'',agencyName:'',agencyDesc:'',agencyLogo:'🏢'});
  const [agencyData,setAgencyData]=useState(null);
  const [saving,setSaving]=useState(false);
  const fileRef=useRef(null);

  useEffect(()=>{
    if(user?.role==='agency'&&user?.agencyId){
      api(`/agencies`).then(list=>{
        const ag=list.find(a=>a.id===user.agencyId);
        if(ag){setAgencyData(ag);setPf(p=>({...p,agencyName:ag.name||'',agencyDesc:ag.description||'',agencyLogo:ag.logo||'🏢'}));}
      }).catch(()=>{});
    }
  },[user]);

  const handleAvatar=(e)=>{
    const file=e.target.files?.[0];
    if(!file)return;
    if(file.size>2_000_000){show('Image trop grande (max 2MB)','err');return;}
    const reader=new FileReader();
    reader.onload=(ev)=>{
      const b64=ev.target.result;
      api('/auth/avatar',{method:'POST',body:{avatar:b64}}).then(d=>{
        updateUser({avatar:b64});show('Photo mise à jour !');
      }).catch(e=>show(e.message,'err'));
    };
    reader.readAsDataURL(file);
  };

  const save=async()=>{
    if(!pf.name||!pf.email){show('Nom et email requis','err');return;}
    setSaving(true);
    try{
      const res=await api('/auth/profile',{method:'PUT',body:{...pf}});
      updateUser({name:pf.name,family_name:pf.familyName,birth_date:pf.birthDate,gender:pf.gender,city:pf.city,email:pf.email,phone:pf.phone});
      show(t.profileSuccess);
    }catch(e){show(e.message,'err');}
    setSaving(false);
  };

  const LBL=({children})=><label style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:1,color:'var(--muted)',display:'block',marginBottom:5}}>{children}</label>;

  return(
    <div style={{display:'grid',gridTemplateColumns:'280px 1fr',gap:24,alignItems:'start'}}>
      {/* LEFT — Avatar */}
      <Card style={{padding:28,textAlign:'center'}}>
        <div style={{position:'relative',display:'inline-block',marginBottom:20}}>
          <div style={{width:100,height:100,borderRadius:'50%',background:'linear-gradient(135deg,var(--teal),var(--teal2))',display:'flex',alignItems:'center',justifyContent:'center',fontSize:38,fontWeight:900,color:'#fff',overflow:'hidden',margin:'0 auto',border:'4px solid #fff',boxShadow:'0 4px 20px rgba(13,185,168,.25)'}}>
            {user?.avatar?<img src={user.avatar} alt="" style={{width:'100%',height:'100%',objectFit:'cover'}}/>:user?.name[0]?.toUpperCase()}
          </div>
          <button onClick={()=>fileRef.current?.click()} style={{position:'absolute',bottom:0,right:0,width:30,height:30,borderRadius:'50%',background:'var(--teal)',border:'2px solid #fff',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14}}>✏️</button>
        </div>
        <input ref={fileRef} type="file" accept="image/*" style={{display:'none'}} onChange={handleAvatar}/>
        <div style={{fontFamily:'Nunito',fontWeight:800,fontSize:16,color:'var(--navy)',marginBottom:4}}>{user?.name}</div>
        <div style={{fontSize:12,color:'var(--muted)',marginBottom:16}}>{user?.email}</div>
        <div style={{padding:'8px 16px',background:'var(--teal3)',borderRadius:20,display:'inline-block',fontSize:12,fontWeight:700,color:'var(--teal2)',marginBottom:12}}>
          {user?.role==='agency'?'🏢 Agence':user?.role==='admin'?'🛡️ Admin':'🧳 Voyageur'}
        </div>
        {user?.phone&&<div style={{fontSize:13,color:'var(--muted)',marginBottom:4}}>📞 {user.phone}</div>}
        {user?.city&&<div style={{fontSize:13,color:'var(--muted)',marginBottom:4}}>📍 {user.city}</div>}
        {user?.birth_date&&<div style={{fontSize:12,color:'var(--muted)',marginBottom:4}}>🎂 {user.birth_date}</div>}
        <div style={{marginTop:12,fontSize:11,color:'var(--light)'}}>Cliquer sur ✏️ pour changer la photo</div>
      </Card>

      {/* RIGHT — Form */}
      <Card style={{padding:28}}>
        <div style={{fontFamily:'Nunito',fontWeight:800,fontSize:18,color:'var(--navy)',marginBottom:22}}>✏️ {t.profileTab}</div>
        {/* Identity */}
        <div style={{background:'var(--teal3)',borderRadius:10,padding:'8px 14px',marginBottom:14,fontSize:12,fontWeight:700,color:'var(--teal2)'}}>👤 Identité</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:4}}>
          <div><LBL>Prénom</LBL><input style={INP} value={pf.name} onChange={e=>setPf(p=>({...p,name:e.target.value}))}/></div>
          <div><LBL>Nom de famille</LBL><input style={INP} value={pf.familyName} onChange={e=>setPf(p=>({...p,familyName:e.target.value}))}/></div>
          <div><LBL>Date de naissance</LBL><input style={INP} type="date" value={pf.birthDate} max={new Date().toISOString().split('T')[0]} onChange={e=>setPf(p=>({...p,birthDate:e.target.value}))}/></div>
          <div><LBL>Genre</LBL>
            <select style={{...INP,marginBottom:0}} value={pf.gender} onChange={e=>setPf(p=>({...p,gender:e.target.value}))}>
              <option value="">— Sélectionner —</option>
              <option value="homme">Homme</option>
              <option value="femme">Femme</option>
              <option value="autre">Autre</option>
            </select>
          </div>
          <div style={{gridColumn:'1/-1'}}><LBL>Ville</LBL><input style={INP} placeholder="Ex: Alger, Oran…" value={pf.city} onChange={e=>setPf(p=>({...p,city:e.target.value}))}/></div>
        </div>
        {/* Contact & Access */}
        <div style={{background:'var(--teal3)',borderRadius:10,padding:'8px 14px',margin:'16px 0 14px',fontSize:12,fontWeight:700,color:'var(--teal2)'}}>📬 Contact & Accès</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:4}}>
          <div><LBL>{t.emailLbl}</LBL><input style={INP} type="email" value={pf.email} onChange={e=>setPf(p=>({...p,email:e.target.value}))}/></div>
          <div><LBL>📞 {t.profilePhone}</LBL><input style={INP} type="tel" value={pf.phone} placeholder="0770 123 456" onChange={e=>setPf(p=>({...p,phone:e.target.value}))}/></div>
          <div style={{gridColumn:'1/-1'}}><LBL>🔒 {t.profileNewPass}</LBL><input style={INP} type="password" value={pf.password} placeholder="••••••••" onChange={e=>setPf(p=>({...p,password:e.target.value}))}/></div>
        </div>
        {user?.role==='agency'&&<>
          <div style={{height:1,background:'#F0F4F5',margin:'16px 0'}}/>
          <div style={{fontFamily:'Nunito',fontWeight:700,fontSize:14,color:'var(--navy)',marginBottom:14}}>🏢 {t.profileAgency}</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 80px',gap:12,marginBottom:4}}>
            <div><LBL>{t.agNameLbl}</LBL><input style={INP} value={pf.agencyName} onChange={e=>setPf(p=>({...p,agencyName:e.target.value}))}/></div>
            <div><LBL>Logo</LBL><input style={INP} value={pf.agencyLogo} placeholder="🏢" onChange={e=>setPf(p=>({...p,agencyLogo:e.target.value}))}/></div>
          </div>
          <div><LBL>{t.descLbl}</LBL><textarea style={TA(72)} value={pf.agencyDesc} onChange={e=>setPf(p=>({...p,agencyDesc:e.target.value}))}/></div>
        </>}
        <button style={{...B.pri,padding:'12px 28px',marginTop:8}} onClick={save} disabled={saving}>{saving?'…':t.profileSave}</button>
      </Card>
    </div>
  );
}

/* ── DASHBOARD ────────────────────────────────────────────────────────────── */
function DashPage({t,openAuth,setReviewBookingId=()=>{}}){
  const {user}=useAuth();
  const {show}=useToast();
  const [tab,setTab]=useState('stats');
  const [offers,setOffers]=useState([]);
  const [bookings,setBookings]=useState([]);
  const [agencyReviews,setAgencyReviews]=useState([]);
  const [loading,setLoading]=useState(false);
  const [editTarget,setEditTarget]=useState(null);
  const EF={title:'',category:'national',price:'',duration:'',region:'',description:'',imageUrl:'',itinerary:'',includes:'',dates:''};
  const [form,setForm]=useState(EF);
  const load=useCallback(async()=>{
    if(!user)return;setLoading(true);
    try{
      if(user.role==='agency'&&user.agencyId){
        setOffers(await api(`/agencies/${user.agencyId}/offers`));
        setBookings(await api(`/agencies/${user.agencyId}/bookings`));
        // Load all reviews for agency offers
        const offData=await api(`/agencies/${user.agencyId}/offers`);
        const revPromises=offData.map(o=>api(`/offers/${o.id}/reviews`).then(rs=>rs.map(r=>({...r,offer_title:o.title}))).catch(()=>[]));
        const revArrays=await Promise.all(revPromises);
        setAgencyReviews(revArrays.flat());
      }
      else if(user.role==='traveler'){setBookings(await api('/bookings/my'));}
    }catch(e){show(e.message,'err');}
    setLoading(false);
  },[user]);
  useEffect(()=>{load();},[load]);
  if(!user)return(
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'var(--offwhite)',paddingTop:68}}>
      <Card style={{padding:'48px 40px',textAlign:'center',maxWidth:380}}>
        <div style={{fontSize:48,marginBottom:16}}>🔐</div>
        <div style={{fontFamily:'Nunito',fontWeight:900,fontSize:20,color:'var(--navy)',marginBottom:8}}>Accès réservé</div>
        <p style={{color:'var(--muted)',marginBottom:24,fontSize:14}}>Connectez-vous pour accéder à votre espace personnel.</p>
        <button style={{...B.pri,width:'100%'}} onClick={()=>openAuth('login')}>{t.navLogin}</button>
      </Card>
    </div>
  );
  const submitOffer=async()=>{
    if(!form.title||!form.price||!form.region){show('Titre, prix et région requis','err');return;}
    try{
      const body={title:form.title,category:form.category,price:parseInt(form.price),duration:parseInt(form.duration)||1,region:form.region,description:form.description,imageUrl:form.imageUrl,
        itinerary:form.itinerary.split('\n').filter(Boolean),includes:form.includes.split('\n').filter(Boolean),dates:form.dates.split('\n').filter(Boolean)};
      if(editTarget){await api(`/offers/${editTarget.id}`,{method:'PUT',body});show('Offre mise à jour!');}
      else{await api('/offers',{method:'POST',body});show('Offre soumise pour validation!');}
      setForm(EF);setEditTarget(null);setTab('offers');load();
    }catch(e){show(e.message,'err');}
  };
  const delOffer=async(id)=>{
    if(!window.confirm(t.confirmDel))return;
    try{await api(`/offers/${id}`,{method:'DELETE'});show('Offre supprimée');load();}
    catch(e){show(e.message,'err');}
  };
  const startEdit=(o)=>{setEditTarget(o);setForm({title:o.title,category:o.category,price:String(o.price),duration:String(o.duration),region:o.region,description:o.description||'',imageUrl:o.image_url||'',itinerary:(o.itinerary||[]).join('\n'),includes:(o.includes||[]).join('\n'),dates:(o.available_dates||[]).join('\n')});setTab('add');};
  const TB=(a)=>({padding:'10px 18px',cursor:'pointer',fontSize:13,fontWeight:700,border:'none',borderBottom:a?'2px solid var(--teal)':'2px solid transparent',color:a?'var(--teal2)':'var(--muted)',background:'none',marginBottom:-1,transition:'all .18s'});
  const FI=({label,fk,type='text'})=><div><label style={{fontSize:12,fontWeight:600,color:'var(--muted)',display:'block',marginBottom:5,textTransform:'uppercase',letterSpacing:.8}}>{label}</label><input style={INP} type={type} value={form[fk]} onChange={e=>setForm(p=>({...p,[fk]:e.target.value}))}/></div>;
  const FTA=({label,fk,h=88})=><div><label style={{fontSize:12,fontWeight:600,color:'var(--muted)',display:'block',marginBottom:5,textTransform:'uppercase',letterSpacing:.8}}>{label}</label><textarea style={TA(h)} value={form[fk]} onChange={e=>setForm(p=>({...p,[fk]:e.target.value}))}/></div>;
  const SC=(ico,lbl,val,c='var(--teal2)')=>(
    <Card style={{padding:'20px 24px'}}>
      <div style={{fontSize:28,marginBottom:10}}>{ico}</div>
      <div style={{fontFamily:'Nunito',fontWeight:900,fontSize:30,color:c,lineHeight:1}}>{val}</div>
      <div style={{color:'var(--muted)',fontSize:12,fontWeight:600,marginTop:4,textTransform:'uppercase',letterSpacing:.8}}>{lbl}</div>
    </Card>
  );

  /* FIX 4: Short date formatter */
  const fmtDate=(d)=>d?new Date(d).toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric'}):'';

  return(
    <div style={{background:'var(--offwhite)',minHeight:'100vh',paddingTop:68}}>
      <div style={{background:'linear-gradient(135deg,var(--teal3),var(--teal4))',padding:'40px 24px 0'}}>
        <div style={{maxWidth:1280,margin:'0 auto'}}>
          <div style={{display:'flex',alignItems:'center',gap:16,marginBottom:24}}>
            <div style={{width:56,height:56,borderRadius:'50%',background:'linear-gradient(135deg,var(--teal),var(--teal2))',display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,fontWeight:900,color:'#fff',overflow:'hidden',flexShrink:0,border:'3px solid rgba(255,255,255,.7)'}}>
              {user.avatar?<img src={user.avatar} alt="" style={{width:'100%',height:'100%',objectFit:'cover'}}/>:user.name[0]}
            </div>
            <div>
              <div style={{fontFamily:'Nunito',fontWeight:900,fontSize:22,color:'var(--navy)'}}>{t.dashWelcome}, {user.name} 👋</div>
              <div style={{color:'var(--muted)',fontSize:13}}>{user.role==='agency'?'Compte Agence':user.role==='admin'?'Administrateur':'Compte Voyageur'}</div>
            </div>
          </div>
          {user.role==='agency'&&(
            <div style={{display:'flex',borderBottom:'2px solid rgba(0,0,0,.08)',gap:4}}>
              {[['stats',t.stats2],['bookings',t.myBook],['offers',t.myOffers],['add',editTarget?t.save:t.addOffer],['reviews','⭐ Avis'],['profile',t.profileTab]].map(([tk,lbl])=>(
                <button key={tk} style={TB(tab===tk)} onClick={()=>{if(tk!=='add'){setEditTarget(null);setForm(EF);}setTab(tk);}}>{lbl}</button>
              ))}
            </div>
          )}
          {user.role==='traveler'&&(
            <div style={{display:'flex',borderBottom:'2px solid rgba(0,0,0,.08)',gap:4}}>
              {[['bookings',t.myBook],['profile',t.profileTab]].map(([tk,lbl])=>(
                <button key={tk} style={TB(tab===tk)} onClick={()=>setTab(tk)}>{lbl}</button>
              ))}
            </div>
          )}
        </div>
      </div>
      <div style={{maxWidth:1280,margin:'0 auto',padding:'28px 24px 60px'}}>
        {user.role==='agency'&&<>
          {tab==='stats'&&!loading&&(
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(160px,1fr))',gap:16}}>
              {SC('📦',t.totOff,offers.length)}
              {SC('✅',t.approved,offers.filter(o=>o.status==='approved').length)}
              {SC('⏳',t.pending,offers.filter(o=>o.status==='pending').length,'#D97706')}
              {SC('👁',t.views,offers.reduce((s,o)=>s+(o.views||0),0))}
            </div>
          )}
          {tab==='bookings'&&(loading?<Spin/>:(
            <Card>
              <table style={{width:'100%',borderCollapse:'collapse'}}>
                <thead><tr>{['Voyageur','Email','Offre','Prix','Téléphone','Date','Statut','Action'].map(h=><th key={h} style={TH}>{h}</th>)}</tr></thead>

                  {bookings.map(b=>(

                      <td style={{...TD,fontWeight:700,color:'var(--teal2)',fontFamily:'Nunito'}}>{(o.price||0).toLocaleString()}</td>
                      <td style={{...TD,color:'var(--muted)'}}>{o.duration}j</td>
                      <td style={TD}>{o.avg_rating?<><Stars v={parseFloat(o.avg_rating)} size={12}/> <span style={{color:'#F59E0B',fontSize:12,fontWeight:700}}>{o.avg_rating}</span></>:'—'}</td>
                      <td style={TD}><Badge status={o.status}/></td>
                      <td style={TD}><div style={{display:'flex',gap:6}}><button style={B.sm} onClick={()=>startEdit(o)}>✏️</button><button style={B.danger} onClick={()=>delOffer(o.id)}>🗑️</button></div></td>

/* ── SHARED CHART PRIMITIVES ─────────────────────────────────────────────── */
function SvgLineChart({data,keys,colors,title,subtitle,height=160,formatY=v=>v}){
  if(!data||data.length<2) return(
    <Card style={{padding:'24px'}}>
      <div style={{fontFamily:'Nunito',fontWeight:800,fontSize:15,color:'var(--navy)',marginBottom:4}}>{title}</div>
      {subtitle&&<div style={{fontSize:11,color:'var(--muted)',marginBottom:16}}>{subtitle}</div>}
      <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:height,gap:8,color:'var(--muted)'}}>
        <div style={{fontSize:28}}>📭</div><div style={{fontSize:12,fontWeight:600}}>Données insuffisantes</div>
      </div>
    </Card>
  );
  const W=640,PAD=40,H=height;
  const maxes=keys.map(k=>Math.max(...data.map(d=>Number(d[k])||0),1));
  const pts=(k,maxV)=>data.map((d,i)=>{
    const x=PAD+(i/(data.length-1))*(W-2*PAD);
    const y=H-PAD-((Number(d[k])||0)/maxV)*(H-2*PAD);
    return{x,y,v:d[k],day:d.day||d.created_at||''};
  });
  return(
    <Card style={{padding:'24px'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:16,flexWrap:'wrap',gap:8}}>
        <div>
          <div style={{fontFamily:'Nunito',fontWeight:800,fontSize:15,color:'var(--navy)'}}>{title}</div>
          {subtitle&&<div style={{fontSize:11,color:'var(--muted)',marginTop:2}}>{subtitle}</div>}
        </div>
        <div style={{display:'flex',gap:16,flexWrap:'wrap'}}>
          {keys.map((k,i)=>(
            <span key={k} style={{display:'flex',alignItems:'center',gap:5,fontSize:11,fontWeight:600,color:'var(--muted)'}}>
              <span style={{width:20,height:3,borderRadius:2,background:colors[i],display:'inline-block'}}/>
              {k}
            </span>
          ))}
        </div>
      </div>
      <div style={{overflowX:'auto'}}>
        <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',minWidth:280,height:H}}>
          {[0,.25,.5,.75,1].map(f=>(
            <line key={f} x1={PAD} y1={PAD+f*(H-2*PAD)} x2={W-PAD} y2={PAD+f*(H-2*PAD)}
              stroke='#E2E8F0' strokeWidth='1' strokeDasharray={f===0?'0':'4,4'}/>
          ))}
          {keys.map((k,ki)=>{
            const P=pts(k,maxes[ki]);
            const path=P.map((p,i)=>`${i===0?'M':'L'}${p.x},${p.y}`).join(' ');
            const area=path+`L${W-PAD},${H-PAD}L${PAD},${H-PAD}Z`;
            return(
              <g key={k}>
                {ki===0&&<path d={area} fill={`${colors[ki]}18`}/>}
                <path d={path} fill='none' stroke={colors[ki]} strokeWidth='2.5' strokeLinecap='round' strokeLinejoin='round'/>
                {P.map((p,i)=>(
                  <circle key={i} cx={p.x} cy={p.y} r='3.5' fill={colors[ki]} opacity='.9'/>
                ))}
              </g>
            );
          })}
          {data.map((d,i)=>{
            const showL=i===0||i===data.length-1||i%Math.ceil(data.length/7)===0;
            if(!showL)return null;
            const x=PAD+(i/(data.length-1))*(W-2*PAD);
            const lbl=(d.day||'').slice(5)||'';
            return<text key={i} x={x} y={H-4} textAnchor='middle' fontSize='9' fill='#94A3B8'>{lbl}</text>;
          })}
          <text x={PAD-4} y={PAD+4} textAnchor='end' fontSize='9' fill='#94A3B8'>{formatY(maxes[0])}</text>
          <text x={PAD-4} y={H-PAD+4} textAnchor='end' fontSize='9' fill='#94A3B8'>0</text>
        </svg>
      </div>
    </Card>
  );
}

function DonutSmall({data,nameKey,valueKey,title,colors,size=120}){
  const COLS=colors||['#0DB9A8','#3B82F6','#F59E0B','#EF4444','#8B5CF6','#EC4899'];
  const total=data.reduce((s,d)=>s+(d[valueKey]||0),0)||1;
  let angle=0;
  const R=46,cx=60,cy=60;
  function arc(s,e){
    if(e-s>=360)return`M ${cx} ${cy-R} A ${R} ${R} 0 1 1 ${cx-.01} ${cy-R} Z`;
    const rad=a=>(a-90)*Math.PI/180;
    const sx=cx+R*Math.cos(rad(s)),sy=cy+R*Math.sin(rad(s));
    const ex=cx+R*Math.cos(rad(e)),ey=cy+R*Math.sin(rad(e));
    return`M${cx} ${cy}L${sx} ${sy}A${R} ${R} 0 ${e-s>180?1:0} 1 ${ex} ${ey}Z`;
  }
  const slices=data.map((d,i)=>{const pct=(d[valueKey]||0)/total;const s=angle;angle+=pct*360;return{...d,pct,s,e:angle,c:COLS[i%COLS.length]};});
  return(
    <div>
      <div style={{fontFamily:'Nunito',fontWeight:700,fontSize:13,color:'var(--navy)',marginBottom:10}}>{title}</div>
      {data.length===0?<div style={{color:'var(--muted)',fontSize:11,textAlign:'center',padding:'8px 0'}}>—</div>:(
        <div style={{display:'flex',gap:12,alignItems:'center'}}>
          <svg viewBox='0 0 120 120' style={{width:size,height:size,flexShrink:0}}>
            {slices.map((s,i)=><path key={i} d={arc(s.s,s.e)} fill={s.c} opacity='.9'/>)}
            <circle cx={cx} cy={cy} r={22} fill='#fff'/>
            <text x={cx} y={cy+4} textAnchor='middle' fontSize='11' fontWeight='700' fill='var(--navy)'>{total}</text>
          </svg>
          <div style={{flex:1}}>
            {slices.map((s,i)=>(
              <div key={i} style={{display:'flex',alignItems:'center',gap:6,marginBottom:5}}>
                <div style={{width:8,height:8,borderRadius:2,background:s.c,flexShrink:0}}/>
                <span style={{fontSize:11,color:'var(--muted)',flex:1,fontWeight:600}}>{s[nameKey]||'—'}</span>
                <span style={{fontSize:11,color:'var(--navy)',fontWeight:700}}>{Math.round(s.pct*100)}%</span>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

function HeatGrid({data,title}){
  const hours=Array.from({length:24},(_,h)=>{
    const f=(data||[]).find(d=>parseInt(d.hour)===h);
    return{h,c:f?f.c:0};
  });
  const max=Math.max(...hours.map(h=>h.c),1);
  return(
    <div>
      <div style={{fontFamily:'Nunito',fontWeight:700,fontSize:13,color:'var(--navy)',marginBottom:10}}>{title}</div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(12,1fr)',gap:3}}>
        {hours.map(({h,c})=>{
          const pct=c/max;
          const bg=c===0?'#F1F5F9':`rgba(13,185,168,${.12+pct*.88})`;
          return(
            <div key={h} title={`${h}h: ${c}`} style={{background:bg,borderRadius:5,padding:'5px 2px',textAlign:'center',cursor:'default'}}>
              <div style={{fontSize:8,color:pct>.5?'#fff':'#94A3B8',fontWeight:700}}>{h}h</div>
              <div style={{fontSize:8,color:pct>.5?'#fff':'var(--navy)',fontWeight:600}}>{c||''}</div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function StatRow({label,curr,prev,format=v=>v,color='var(--teal2)'}){
  const pct=prev>0?Math.round(((curr-prev)/prev)*100):null;
  const up=pct>0,same=pct===0;
  return(
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 0',borderBottom:'1px solid #F1F5F9'}}>
      <span style={{fontSize:13,color:'var(--muted)',fontWeight:600}}>{label}</span>
      <div style={{display:'flex',alignItems:'center',gap:10}}>
        <span style={{fontFamily:'Nunito',fontWeight:900,fontSize:18,color}}>{format(curr)}</span>
        {pct!==null&&(
          <span style={{fontSize:11,fontWeight:700,color:up?'#10B981':same?'#94A3B8':'#EF4444',background:up?'#D1FAE5':same?'#F1F5F9':'#FEE2E2',padding:'2px 8px',borderRadius:20}}>
            {up?'↑':same?'—':'↓'}{Math.abs(pct)}%
          </span>
        )}
      </div>
    </div>
  );
}

function MiniBarH({data,nameKey,valueKey,title,color='var(--teal)',formatVal=v=>v,maxRows=8}){

}

/* ── ADMIN CREATE AGENCY FORM ─────────────────────────────────────────────── */
function AdminCreateAgencyForm({onCreated}){
  const {show}=useToast();
  const EF={name:'',email:'',password:'',phone:'',agencyName:'',description:'',logo:'🏢',plan:'standard'};
  const [f,setF]=useState(EF);
  const [open,setOpen]=useState(false);
  const [loading,setLoading]=useState(false);

  const submit=async()=>{
    if(!f.name||!f.email||!f.password){show('Nom, email et mot de passe requis','err');return;}
    if(f.password.length<6){show('Mot de passe: minimum 6 caractères','err');return;}
    setLoading(true);
    try{
      await api('/admin/create-agency',{method:'POST',body:f});
      show('✅ Agence créée avec succès !','ok');
      setF(EF);setOpen(false);
      if(onCreated)onCreated();
    }catch(e){show(e.message,'err');}
    setLoading(false);
  };

  return(
    <div style={{marginBottom:8}}>
      <button style={{...B.pri,display:'flex',alignItems:'center',gap:8,padding:'10px 22px',fontSize:13}}
        onClick={()=>setOpen(o=>!o)}>
        {open?'✕ Fermer':'➕ Créer une agence'}
      </button>

      {open&&(
        <Card style={{marginTop:16,padding:'28px',border:'2px solid var(--teal3)',background:'#FAFFFE'}}>
          <div style={{fontFamily:'Nunito',fontWeight:900,fontSize:16,color:'var(--navy)',marginBottom:20}}>🏢 Nouveau compte agence</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:12}}>
            <div>
              <label style={{fontSize:11,fontWeight:700,color:'var(--muted)',textTransform:'uppercase',letterSpacing:.8,display:'block',marginBottom:5}}>Nom du contact *</label>
              <input style={INP} placeholder="Ex: Ahmed Benali" value={f.name} onChange={e=>setF(p=>({...p,name:e.target.value}))}/>
            </div>
            <div>
              <label style={{fontSize:11,fontWeight:700,color:'var(--muted)',textTransform:'uppercase',letterSpacing:.8,display:'block',marginBottom:5}}>Nom de l'agence *</label>
              <input style={INP} placeholder="Ex: DZ Horizons Travel" value={f.agencyName} onChange={e=>setF(p=>({...p,agencyName:e.target.value}))}/>
            </div>
            <div>
              <label style={{fontSize:11,fontWeight:700,color:'var(--muted)',textTransform:'uppercase',letterSpacing:.8,display:'block',marginBottom:5}}>Email *</label>
              <input style={INP} type="email" placeholder="agence@example.com" value={f.email} onChange={e=>setF(p=>({...p,email:e.target.value}))}/>
            </div>
            <div>
              <label style={{fontSize:11,fontWeight:700,color:'var(--muted)',textTransform:'uppercase',letterSpacing:.8,display:'block',marginBottom:5}}>Mot de passe *</label>
              <input style={INP} type="password" placeholder="Min. 6 caractères" value={f.password} onChange={e=>setF(p=>({...p,password:e.target.value}))}/>
            </div>
            <div>
              <label style={{fontSize:11,fontWeight:700,color:'var(--muted)',textTransform:'uppercase',letterSpacing:.8,display:'block',marginBottom:5}}>Téléphone</label>
              <input style={INP} type="tel" placeholder="0770 123 456" value={f.phone} onChange={e=>setF(p=>({...p,phone:e.target.value}))}/>
            </div>
            <div>
              <label style={{fontSize:11,fontWeight:700,color:'var(--muted)',textTransform:'uppercase',letterSpacing:.8,display:'block',marginBottom:5}}>Plan</label>
              <select style={{...INP,marginBottom:0}} value={f.plan} onChange={e=>setF(p=>({...p,plan:e.target.value}))}>
                <option value="standard">Standard</option>
                <option value="premium">Premium ⭐</option>
              </select>
            </div>
          </div>
          <div style={{marginBottom:12}}>
            <label style={{fontSize:11,fontWeight:700,color:'var(--muted)',textTransform:'uppercase',letterSpacing:.8,display:'block',marginBottom:5}}>Description</label>
            <textarea style={TA(72)} placeholder="Description courte de l'agence…" value={f.description} onChange={e=>setF(p=>({...p,description:e.target.value}))}/>
          </div>
          <div style={{display:'flex',gap:10,alignItems:'center'}}>
            <div style={{flex:1}}>
              <label style={{fontSize:11,fontWeight:700,color:'var(--muted)',textTransform:'uppercase',letterSpacing:.8,display:'block',marginBottom:5}}>Logo (emoji)</label>
              <input style={{...INP,maxWidth:100}} placeholder="🏢" value={f.logo} onChange={e=>setF(p=>({...p,logo:e.target.value}))}/>
            </div>
            <button style={{...B.pri,padding:'12px 32px',fontSize:14,alignSelf:'flex-end',marginBottom:0}} onClick={submit} disabled={loading}>
              {loading?'…':'✅ Créer le compte'}
            </button>
          </div>
        </Card>
      )}
    </div>
  );
}

function AdminPage({t,openAuth}){
  const {user}=useAuth();
  const {show}=useToast();
  const [tab,setTab]=useState('offers');
  const [data,setData]=useState({offers:[],agencies:[],users:[],reviews:[],bookings:[],stats:null});
  const [loading,setLoading]=useState(false);
  const load=useCallback(async()=>{
    if(!user||user.role!=='admin')return;setLoading(true);
    try{
      const [stats,offers,agencies,users,reviews,bookings]=await Promise.all([api('/admin/stats'),api('/admin/offers'),api('/agencies'),api('/admin/users'),api('/admin/reviews'),api('/admin/bookings')]);
      setData({stats,offers,agencies,users,reviews,bookings});
    }catch(e){show(e.message,'err');}
    setLoading(false);
  },[user]);
  useEffect(()=>{load();},[load]);
  if(!user||user.role!=='admin')return(
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'var(--offwhite)',paddingTop:68}}>
      <Card style={{padding:'48px 40px',textAlign:'center',maxWidth:380}}>

        <div style={{fontFamily:'Nunito',fontWeight:900,fontSize:20,color:'var(--navy)',marginBottom:8}}>Admin uniquement</div>
        <button style={{...B.pri,width:'100%',marginTop:16}} onClick={()=>openAuth('login')}>{t.navLogin}</button>
      </Card>
    </div>
  );
  const patch=async(url,body,msg)=>{try{await api(url,{method:'PATCH',body});show(msg);load();}catch(e){show(e.message,'err');}};
  const {stats,offers,agencies,users,reviews,bookings=[]}=data;
  const pendO=offers.filter(o=>o.status==='pending').length;
  const pendR=reviews.filter(r=>r.status==='pending').length;

    <Card><table style={{width:'100%',borderCollapse:'collapse'}}>
      <thead><tr>{cols.map(c=><th key={c} style={TH}>{c}</th>)}</tr></thead>
      <tbody>{children}</tbody>
    </table></Card>
  );
  /* FIX 4: date formatter */
  const fmtDate=(d)=>d?new Date(d).toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric'}):'';
  return(
    <div style={{background:'var(--offwhite)',minHeight:'100vh',paddingTop:68}}>
      <div style={{background:'linear-gradient(135deg,var(--teal3),var(--teal4))',padding:'40px 24px 0'}}>
        <div style={{maxWidth:1280,margin:'0 auto'}}>
          <div style={{fontFamily:'Nunito',fontWeight:900,fontSize:28,color:'var(--navy)',marginBottom:20}}>🛡️ {t.adminTitle}</div>
          {stats&&<div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(140px,1fr))',gap:12,marginBottom:24}}>
            {[['📦','Offres',stats.total_offers,'var(--teal2)'],['⏳','En attente',stats.pending_offers,'#D97706'],['✅','Validées',stats.approved_offers,'#059669'],['🏢','Agences',stats.total_agencies,'var(--teal2)'],['👤','Voyageurs',stats.total_travelers,'var(--teal2)'],['💬','Avis',stats.total_reviews,'var(--teal2)'],['🔔','Avis pend.',stats.pending_reviews,'#D97706'],['🎫','Réservations',stats.total_bookings,'var(--teal2)']].map(([ico,lbl,val,c])=>(
              <div key={lbl} style={{background:'rgba(255,255,255,.8)',borderRadius:12,padding:'14px 16px',backdropFilter:'blur(4px)'}}>
                <div style={{fontSize:20,marginBottom:6}}>{ico}</div>
                <div style={{fontFamily:'Nunito',fontWeight:900,fontSize:24,color:c,lineHeight:1}}>{val}</div>

              <button key={tk} style={TB(tab===tk)} onClick={()=>setTab(tk)}>
