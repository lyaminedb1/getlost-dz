const {useState,useEffect,useCallback,useRef,createContext,useContext}=React;

/* ── API ──────────────────────────────────────────────────────────────────── */
async function api(path,opts={}){
  const tok=localStorage.getItem('glz_tok');
  const res=await fetch('/api'+path,{
    headers:{'Content-Type':'application/json',...(tok?{Authorization:`Bearer ${tok}`}:{})},
    method:opts.method||'GET',
    body:opts.body?JSON.stringify(opts.body):undefined
  });
  const data=await res.json();
  if(!res.ok)throw new Error(data.error||'Erreur');
  return data;
}

/* ── AUTH CONTEXT ─────────────────────────────────────────────────────────── */
const AuthCtx=createContext(null);
function AuthProvider({children}){
  const [user,setUser]=useState(null);
  useEffect(()=>{const s=localStorage.getItem('glz_user');if(s)try{setUser(JSON.parse(s))}catch{}},[]);
  const login=async(email,password)=>{
    const d=await api('/auth/login',{method:'POST',body:{email,password}});
    localStorage.setItem('glz_tok',d.token);localStorage.setItem('glz_user',JSON.stringify(d.user));
    setUser(d.user);return d.user;
  };
  const register=async(body)=>{
    const d=await api('/auth/register',{method:'POST',body});
    localStorage.setItem('glz_tok',d.token);localStorage.setItem('glz_user',JSON.stringify(d.user));
    setUser(d.user);return d.user;
  };
  const logout=()=>{localStorage.removeItem('glz_tok');localStorage.removeItem('glz_user');setUser(null);};
  return <AuthCtx.Provider value={{user,login,register,logout}}>{children}</AuthCtx.Provider>;
}
const useAuth=()=>useContext(AuthCtx);

/* ── TOAST ────────────────────────────────────────────────────────────────── */
const ToastCtx=createContext(null);
function ToastProvider({children}){
  const [toasts,setToasts]=useState([]);
  const show=(msg,type='ok')=>{
    const id=Date.now()+Math.random();
    setToasts(p=>[...p,{id,msg,type}]);
    setTimeout(()=>setToasts(p=>p.filter(t=>t.id!==id)),4000);
  };
  const colors={ok:{bg:'#10B981',text:'#fff'},err:{bg:'#EF4444',text:'#fff'},warn:{bg:'#F59E0B',text:'#fff'}};
  return(
    <ToastCtx.Provider value={{show}}>
      {children}
      <div style={{position:'fixed',top:76,right:18,zIndex:9999,display:'flex',flexDirection:'column',gap:8}}>
        {toasts.map(t=>{const c=colors[t.type]||colors.ok;return(
          <div key={t.id} className="toast-in" style={{padding:'12px 20px',borderRadius:12,fontSize:14,fontWeight:600,maxWidth:340,background:c.bg,color:c.text,boxShadow:'0 8px 24px rgba(0,0,0,.15)'}}>
            {t.type==='ok'?'✅':t.type==='err'?'❌':'⚠️'} {t.msg}
          </div>
        );})}
      </div>
    </ToastCtx.Provider>
  );
}
const useToast=()=>useContext(ToastCtx);

/* ── OFFER MODAL ──────────────────────────────────────────────────────────── */
function OfferModal({offer,onClose,t,lang}){
  const {user}=useAuth();
  const {show}=useToast();
  const [reviews,setReviews]=useState([]);
  const [rf,setRf]=useState({rating:0,title:'',comment:''});
  const [booking,setBooking]=useState(false);
  const [submitting,setSubmitting]=useState(false);
  const rtl=lang==='ar';
  useEffect(()=>{if(offer)api(`/offers/${offer.id}/reviews`).then(setReviews).catch(()=>{});},[offer?.id]);
  if(!offer)return null;
  const avg=reviews.length?(reviews.reduce((s,r)=>s+r.rating,0)/reviews.length).toFixed(1):(offer.avg_rating||null);
  const SL=({children})=><div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:1.5,color:'var(--teal2)',marginBottom:10}}>{children}</div>;
  const handleBook=async()=>{
    if(!user){onClose();show('Connectez-vous pour réserver','warn');return;}
    setBooking(true);
    try{await api('/bookings',{method:'POST',body:{offerId:offer.id}});show(t.bookMsg);}
    catch(e){show(e.message,'err');}
    setBooking(false);
  };
  const handleReview=async()=>{
    if(!user){show('Connectez-vous pour laisser un avis','warn');return;}
    if(!rf.rating||!rf.title.trim()){show('Note et titre requis','err');return;}
    setSubmitting(true);
    try{await api(`/offers/${offer.id}/reviews`,{method:'POST',body:rf});show('Avis soumis, il sera publié après modération.');setRf({rating:0,title:'',comment:''});}
    catch(e){show(e.message,'err');}
    setSubmitting(false);
  };
  return(
    <div style={{position:'fixed',inset:0,background:'rgba(11,35,64,.6)',backdropFilter:'blur(8px)',zIndex:500,display:'flex',alignItems:'center',justifyContent:'center',padding:16}} onClick={onClose}>
      <div style={{background:'#fff',borderRadius:24,overflow:'hidden',maxWidth:660,width:'100%',maxHeight:'92vh',overflowY:'auto',direction:rtl?'rtl':'ltr'}} className="fade" onClick={e=>e.stopPropagation()}>
        <div style={{position:'relative'}}>
          <img src={offer.image_url||'https://images.unsplash.com/photo-1469854523086-cc02fe5d8800?w=700&q=80'} alt={offer.title}
            onError={e=>e.target.src='https://images.unsplash.com/photo-1469854523086-cc02fe5d8800?w=700&q=80'}
            style={{width:'100%',height:240,objectFit:'cover',display:'block'}}/>
          <button onClick={onClose} style={{position:'absolute',top:14,right:14,background:'rgba(255,255,255,.95)',border:'none',borderRadius:'50%',width:36,height:36,fontSize:18,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 2px 12px rgba(0,0,0,.15)'}}>×</button>
          <div style={{position:'absolute',bottom:14,left:14,background:'rgba(255,255,255,.95)',borderRadius:20,padding:'4px 14px',fontSize:11,fontWeight:700,color:'var(--teal2)'}}>{t.catIco[offer.category]} {t.cats[offer.category]}</div>
        </div>
        <div style={{padding:'24px 28px 30px'}}>
          <div style={{fontFamily:'Nunito',fontWeight:900,fontSize:22,color:'var(--navy)',marginBottom:8}}>{offer.title}</div>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:16}}>
            <Stars v={parseFloat(avg)||0} size={16}/>
            {avg&&<span style={{fontWeight:800,color:'#F59E0B'}}>{avg}</span>}
            <span style={{color:'var(--muted)',fontSize:13}}>({reviews.length} {t.revs})</span>
          </div>
          <div style={{display:'flex',flexWrap:'wrap',gap:8,marginBottom:18}}>
            {[['📍',offer.region],['⏱',`${offer.duration} ${t.days}`],['💰',`${(offer.price||0).toLocaleString()} DZD${t.per}`],offer.agency_name&&['🏢',offer.agency_name]].filter(Boolean).filter(([,v])=>v).map(([i,v])=>(
              <span key={v} style={{padding:'6px 14px',background:'#F7FAFA',borderRadius:20,fontSize:13,fontWeight:500,color:'var(--text)'}}>{i} {v}</span>
            ))}
          </div>
          {offer.description&&<p style={{color:'var(--muted)',lineHeight:1.8,marginBottom:20,fontSize:14}}>{offer.description}</p>}
          {offer.itinerary?.length>0&&<div style={{marginBottom:18}}>
            <SL>{t.itin}</SL>
            {offer.itinerary.map((s,i)=><div key={i} style={{display:'flex',gap:12,marginBottom:7,fontSize:14}}>
              <span style={{width:22,height:22,borderRadius:'50%',background:'var(--teal3)',color:'var(--teal2)',display:'inline-flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:800,flexShrink:0,marginTop:1}}>{i+1}</span>
              <span style={{color:'var(--text)'}}>{s}</span>
            </div>)}
          </div>}
          {offer.includes?.length>0&&<div style={{marginBottom:18}}>
            <SL>{t.incl}</SL>
            <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
              {offer.includes.map((x,i)=><span key={i} style={{padding:'6px 14px',background:'var(--teal3)',borderRadius:20,fontSize:12,fontWeight:600,color:'var(--teal2)'}}>✓ {x}</span>)}

            <SL>{t.dates}</SL>
            <div style={{display:'flex',flexWrap:'wrap',gap:6}}>

                    <Stars v={r.rating} size={12}/>
                  </div>
                  <span style={{fontSize:11,color:'var(--muted)'}}>{(r.created_at||'').split('T')[0]}</span>
                </div>
                <div style={{fontWeight:600,fontSize:14,marginBottom:3,color:'var(--navy)'}}>{r.title}</div>
                {r.comment&&<div style={{color:'var(--muted)',fontSize:13}}>{r.comment}</div>}

            <SL>✏️ {t.leaveRev}</SL>
            <div style={{marginBottom:12}}>
              <div style={{fontSize:12,color:'var(--muted)',marginBottom:6,fontWeight:600}}>{t.yourRating}</div>
              <Stars v={rf.rating} size={28} interactive onRate={v=>setRf(p=>({...p,rating:v}))}/>
            </div>
            <input style={INP} placeholder={t.revTitle+'…'} value={rf.title} onChange={e=>setRf(p=>({...p,title:e.target.value}))}/>
            <textarea style={TA(70)} placeholder={t.revPlaceholder} value={rf.comment} onChange={e=>setRf(p=>({...p,comment:e.target.value}))}/>
            <button style={B.pri} onClick={handleReview} disabled={submitting}>{submitting?'…':t.submitRev}</button>
          </div>}
          {/* Book CTA */}
          <div style={{background:'linear-gradient(135deg,var(--navy),var(--navy2))',borderRadius:16,padding:'20px 24px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>

                {(offer.price||0).toLocaleString()} <span style={{fontSize:12,color:'rgba(255,255,255,.5)',fontWeight:400}}>DZD{t.per}</span>
              </div>
            </div>
            <button style={{...B.white,fontSize:14,padding:'12px 24px'}} onClick={handleBook} disabled={booking}>{booking?'…':t.book}</button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── AUTH MODAL ───────────────────────────────────────────────────────────── */
function AuthModal({mode,onClose,t}){
  const {login,register}=useAuth();
  const {show}=useToast();
  const [isLogin,setIsLogin]=useState(mode==='login');
  const [role,setRole]=useState('traveler');
  const [f,setF]=useState({email:'',password:'',name:'',agencyName:'',description:''});
  const [loading,setLoading]=useState(false);
  useEffect(()=>setIsLogin(mode==='login'),[mode]);
  const submit=async()=>{
    if(!f.email||!f.password){show('Email et mot de passe requis','err');return;}
    setLoading(true);
    try{
      if(isLogin){const u=await login(f.email,f.password);show(`Bienvenue, ${u.name}!`);}
      else{if(!f.name){show('Nom requis','err');setLoading(false);return;}await register({...f,role});show('Compte créé !');}
      onClose();
    }catch(e){show(e.message,'err');}
    setLoading(false);
  };
  return(
    <div style={{position:'fixed',inset:0,background:'rgba(11,35,64,.6)',backdropFilter:'blur(8px)',zIndex:500,display:'flex',alignItems:'center',justifyContent:'center',padding:16}} onClick={onClose}>
      <div style={{background:'#fff',borderRadius:24,padding:'32px 28px',maxWidth:420,width:'100%',boxShadow:'0 24px 60px rgba(11,35,64,.2)'}} className="fade" onClick={e=>e.stopPropagation()}>
        <div style={{textAlign:'center',marginBottom:24}}>
          <img src="/logo-dark.png" alt="Get Lost DZ" style={{height:52,marginBottom:14}}
            onError={e=>e.target.style.display='none'}/>
          <div style={{fontFamily:'Nunito',fontWeight:900,fontSize:20,color:'var(--navy)'}}>{isLogin?t.loginTitle:t.regTitle}</div>
        </div>
        {!isLogin&&(
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:16}}>
            {['traveler','agency'].map(r=>(
              <button key={r} style={{padding:'11px 0',borderRadius:12,fontWeight:700,fontSize:13,border:`2px solid ${role===r?'var(--teal)':'#E2EBF0'}`,background:role===r?'var(--teal3)':'#fff',color:role===r?'var(--teal2)':'var(--muted)',cursor:'pointer',transition:'all .18s'}}
                onClick={()=>setRole(r)}>{r==='traveler'?`🧳 ${t.roleT}`:`🏢 ${t.roleA}`}</button>
            ))}
          </div>
        )}
        <input style={INP} type="email" placeholder={t.emailLbl} value={f.email} onChange={e=>setF(p=>({...p,email:e.target.value}))}/>
        <input style={INP} type="password" placeholder={t.passLbl} value={f.password} onChange={e=>setF(p=>({...p,password:e.target.value}))} onKeyDown={e=>e.key==='Enter'&&submit()}/>
        {!isLogin&&<>
          <input style={INP} placeholder={role==='agency'?t.agNameLbl:t.nameLbl} value={f.name} onChange={e=>setF(p=>({...p,name:e.target.value}))}/>
          {role==='agency'&&<textarea style={TA(66)} placeholder={t.descLbl} value={f.description} onChange={e=>setF(p=>({...p,description:e.target.value}))}/>}
        </>}
        <button style={{...B.pri,width:'100%',padding:13,fontSize:15}} onClick={submit} disabled={loading}>{loading?'…':isLogin?t.loginTitle:t.regTitle}</button>
        <div style={{textAlign:'center',marginTop:14,fontSize:13,color:'var(--muted)'}}>
          {isLogin?<>{t.noAcc} <span style={{color:'var(--teal2)',cursor:'pointer',fontWeight:700}} onClick={()=>setIsLogin(false)}>{t.regTitle}</span></>
          :<>{t.hasAcc} <span style={{color:'var(--teal2)',cursor:'pointer',fontWeight:700}} onClick={()=>setIsLogin(true)}>{t.loginTitle}</span></>}
        </div>
        <div style={{marginTop:16,padding:'10px 14px',background:'#F7FAFA',borderRadius:10,fontSize:11,color:'var(--muted)',lineHeight:1.6}}>{t.demo}</div>
      </div>
    </div>
  );
}

/* ── TRIPS PAGE ───────────────────────────────────────────────────────────── */
function TripsPage({t,filterCat,setFilterCat,onOpen}){
  const [offers,setOffers]=useState([]);
  const [loading,setLoading]=useState(true);
  const [search,setSearch]=useState('');
  const [sort,setSort]=useState('rating');
  const [debSearch,setDebSearch]=useState('');
  useEffect(()=>{const tm=setTimeout(()=>setDebSearch(search),400);return()=>clearTimeout(tm);},[search]);
  useEffect(()=>{
    setLoading(true);
    const p=new URLSearchParams({sort});
    if(filterCat&&filterCat!=='all')p.set('category',filterCat);
    if(debSearch)p.set('search',debSearch);
    api(`/offers?${p}`).then(d=>{setOffers(d);setLoading(false);}).catch(()=>setLoading(false));
  },[filterCat,sort,debSearch]);
  return(
    <div style={{background:'var(--offwhite)',minHeight:'100vh',paddingTop:68}}>

            <div style={{position:'relative',flex:1,minWidth:240}}>
              <span style={{position:'absolute',left:14,top:'50%',transform:'translateY(-50%)',fontSize:16}}>🔍</span>
              <input style={{...INP,paddingLeft:42,marginBottom:0,borderRadius:50,boxShadow:'var(--shadow)'}} placeholder={t.srchPh} value={search} onChange={e=>setSearch(e.target.value)}/>
            </div>
            <select style={{...INP,width:'auto',marginBottom:0,borderRadius:50,paddingLeft:16,background:'#fff',cursor:'pointer',boxShadow:'var(--shadow)'}} value={sort} onChange={e=>setSort(e.target.value)}>
              {t.sorts.map(([v,l])=><option key={v} value={v}>{l}</option>)}
            </select>
          </div>
        </div>
      </div>
      <div style={{maxWidth:1280,margin:'0 auto',padding:'28px 24px 60px'}}>
        {/* Category filters */}
        <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:28}}>
          {['all','intl','national','hike','visa'].map(c=>(
            <button key={c} style={{padding:'8px 20px',borderRadius:50,cursor:'pointer',fontSize:13,fontWeight:700,border:'none',background:filterCat===c?'var(--teal)':'#fff',color:filterCat===c?'#fff':'var(--text)',boxShadow:filterCat===c?'0 4px 14px rgba(13,185,168,.3)':'var(--shadow)',transition:'all .2s'}}
              onClick={()=>setFilterCat(c)}>{t.catIco[c]||'🌍'} {t.cats[c]||c}</button>
          ))}
        </div>
        {loading?<Spin/>:offers.length===0
          ?<div style={{textAlign:'center',padding:'60px 0',color:'var(--muted)'}}>
            <div style={{fontSize:48,marginBottom:12}}>🔍</div>
            <div style={{fontFamily:'Nunito',fontWeight:700,fontSize:18,marginBottom:6}}>Aucune offre trouvée</div>
            <div style={{fontSize:14}}>Essayez une autre recherche</div>
          </div>
          :<div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(300px,1fr))',gap:24}}>
            {offers.map(o=><OfferCard key={o.id} offer={o} t={t} onOpen={onOpen}/>)}

        }
      </div>
    </div>
  );
}

/* ── DASHBOARD ────────────────────────────────────────────────────────────── */
function DashPage({t,openAuth}){
  const {user}=useAuth();
  const {show}=useToast();
  const [tab,setTab]=useState('stats');
  const [offers,setOffers]=useState([]);
  const [bookings,setBookings]=useState([]);

  const [editTarget,setEditTarget]=useState(null);
  const EF={title:'',category:'national',price:'',duration:'',region:'',description:'',imageUrl:'',itinerary:'',includes:'',dates:''};
  const [form,setForm]=useState(EF);
  const load=useCallback(async()=>{
    if(!user)return;setLoading(true);
    try{
      if(user.role==='agency'&&user.agencyId){setOffers(await api(`/agencies/${user.agencyId}/offers`));setBookings(await api(`/agencies/${user.agencyId}/bookings`));}
      else if(user.role==='traveler'){setBookings(await api('/bookings/my'));}
    }catch(e){show(e.message,'err');}
    setLoading(false);
  },[user]);
  useEffect(()=>{load();},[load]);
  if(!user)return(
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'var(--offwhite)',paddingTop:68}}>
      <Card style={{padding:'48px 40px',textAlign:'center',maxWidth:380}}>

        <div style={{fontFamily:'Nunito',fontWeight:900,fontSize:20,color:'var(--navy)',marginBottom:8}}>Accès réservé</div>
        <p style={{color:'var(--muted)',marginBottom:24,fontSize:14}}>Connectez-vous pour accéder à votre espace personnel.</p>
        <button style={{...B.pri,width:'100%'}} onClick={()=>openAuth('login')}>{t.navLogin}</button>

  const submitOffer=async()=>{
    if(!form.title||!form.price||!form.region){show('Titre, prix et région requis','err');return;}
    try{
      const body={title:form.title,category:form.category,price:parseInt(form.price),duration:parseInt(form.duration)||1,region:form.region,description:form.description,imageUrl:form.imageUrl,
        itinerary:form.itinerary.split('\n').filter(Boolean),includes:form.includes.split('\n').filter(Boolean),dates:form.dates.split('\n').filter(Boolean)};
      if(editTarget){await api(`/offers/${editTarget.id}`,{method:'PUT',body});show('Offre mise à jour!');}
      else{await api('/offers',{method:'POST',body});show('Offre soumise pour validation!');}
      setForm(EF);setEditTarget(null);setTab('offers');load();
    }catch(e){show(e.message,'err');}
  };
  const delOffer=async(id)=>{
    if(!window.confirm(t.confirmDel))return;
    try{await api(`/offers/${id}`,{method:'DELETE'});show('Offre supprimée');load();}
    catch(e){show(e.message,'err');}

  const startEdit=(o)=>{setEditTarget(o);setForm({title:o.title,category:o.category,price:String(o.price),duration:String(o.duration),region:o.region,description:o.description||'',imageUrl:o.image_url||'',itinerary:(o.itinerary||[]).join('\n'),includes:(o.includes||[]).join('\n'),dates:(o.available_dates||[]).join('\n')});setTab('add');};
  const TB=(a)=>({padding:'10px 18px',cursor:'pointer',fontSize:13,fontWeight:700,border:'none',borderBottom:a?'2px solid var(--teal)':'2px solid transparent',color:a?'var(--teal2)':'var(--muted)',background:'none',marginBottom:-1,transition:'all .18s'});
  const FI=({label,fk,type='text'})=><div><label style={{fontSize:12,fontWeight:600,color:'var(--muted)',display:'block',marginBottom:5,textTransform:'uppercase',letterSpacing:.8}}>{label}</label><input style={INP} type={type} value={form[fk]} onChange={e=>setForm(p=>({...p,[fk]:e.target.value}))}/></div>;
  const FTA=({label,fk,h=88})=><div><label style={{fontSize:12,fontWeight:600,color:'var(--muted)',display:'block',marginBottom:5,textTransform:'uppercase',letterSpacing:.8}}>{label}</label><textarea style={TA(h)} value={form[fk]} onChange={e=>setForm(p=>({...p,[fk]:e.target.value}))}/></div>;
  const SC=(ico,lbl,val,c='var(--teal2)')=>(
    <Card style={{padding:'20px 24px'}}>
      <div style={{fontSize:28,marginBottom:10}}>{ico}</div>
      <div style={{fontFamily:'Nunito',fontWeight:900,fontSize:30,color:c,lineHeight:1}}>{val}</div>
      <div style={{color:'var(--muted)',fontSize:12,fontWeight:600,marginTop:4,textTransform:'uppercase',letterSpacing:.8}}>{lbl}</div>
    </Card>
  );
  return(
    <div style={{background:'var(--offwhite)',minHeight:'100vh',paddingTop:68}}>
      <div style={{background:'linear-gradient(135deg,var(--teal3),var(--teal4))',padding:'40px 24px 0'}}>
        <div style={{maxWidth:1280,margin:'0 auto'}}>
          <div style={{display:'flex',alignItems:'center',gap:16,marginBottom:24}}>
            <div style={{width:56,height:56,borderRadius:'50%',background:'linear-gradient(135deg,var(--teal),var(--teal2))',display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,fontWeight:900,color:'#fff'}}>{user.name[0]}</div>
            <div>
              <div style={{fontFamily:'Nunito',fontWeight:900,fontSize:22,color:'var(--navy)'}}>{t.dashWelcome}, {user.name} 👋</div>
              <div style={{color:'var(--muted)',fontSize:13}}>{user.role==='agency'?'Compte Agence':user.role==='admin'?'Administrateur':'Compte Voyageur'}</div>
            </div>
          </div>
          {user.role==='agency'&&(
            <div style={{display:'flex',borderBottom:'2px solid rgba(0,0,0,.08)',gap:4}}>
              {[['stats',t.stats2],['bookings',t.myBook],['offers',t.myOffers],['add',editTarget?t.save:t.addOffer]].map(([tk,lbl])=>(
                <button key={tk} style={TB(tab===tk)} onClick={()=>{if(tk!=='add'){setEditTarget(null);setForm(EF);}setTab(tk);}}>{lbl}</button>
              ))}
            </div>

              {SC('⏳',t.pending,offers.filter(o=>o.status==='pending').length,'#D97706')}
              {SC('👁',t.views,offers.reduce((s,o)=>s+(o.views||0),0))}
            </div>
          )}
          {tab==='bookings'&&(loading?<Spin/>:(
            <Card>
              <table style={{width:'100%',borderCollapse:'collapse'}}>
                <thead><tr>{['Voyageur','Email','Offre','Prix','Date','Statut','Action'].map(h=><th key={h} style={TH}>{h}</th>)}</tr></thead>
                <tbody>
                  {bookings.map(b=>(
                    <tr key={b.id} style={{transition:'background .15s'}} onMouseEnter={e=>e.currentTarget.style.background='#FAFCFC'} onMouseLeave={e=>e.currentTarget.style.background=''}>

                      <td style={{...TD,color:'var(--muted)'}}>{t.cats[o.category]||o.category}</td>
                      <td style={{...TD,fontWeight:700,color:'var(--teal2)',fontFamily:'Nunito'}}>{(o.price||0).toLocaleString()}</td>

                      <td style={TD}><Badge status={o.status}/></td>

        <div style={{maxWidth:1280,margin:'0 auto'}}>
          <div style={{fontFamily:'Nunito',fontWeight:900,fontSize:28,color:'var(--navy)',marginBottom:20}}>🛡️ {t.adminTitle}</div>
          {stats&&<div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(140px,1fr))',gap:12,marginBottom:24}}>
            {[['📦','Offres',stats.total_offers,'var(--teal2)'],['⏳','En attente',stats.pending_offers,'#D97706'],['✅','Validées',stats.approved_offers,'#059669'],['🏢','Agences',stats.total_agencies,'var(--teal2)'],['👤','Voyageurs',stats.total_travelers,'var(--teal2)'],['💬','Avis',stats.total_reviews,'var(--teal2)'],['🔔','Avis pend.',stats.pending_reviews,'#D97706'],['🎫','Réservations',stats.total_bookings,'var(--teal2)']].map(([ico,lbl,val,c])=>(
              <div key={lbl} style={{background:'rgba(255,255,255,.8)',borderRadius:12,padding:'14px 16px',backdropFilter:'blur(4px)'}}>
                <div style={{fontSize:20,marginBottom:6}}>{ico}</div>
                <div style={{fontFamily:'Nunito',fontWeight:900,fontSize:24,color:c,lineHeight:1}}>{val}</div>
                <div style={{color:'var(--muted)',fontSize:11,fontWeight:600,marginTop:2}}>{lbl}</div>
              </div>
            ))}
          </div>}
          <div style={{display:'flex',gap:4,borderBottom:'2px solid rgba(0,0,0,.08)'}}>
            {[['offers',t.aOffers,pendO],['bookings','Réservations',0],['agencies',t.aAgencies,0],['users',t.aUsers,0],['reviews',t.aRevs,pendR]].map(([tk,lbl,badge])=>(
              <button key={tk} style={TB(tab===tk)} onClick={()=>setTab(tk)}>
                {lbl}{badge>0&&<span style={{marginLeft:6,padding:'1px 7px',background:'#F59E0B',color:'#fff',borderRadius:10,fontSize:10,fontWeight:800}}>{badge}</span>}
              </button>
            ))}
          </div>
        </div>
      </div>
      <div style={{maxWidth:1280,margin:'0 auto',padding:'24px 24px 60px'}}>
        {loading?<Spin/>:<>
          {tab==='bookings'&&<Tbl cols={['Voyageur','Email','Offre','Agence','Prix','Date','Statut','Action']}>
            {bookings.map(b=>(
              <tr key={b.id}>
                <td style={{...TD,fontWeight:700}}><div style={{display:'flex',alignItems:'center',gap:8}}><div style={{width:28,height:28,borderRadius:'50%',background:'linear-gradient(135deg,var(--teal),var(--teal2))',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:800,color:'#fff',flexShrink:0}}>{(b.traveler_name||'?')[0].toUpperCase()}</div>{b.traveler_name}</div></td>
                <td style={{...TD,color:'var(--muted)',fontSize:12}}>{b.traveler_email}</td>
                <td style={{...TD,fontWeight:600,maxWidth:150,fontSize:13}}>{b.offer_title}</td>
                <td style={{...TD,color:'var(--muted)',fontSize:13}}>{b.agency_name}</td>
                <td style={{...TD,color:'var(--teal2)',fontWeight:700,fontFamily:'Nunito'}}>{(b.price||0).toLocaleString()}</td>
                <td style={{...TD,color:'var(--muted)',fontSize:12}}>{(b.created_at||'').split('T')[0]}</td>
                <td style={TD}><Badge status={b.status}/></td>
                <td style={TD}><div style={{display:'flex',gap:5}}>
                  {b.status!=='confirmed'&&<button style={B.sm} onClick={async()=>{try{await api(`/bookings/${b.id}/status`,{method:'PATCH',body:{status:'confirmed'}});show('Confirmée!');load();}catch(e){show(e.message,'err');}}}>✅</button>}
                  {b.status!=='cancelled'&&<button style={B.danger} onClick={async()=>{try{await api(`/bookings/${b.id}/status`,{method:'PATCH',body:{status:'cancelled'}});show('Annulée');load();}catch(e){show(e.message,'err');}}}>✕</button>}
                </div></td>
              </tr>
            ))}
            {!bookings.length&&<tr><td colSpan={8} style={{...TD,textAlign:'center',color:'var(--muted)',padding:40}}>Aucune réservation.</td></tr>}
          </Tbl>}
          {tab==='offers'&&<Tbl cols={['Titre','Agence','Cat.','Prix','Statut','Actions']}>
            {offers.map(o=>(
              <tr key={o.id} style={{background:o.status==='pending'?'#FFFBEB':''}}>
                <td style={{...TD,fontWeight:700,color:'var(--navy)'}}>{o.title}</td>
                <td style={{...TD,color:'var(--muted)',fontSize:13}}>{o.agency_name||'—'}</td>
                <td style={{...TD,color:'var(--muted)',fontSize:13}}>{t.cats[o.category]||o.category}</td>
                <td style={{...TD,color:'var(--teal2)',fontWeight:700,fontFamily:'Nunito'}}>{(o.price||0).toLocaleString()}</td>
                <td style={TD}><Badge status={o.status}/></td>
                <td style={TD}><div style={{display:'flex',gap:6}}>
                  {o.status!=='approved'&&<button style={B.sm} onClick={()=>patch(`/offers/${o.id}/status`,{status:'approved'},'✅ Approuvé')}>{t.approve}</button>}
                  {o.status!=='rejected'&&<button style={B.danger} onClick={()=>patch(`/offers/${o.id}/status`,{status:'rejected'},'Refusé')}>{t.reject}</button>}
                </div></td>
              </tr>
            ))}
          </Tbl>}
          {tab==='agencies'&&<Tbl cols={['Agence','Plan','Email','Offres','Statut','Actions']}>
            {agencies.map(a=>(
              <tr key={a.id}>
                <td style={{...TD,fontWeight:700}}><span style={{marginRight:8,fontSize:18}}>{a.logo}</span>{a.name}</td>
                <td style={TD}><span style={{padding:'3px 10px',borderRadius:20,fontSize:11,fontWeight:700,background:a.plan==='premium'?'#FEF3C7':'#F0F4F5',color:a.plan==='premium'?'#92400E':'var(--muted)'}}>{a.plan}</span></td>
                <td style={{...TD,color:'var(--muted)',fontSize:13}}>{a.email}</td>
                <td style={TD}>{a.offer_count||0}</td>
                <td style={TD}><Badge status={a.status}/></td>
                <td style={TD}><div style={{display:'flex',gap:6}}>
                  {a.status!=='approved'&&<button style={B.sm} onClick={()=>patch(`/agencies/${a.id}/status`,{status:'approved'},'Activée')}>{t.approve}</button>}
                  {a.status==='approved'&&<button style={B.danger} onClick={()=>patch(`/agencies/${a.id}/status`,{status:'suspended'},'Suspendue')}>{t.suspend}</button>}
                </div></td>
              </tr>
            ))}
          </Tbl>}
          {tab==='users'&&<Tbl cols={['Nom','Email','Rôle','Inscrit le']}>
            {users.map(u=>(
              <tr key={u.id}>
                <td style={{...TD,fontWeight:700}}>{u.name}</td>
                <td style={{...TD,color:'var(--muted)',fontSize:13}}>{u.email}</td>
                <td style={TD}><span style={{padding:'3px 10px',borderRadius:20,fontSize:11,fontWeight:700,background:u.role==='admin'?'#D1FAE5':u.role==='agency'?'#EDE9FE':'#F0F4F5',color:u.role==='admin'?'#065F46':u.role==='agency'?'#5B21B6':'var(--muted)'}}>{u.role}</span></td>
                <td style={{...TD,color:'var(--muted)',fontSize:13}}>{(u.created_at||'').split('T')[0]}</td>
              </tr>
            ))}
          </Tbl>}
          {tab==='reviews'&&<Tbl cols={['Utilisateur','Offre','Note','Titre','Statut','Actions']}>
            {reviews.map(r=>(
              <tr key={r.id} style={{background:r.status==='pending'?'#FFFBEB':''}}>
                <td style={{...TD,fontWeight:700}}>{r.user_name}</td>
                <td style={{...TD,color:'var(--muted)',fontSize:13,maxWidth:160}}>{r.offer_title}</td>
                <td style={TD}><Stars v={r.rating} size={13}/></td>
                <td style={{...TD,fontWeight:600}}>{r.title}</td>
                <td style={TD}><Badge status={r.status}/></td>
                <td style={TD}><div style={{display:'flex',gap:6}}>
                  {r.status!=='approved'&&<button style={B.sm} onClick={()=>patch(`/reviews/${r.id}/status`,{status:'approved'},'Approuvé')}>{t.approve}</button>}
                  {r.status!=='rejected'&&<button style={B.danger} onClick={()=>patch(`/reviews/${r.id}/status`,{status:'rejected'},'Refusé')}>{t.reject}</button>}
                </div></td>
              </tr>
            ))}
          </Tbl>}
        </>}
      </div>
    </div>
  );
}

/* ── ABOUT PAGE ───────────────────────────────────────────────────────────── */
function AboutPage({t}){
  return(
    <div style={{background:'#fff',paddingTop:68}}>
      {/* Hero */}
      <div style={{background:'linear-gradient(160deg,var(--teal3) 0%,var(--teal4) 40%,#fff 80%)',padding:'80px 24px 60px'}}>
        <div style={{maxWidth:900,margin:'0 auto',textAlign:'center'}}>
          <img src="/logo-dark.png" alt="Get Lost DZ" style={{height:100,marginBottom:24}}/>
          <div style={{fontFamily:'Nunito',fontWeight:900,fontSize:'clamp(28px,4vw,44px)',color:'var(--navy)',marginBottom:16}}>{t.aboutTitle}</div>
          <p style={{color:'var(--muted)',fontSize:16,lineHeight:1.9,maxWidth:640,margin:'0 auto'}}>{t.ap1}</p>
        </div>
      </div>
      <div style={{maxWidth:1100,margin:'0 auto',padding:'60px 24px'}}>
        {/* Story */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:60,alignItems:'center',marginBottom:72}}>
          <div>
            <SectionTitle>Notre communauté</SectionTitle>
            <p style={{color:'var(--muted)',lineHeight:1.9,fontSize:15,marginBottom:16}}>{t.ap2}</p>
            <p style={{color:'var(--muted)',lineHeight:1.9,fontSize:15}}>{t.ap3}</p>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
            {['24K+\nInstagram','150+\nVoyages','40+\nDestinations','98%\nSatisfaction'].map((s,i)=>{
              const [n,l]=s.split('\n');
              return <Card key={i} style={{padding:'24px 20px',textAlign:'center'}}>
                <div style={{fontFamily:'Nunito',fontWeight:900,fontSize:28,color:'var(--teal2)'}}>{n}</div>
                <div style={{color:'var(--muted)',fontSize:12,fontWeight:600,textTransform:'uppercase',letterSpacing:.8,marginTop:4}}>{l}</div>
              </Card>;
            })}
          </div>
        </div>
        {/* Values */}
        <SectionTitle center sub="Ce qui nous différencie">Nos valeurs</SectionTitle>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(220px,1fr))',gap:20,marginBottom:60}}>
          {t.vals.map(({i,t:title,d})=>(
            <Card key={title} style={{padding:'28px 24px',transition:'all .25s'}}
              onMouseEnter={e=>{e.currentTarget.style.transform='translateY(-4px)';e.currentTarget.style.boxShadow='0 16px 40px rgba(13,185,168,.15)';}}
              onMouseLeave={e=>{e.currentTarget.style.transform='none';e.currentTarget.style.boxShadow='var(--shadow)';}}>
              <div style={{width:48,height:48,borderRadius:14,background:'var(--teal3)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,marginBottom:16}}>{i}</div>
              <div style={{fontFamily:'Nunito',fontWeight:800,fontSize:16,color:'var(--navy)',marginBottom:8}}>{title}</div>
              <div style={{color:'var(--muted)',fontSize:13,lineHeight:1.7}}>{d}</div>
            </Card>
          ))}
        </div>
        {/* Social CTA */}
        <Card style={{background:'linear-gradient(135deg,var(--navy),var(--navy2))',border:'none',padding:'48px',textAlign:'center'}}>
          <div style={{fontSize:40,marginBottom:14}}>📱</div>
          <div style={{fontFamily:'Nunito',fontWeight:900,fontSize:24,color:'#fff',marginBottom:10}}>Suivez-nous sur les réseaux</div>
          <p style={{color:'rgba(255,255,255,.6)',marginBottom:24,fontSize:14}}>24 000+ voyageurs nous font confiance sur Instagram</p>
          <div style={{display:'flex',gap:12,justifyContent:'center',flexWrap:'wrap'}}>
            {[
                {ico:'📸',lbl:'Instagram',url:'https://www.instagram.com/get_lost_dz/'},
                {ico:'🔗',lbl:'Link Tree',url:'https://www.hopp.bio/get-lost'},
                {ico:'📘',lbl:'Facebook',url:'https://www.facebook.com/getlostdz'},
              ].map(({ico,lbl,url})=>(
              <a key={lbl} href={url} target="_blank" rel="noopener noreferrer" style={{...B.white,fontSize:13,padding:'9px 20px',textDecoration:'none',display:'inline-block'}}>{ico} {lbl}</a>
            ))}
          </div>
        </Card>
      </div>
    </div>
  );
}

/* ── FOOTER ───────────────────────────────────────────────────────────────── */
function Footer({t,setPage}){
  return(
    <footer style={{background:'var(--navy)',padding:'52px 24px 24px'}}>
      <div style={{maxWidth:1280,margin:'0 auto'}}>
        <div style={{display:'grid',gridTemplateColumns:'2fr 1fr 1fr 1fr',gap:40,marginBottom:40}}>
          <div>
            <img src="/logo-dark.png" alt="Get Lost DZ" style={{height:52,marginBottom:16,filter:'brightness(0) invert(1) sepia(1) saturate(2) hue-rotate(140deg)'}}
              onError={e=>e.target.style.display='none'}/>
            <p style={{color:'rgba(255,255,255,.5)',fontSize:13,lineHeight:1.8,maxWidth:240}}>La référence du tourisme expérientiel en Algérie.</p>
          </div>
          {[['Navigation',[[t.navHome,'home',null],[t.navTrips,'trips',null],[t.navAbout,'about',null]]],['Contact',[['📧 contact@getlostdz.com',null,null],['📱 +213 XX XX XX XX',null,null],['📍 Alger, Algérie',null,null]]],['Réseaux',[['📸 Instagram',null,'https://www.instagram.com/get_lost_dz/'],['🔗 Linktree',null,'https://www.hopp.bio/get-lost'],['📘 Facebook',null,'https://www.facebook.com/getlostdz']]]]
          .map(([title,links])=>(
            <div key={title}>
              <div style={{fontFamily:'Nunito',fontWeight:800,fontSize:12,textTransform:'uppercase',letterSpacing:1.5,color:'var(--teal)',marginBottom:16}}>{title}</div>
              {links.map(([lbl,pg,url])=>url?<a key={lbl} href={url} target='_blank' rel='noopener noreferrer' style={{color:'rgba(255,255,255,.5)',fontSize:13,marginBottom:9,display:'block',textDecoration:'none',transition:'color .18s'}} onMouseEnter={e=>e.target.style.color='rgba(255,255,255,.9)'} onMouseLeave={e=>e.target.style.color='rgba(255,255,255,.5)'}>{lbl}</a>:<div key={lbl} onClick={()=>pg&&setPage(pg)} style={{color:'rgba(255,255,255,.5)',fontSize:13,marginBottom:9,cursor:pg?'pointer':'default',transition:'color .18s'}} onMouseEnter={e=>{if(pg)e.target.style.color='rgba(255,255,255,.9)'}} onMouseLeave={e=>{if(pg)e.target.style.color='rgba(255,255,255,.5)'}}>{lbl}</div>))}
            </div>
          ))}
        </div>
        <div style={{borderTop:'1px solid rgba(255,255,255,.08)',paddingTop:20,display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:8}}>
          <span style={{color:'rgba(255,255,255,.3)',fontSize:12}}>© {new Date().getFullYear()} Get Lost DZ — Tous droits réservés</span>
          <div style={{display:'flex',gap:16}}>{['Mentions légales','CGU','FAQ'].map(l=><span key={l} style={{color:'rgba(255,255,255,.3)',fontSize:12,cursor:'pointer'}}>{l}</span>)}</div>
        </div>
      </div>
    </footer>
  );
}

/* ── APP ──────────────────────────────────────────────────────────────────── */
function App(){
  const [lang,setLang]=useState('fr');
  const [page,setPage]=useState('home');
  const [filterCat,setFilterCat]=useState('all');
  const [authModal,setAuthModal]=useState(null);
  const [selOffer,setSelOffer]=useState(null);
  const t=TR[lang];
  return(
    <div style={{direction:lang==='ar'?'rtl':'ltr'}}>
      <Navbar page={page} setPage={setPage} lang={lang} setLang={setLang} openAuth={setAuthModal} t={t}/>
      {page==='home'&&<HomePage t={t} setPage={setPage} setFilterCat={setFilterCat} onOpen={setSelOffer}/>}
      {page==='trips'&&<TripsPage t={t} filterCat={filterCat} setFilterCat={setFilterCat} onOpen={setSelOffer}/>}
      {page==='about'&&<AboutPage t={t}/>}
      {page==='dash'&&<DashPage t={t} openAuth={setAuthModal}/>}
      {page==='admin'&&<AdminPage t={t} openAuth={setAuthModal}/>}
      <Footer t={t} setPage={setPage}/>
      {authModal&&<AuthModal mode={authModal} onClose={()=>setAuthModal(null)} t={t}/>}
      {selOffer&&<OfferModal offer={selOffer} onClose={()=>setSelOffer(null)} t={t} lang={lang}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <AuthProvider><ToastProvider><App/></ToastProvider></AuthProvider>
);
</script>
</body>
</html>
